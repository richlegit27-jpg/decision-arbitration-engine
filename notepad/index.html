<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Nova Ultimate</title>
  <!-- Correct static paths -->
  <link rel="stylesheet" href="/static/css/nova-style.css">
</head>
<body>
  <div id="novaApp">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>Nova</h2>
        <button id="toggleSidebar">&#9776;</button>
      </div>
      <div class="chat-list">
        <button id="newChatBtn">+ New Chat</button>
        <ul id="chatTabs"></ul>
      </div>
      <div class="sidebar-footer">
        <button id="themeToggle">Theme</button>
      </div>
    </aside>

    <main id="chatArea">
      <div id="chatMessages"></div>
      <div id="composer">
        <textarea id="messageInput" placeholder="Type a message..."></textarea>
        <div class="composer-buttons">
          <button id="sendBtn">Send</button>
          <button id="voiceBtn">&#127908;</button>
          <input type="file" id="fileInput" multiple hidden>
          <button id="attachBtn">&#128206;</button>
        </div>
      </div>
    </main>

    <div id="memoryPanel">
      <h3>Memory</h3>
      <input type="text" id="memorySearch" placeholder="Search memory">
      <ul id="memoryList"></ul>
      <div class="memory-actions">
        <button id="memoryClear">Clear</button>
        <button id="memoryExport">Export</button>
      </div>
    </div>
  </div>

  <!-- Correct static path for JS -->
  <script src="/static/js/nova-ultimate.js"></script>
</body>
</html>
