<body>

<h2>Offline Nova Workspace (Enhanced)</h2>

<div id="messagesContainer"></div>
<div id="pendingAttachments"></div>

<textarea id="composerInput" placeholder="Type a message…"></textarea><br>
<button id="sendBtn">Send</button>
<button id="attachBtn">+ Attach</button>
<button id="voiceBtn">🎤 Voice</button>
<button id="clearMessagesBtn">Clear Messages</button>

<h3>Memory Panel</h3>
<div id="memoryPanel"></div>
<button id="clearMemoryBtn">Clear Memory</button>

<button id="jumpToLatestBtn">Jump to Latest</button>

<script>
window.NovaChatState = {
  state: { messages: [], pendingAttachments: [], memoryItems: [] }
};

const msgs = document.getElementById('messagesContainer');
const memory = document.getElementById('memoryPanel');
const input = document.getElementById('composerInput');
const jumpBtn = document.getElementById('jumpToLatestBtn');

function renderMessages() {
  msgs.innerHTML = window.NovaChatState.state.messages.map(m=>"<div>"+m.content+"</div>").join('');
}

function renderMemory() {
  memory.innerHTML = window.NovaChatState.state.memoryItems.map(m=>"<div>"+m.text+"</div>").join('');
}

function scrollToLatest() {
  msgs.scrollTop = msgs.scrollHeight;
}

// Send message
document.getElementById('sendBtn').addEventListener('click', ()=>{
  const text = input.value.trim();
  if(!text) return;
  const msg = {id:Date.now(), content:text};
  window.NovaChatState.state.messages.push(msg);
  window.NovaChatState.state.memoryItems.push({id:Date.now(), text:text});
  input.value='';
  renderMessages();
  renderMemory();
  scrollToLatest();
});

// Attach dummy file
document.getElementById('attachBtn').addEventListener('click', ()=>{
  const att = {id:Date.now(), name:'dummy.txt'};
  window.NovaChatState.state.pendingAttachments.push(att);
  document.getElementById('pendingAttachments').innerText =
    "Attachments: "+window.NovaChatState.state.pendingAttachments.map(a=>a.name).join(', ');
});

// Voice note dummy
document.getElementById('voiceBtn').addEventListener('click', ()=>{
  const att = {id:Date.now(), name:'voice_note.webm'};
  window.NovaChatState.state.pendingAttachments.push(att);
  document.getElementById('pendingAttachments').innerText =
    "Attachments: "+window.NovaChatState.state.pendingAttachments.map(a=>a.name).join(', ');
});

// Clear messages
document.getElementById('clearMessagesBtn').addEventListener('click', ()=>{
  window.NovaChatState.state.messages = [];
  renderMessages();
});

// Clear memory
document.getElementById('clearMemoryBtn').addEventListener('click', ()=>{
  window.NovaChatState.state.memoryItems = [];
  renderMemory();
});

// Jump to latest
jumpBtn.addEventListener('click', scrollToLatest);
</script>

</body>
