<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nova</title>

<!-- Polished Endgame Styles -->
<link rel="stylesheet" href="{{ url_for('static', path='css/base.css') }}?v=endgame_restore">
<link rel="stylesheet" href="{{ url_for('static', path='css/layout.css') }}?v=endgame_restore">
</head>
<body class="sidebar-open chat-bg-dark panel-open">

<div id="appShell" class="app-shell">

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar" aria-label="Chat sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Nova</div>
      <button id="btnCloseSidebar" class="sidebar-close" type="button" aria-label="Close sidebar">✕</button>
    </div>
    <div class="sidebar-actions">
      <button id="btnNewChat" class="sidebar-btn" type="button">+ New chat</button>
      <button id="btnOpenMemory" class="sidebar-btn" type="button">Open Memory</button>
    </div>
    <div id="memoryPanel" class="memory-panel">
      <div class="memory-header">
        <h3>Memory</h3>
        <button id="closeMemoryPanelBtn" class="icon-btn">✕</button>
      </div>
      <div id="memoryList" class="memory-list"></div>
      <button id="deleteAllMemoryBtn" class="sidebar-btn">Delete All Memory</button>
    </div>
  </aside>

  <!-- Workspace -->
  <div class="workspace">

    <!-- Cards -->
    <div class="cards">
      <div class="card" id="novaTipsCard">Nova Tips</div>
      <div class="card" id="activeChatCard">Active Chat</div>
      <div class="card" id="memoryStatsCard">Memory Stats</div>
    </div>

    <!-- Chat messages -->
    <div class="chat-messages" id="chatMessages"></div>

    <!-- Composer -->
    <div class="composer">
      <button id="attachBtn" class="icon-btn">📎</button>
      <button id="voiceBtn" class="icon-btn">🎤</button>
      <textarea id="messageInput" placeholder="Type a message..."></textarea>
      <button id="sendBtn" class="icon-btn">➡️</button>
      <button id="themeBtn" class="icon-btn">🌓</button>
      <button id="changeBgBtn" class="icon-btn">🌌</button>
    </div>

  </div>
</div>

<!-- Endgame Scripts -->
<script src="{{ url_for('static', path='js/app.js') }}?v=endgame_restore"></script>
<script src="{{ url_for('static', path='js/memory-panel.js') }}?v=endgame_restore"></script>
<script src="{{ url_for('static', path='js/composer.js') }}?v=endgame_restore"></script>
<script>
(() => {
"use strict";

// Element refs
const memoryPanel = document.getElementById("memoryPanel");
const memoryBtn = document.getElementById("btnOpenMemory");
const closeMemoryBtn = document.getElementById("closeMemoryPanelBtn");
const deleteAllMemoryBtn = document.getElementById("deleteAllMemoryBtn");

const sendBtn = document.getElementById("sendBtn");
const messageInput = document.getElementById("messageInput");
const newChatBtn = document.getElementById("btnNewChat");
const attachBtn = document.getElementById("attachBtn");
const voiceBtn = document.getElementById("voiceBtn");
const changeBgBtn = document.getElementById("changeBgBtn");
const themeBtn = document.getElementById("themeBtn");

const chatMessages = document.getElementById("chatMessages");

// --- Button event listeners ---
memoryBtn.addEventListener("click", () => memoryPanel.classList.toggle("open"));
closeMemoryBtn.addEventListener("click", () => memoryPanel.classList.remove("open"));
deleteAllMemoryBtn.addEventListener("click", () => {
  memoryList.innerHTML = "";
  updateMemoryStats();
});

sendBtn.addEventListener("click", sendMessage);
messageInput.addEventListener("keydown", (e) => {
  if(e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});

newChatBtn.addEventListener("click", () => {
  chatMessages.innerHTML = "";
  resetNovaTips();
});

attachBtn.addEventListener("click", attachFunction);
voiceBtn.addEventListener("click", voiceFunction);
changeBgBtn.addEventListener("click", changeBgFunction);
themeBtn.addEventListener("click", themeToggleFunction);

// --- Helper functions ---
function sendMessage() {
  const text = messageInput.value.trim();
  if(!text) return;
  appendMessage("You", text);
  messageInput.value = "";
  scrollToBottom();
  updateCards();
}

function appendMessage(sender, text) {
  const msg = document.createElement("div");
  msg.className = "chat-message";
  msg.innerHTML = `<strong>${sender}:</strong> ${text}`;
  chatMessages.appendChild(msg);
}

function scrollToBottom() {
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// --- Cards update ---
const novaTipsCard = document.getElementById("novaTipsCard");
const activeChatCard = document.getElementById("activeChatCard");
const memoryStatsCard = document.getElementById("memoryStatsCard");

function updateCards() {
  novaTipsCard.textContent = "Nova Tips: Stay sharp!";
  activeChatCard.textContent = `Active Chat: ${chatMessages.children.length} messages`;
  updateMemoryStats();
}

function updateMemoryStats() {
  const count = memoryList.children.length;
  memoryStatsCard.textContent = `Memory Stats: ${count} items`;
}

function resetNovaTips() {
  novaTipsCard.textContent = "Nova Tips: Ready for new chat!";
}

// --- Dummy endgame functions placeholders ---
function attachFunction() { alert("Attach clicked"); }
function voiceFunction() { alert("Voice clicked"); }
function changeBgFunction() { alert("Background changed"); }
function themeToggleFunction() { document.body.classList.toggle("chat-bg-dark"); }

updateCards();
})();
</script>
</body>
</html>
