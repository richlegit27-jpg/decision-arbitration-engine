services:
  - type: web
    name: nova
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 180
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: FLASK_ENV
        value: production
      - key: NOVA_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
