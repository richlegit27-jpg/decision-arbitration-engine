<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Nova Blog Post</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
            --bg: #070712;
            --card: rgba(15, 23, 42, 0.86);
            --text: #f8fafc;
            --muted: rgba(226, 232, 240, 0.68);
            --line: rgba(216, 180, 254, 0.22);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(168, 85, 247, 0.22), transparent 34%),
                radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.14), transparent 34%),
                var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .page {
            width: min(860px, calc(100% - 28px));
            margin: 0 auto;
            padding: 22px 0 54px;
        }

        .nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .nav a {
            text-decoration: none;
            color: var(--text);
            font-size: 12px;
            font-weight: 950;
            padding: 9px 13px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(168, 85, 247, 0.14);
        }

        article {
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--card);
            padding: clamp(20px, 5vw, 42px);
            box-shadow: 0 24px 65px rgba(0, 0, 0, 0.30);
        }

        h1 {
            margin: 0;
            font-size: clamp(36px, 7vw, 72px);
            line-height: 0.94;
            letter-spacing: -0.075em;
        }

        .excerpt {
            margin: 16px 0 22px;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.6;
            font-weight: 650;
        }

        .body {
            color: rgba(248, 250, 252, 0.92);
            font-size: 17px;
            line-height: 1.78;
            white-space: pre-wrap;
        }

        .meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 18px 0;
        }

        .pill {
            padding: 6px 9px;
            border-radius: 999px;
            background: rgba(168, 85, 247, 0.13);
            border: 1px solid rgba(216, 180, 254, 0.18);
            color: #f8fafc;
            font-size: 11px;
            font-weight: 900;
        }

        .empty {
            color: var(--muted);
            font-weight: 800;
        }
    </style>
</head>

<body>
    <main class="page">
        <nav class="nav">
            <a href="/blog">Back to Blog</a>
            <a href="/blog/write">Write</a>
            <a href="/">Home</a>
        </nav>

        <article id="post">
            <div class="empty">Loading post...</div>
        </article>
    </main>

    <script>
        const SLUG = {{ slug|tojson }};

        function escapeHtml(value) {
            return String(value || "").replace(/[&<>"']/g, function (char) {
                return {
                    "&": "&amp;",
                    "<": "&lt;",
                    ">": "&gt;",
                    '"': "&quot;",
                    "'": "&#039;"
                }[char];
            });
        }

        function formatDate(value) {
            if (!value) return "";
            try {
                return new Date(value).toLocaleString();
            } catch (_) {
                return value;
            }
        }

        async function loadPost() {
            const root = document.getElementById("post");

            try {
                const data = await fetch("/api/blog/posts/" + encodeURIComponent(SLUG)).then(function (res) {
                    return res.json();
                });

                if (!data.ok || !data.post) {
                    root.innerHTML = '<div class="empty">Post not found.</div>';
                    return;
                }

                const post = data.post;
                const tags = Array.isArray(post.tags) ? post.tags : [];

                root.innerHTML = [
                    '<h1>' + escapeHtml(post.title) + '</h1>',
                    '<div class="excerpt">' + escapeHtml(post.excerpt || "") + '</div>',
                    '<div class="meta">',
                        '<span class="pill">' + escapeHtml(formatDate(post.created_at)) + '</span>',
                        tags.map(function (tag) {
                            return '<span class="pill">' + escapeHtml(tag) + '</span>';
                        }).join(""),
                    '</div>',
                    '<div class="body">' + escapeHtml(post.body || "") + '</div>'
                ].join("");
            } catch (error) {
                root.innerHTML = '<div class="empty">Could not load post.</div>';
            }
        }

        loadPost();
    </script>
</body>
</html>
