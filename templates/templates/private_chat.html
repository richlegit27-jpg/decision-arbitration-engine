<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Private Chat with {{ receiver.username }}</title>
</head>
<body>
    <h1>Private Chat with {{ receiver.username }}</h1>
    <div id="messages">
        {% for msg in messages %}
            {% if msg.sender_id == current_user.id %}
                <p><strong>You:</strong> {{ msg.content }} <em>({{ msg.timestamp }})</em></p>
            {% else %}
                <p><strong>{{ receiver.username }}:</strong> {{ msg.content }} <em>({{ msg.timestamp }})</em></p>
            {% endif %}
        {% endfor %}
    </div>
    
    <form method="POST" action="">
        <input type="text" name="message" placeholder="Type your message here" required>
        <button type="submit">Send</button>
    </form>
</body>
</html>
