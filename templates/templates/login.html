<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nova Login</title>
  <style>
    :root{
      --bg:#0b0f14;
      --bg-2:#0f141b;
      --panel:#111722;
      --panel-2:#161d29;
      --text:#e7edf5;
      --muted:#8ea0b5;
      --line:rgba(255,255,255,0.08);
      --accent:#10a37f;
      --accent-2:#0d8e6e;
      --danger:#ff6b6b;
      --shadow:0 24px 70px rgba(0,0,0,0.45);
    }

    *{ box-sizing:border-box; }

    html, body{
      height:100%;
      margin:0;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:
        radial-gradient(circle at top, rgba(16,163,127,0.12), transparent 28%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color:var(--text);
    }

    body{
      display:grid;
      place-items:center;
      padding:24px;
    }

    .login-shell{
      width:min(100%, 460px);
      border:1px solid var(--line);
      border-radius:28px;
      background:linear-gradient(180deg, rgba(22,29,41,0.94), rgba(17,23,34,0.98));
      box-shadow:var(--shadow);
      padding:28px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
    }

    .brand-badge{
      width:48px;
      height:48px;
      border-radius:16px;
      display:grid;
      place-items:center;
      font-weight:900;
      background:linear-gradient(180deg, rgba(16,163,127,0.24), rgba(16,163,127,0.10));
      border:1px solid rgba(16,163,127,0.30);
    }

    h1{
      margin:0;
      font-size:28px;
    }

    p{
      margin:6px 0 0;
      color:var(--muted);
      line-height:1.6;
    }

    form{
      display:grid;
      gap:14px;
      margin-top:24px;
    }

    .field{
      display:grid;
      gap:8px;
    }

    label{
      font-size:13px;
      font-weight:700;
      color:var(--muted);
    }

    input{
      width:100%;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.03);
      color:var(--text);
      border-radius:16px;
      padding:14px 15px;
      font:inherit;
      outline:none;
    }

    input:focus{
      border-color:rgba(16,163,127,0.45);
      box-shadow:0 0 0 3px rgba(16,163,127,0.14);
    }

    .submit{
      border:none;
      border-radius:16px;
      padding:14px 16px;
      font:inherit;
      font-weight:900;
      cursor:pointer;
      background:var(--accent);
      color:#fff;
    }

    .submit:hover{
      background:var(--accent-2);
    }

    .error{
      min-height:20px;
      color:#ffd0d0;
      font-size:13px;
    }

    .hint{
      margin-top:18px;
      padding:12px 14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.03);
      color:var(--muted);
      font-size:13px;
    }

    code{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      color:#d7f9f0;
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="brand">
      <div class="brand-badge">N</div>
      <div>
        <h1>Nova</h1>
        <p>Sign in to access your workspace.</p>
      </div>
    </div>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>

      <div class="error" id="errorText"></div>

      <button class="submit" id="loginBtn" type="submit">Login</button>
    </form>

    <div class="hint">
      Default login for now: <code>owner</code> / <code>nova123</code>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const form = document.getElementById("loginForm");
      const errorText = document.getElementById("errorText");
      const loginBtn = document.getElementById("loginBtn");

      function setError(text){
        errorText.textContent = text || "";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setError("");
        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";

        try{
          const formData = new FormData(form);

          const response = await fetch("/api/login", {
            method: "POST",
            body: formData,
            credentials: "same-origin",
            cache: "no-store",
          });

          const data = await response.json().catch(() => ({}));

          if(!response.ok || !data.ok){
            setError(data.error || "Login failed");
            return;
          }

          window.location.href = data.redirect_to || "/";
        }catch(_error){
          setError("Backend request failed");
        }finally{
          loginBtn.disabled = false;
          loginBtn.textContent = "Login";
        }
      });
    })();
  </script>
</body>
</html>
