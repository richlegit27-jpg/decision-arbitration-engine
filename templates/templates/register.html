<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nova — Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-lg mx-auto p-6">
    <a href="/" class="text-sm underline text-zinc-300">← back to chat</a>

    <h1 class="text-2xl font-bold mt-4">Register</h1>
    <p class="text-sm text-zinc-400 mt-1">Creates a user via <code>/api/register</code>.</p>

    <form id="register-form" class="mt-6 grid gap-3">
      <input id="username" class="bg-zinc-900/70 border border-zinc-800 rounded-xl px-4 py-3" placeholder="Username" />
      <input id="email" class="bg-zinc-900/70 border border-zinc-800 rounded-xl px-4 py-3" placeholder="Email (optional)" />
      <input id="password" type="password" class="bg-zinc-900/70 border border-zinc-800 rounded-xl px-4 py-3" placeholder="Password" />
      <button class="bg-zinc-100 text-zinc-950 rounded-xl px-4 py-3 font-semibold">Create account</button>
      <div id="out" class="text-sm text-zinc-300"></div>
    </form>
  </div>

  <script>
    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const out = document.getElementById("out");
      out.textContent = "Working...";

      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      const res = await fetch("/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password })
      });

      const data = await res.json().catch(() => ({}));
      out.textContent = res.ok ? (data.message || "Registered.") : (data.message || "Register failed.");
    });
  </script>
</body>
</html>
