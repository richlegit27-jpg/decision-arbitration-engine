<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nova Login</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #11182d;
      --panel-2: #17203a;
      --text: #eef3ff;
      --muted: #9aa8c7;
      --accent: #79a8ff;
      --accent-2: #5f8df0;
      --danger: #ff7b7b;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(121,168,255,0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(95,141,240,0.15), transparent 24%),
        var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 22px;
    }

    .title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    input[type="password"] {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }

    input[type="password"]:focus {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .error {
      min-height: 20px;
      color: var(--danger);
      font-size: 14px;
      font-weight: 600;
    }

    button {
      border: 0;
      border-radius: 16px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
    }

    .hint {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <div class="title">Nova</div>
        <div class="subtitle">Enter the password to unlock the app.</div>
      </div>

      <form method="post" action="/login">
        <input type="hidden" name="next" value="{{ next_url }}">
        <div>
          <label for="password">Password</label>
        </div>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="Enter password"
          autocomplete="current-password"
          autofocus
          required
        >
        <div class="error">{{ error }}</div>
        <button type="submit">Unlock Nova</button>
      </form>

      <div class="hint">
        This gate protects the UI and API routes until you log in.
      </div>
    </div>
  </div>
</body>
</html>
