<script>
window.NovaOpenMobileSessions = function () {
    var panel = document.getElementById("nova-mobile-sessions-panel");

    if (!panel) {
        alert("Sessions panel not found.");
        return;
    }

    panel.classList.remove("hidden");
    panel.style.cssText =
        "display:flex !important;" +
        "position:fixed !important;" +
        "left:10px !important;" +
        "right:10px !important;" +
        "top:76px !important;" +
        "z-index:999999 !important;" +
        "flex-direction:column !important;" +
        "gap:10px !important;" +
        "padding:14px !important;" +
        "background:#111827 !important;" +
        "border:1px solid rgba(255,255,255,.18) !important;" +
        "border-radius:18px !important;" +
        "box-shadow:0 24px 80px rgba(0,0,0,.55) !important;";
};

window.NovaCloseMobileSessions = function () {
    var panel = document.getElementById("nova-mobile-sessions-panel");

    if (!panel) return;

    panel.classList.add("hidden");
    panel.style.cssText = "display:none !important;";
};
</script>

<script>
(function () {
    "use strict";

    function ready(fn) {
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", fn);
            return;
        }

        fn();
    }

    ready(function () {
        const toolsButton = document.getElementById("nova-mobile-tools-toggle");
        const toolsPanel = document.getElementById("nova-mobile-tools-panel");

        if (!toolsButton || !toolsPanel) {
            console.warn("[Nova Mobile] tools menu fallback missing elements", {
                toolsButton: !!toolsButton,
                toolsPanel: !!toolsPanel,
            });
            return;
        }

        toolsButton.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();

            toolsPanel.classList.toggle("hidden");

            const isOpen = !toolsPanel.classList.contains("hidden");
            toolsButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        toolsButton.setAttribute("aria-controls", "nova-mobile-tools-panel");
        toolsButton.setAttribute("aria-expanded", "false");

        console.log("[Nova Mobile] tools menu fallback wired");
    });
})();
</script>

<!-- NOVA MOBILE PANEL HARD LOCK START -->
<script>
(function () {
    "use strict";

    function $(id) {
        return document.getElementById(id);
    }

    function forceHide(panel) {
        if (!panel) return;

        panel.classList.add("hidden");
        panel.setAttribute("aria-hidden", "true");
        panel.style.setProperty("display", "none", "important");
    }

    function forceShow(panel, topOrBottom) {
        if (!panel) return;

        panel.classList.remove("hidden");
        panel.setAttribute("aria-hidden", "false");

        panel.style.setProperty("display", "flex", "important");
        panel.style.setProperty("position", "fixed", "important");
        panel.style.setProperty("left", "10px", "important");
        panel.style.setProperty("right", "10px", "important");
        panel.style.setProperty("z-index", "999999", "important");
        panel.style.setProperty("flex-direction", "column", "important");
        panel.style.setProperty("gap", "10px", "important");
        panel.style.setProperty("padding", "14px", "important");
        panel.style.setProperty("background", "#111827", "important");
        panel.style.setProperty("border", "1px solid rgba(255,255,255,.18)", "important");
        panel.style.setProperty("border-radius", "18px", "important");
        panel.style.setProperty("box-shadow", "0 24px 80px rgba(0,0,0,.55)", "important");

        if (topOrBottom === "bottom") {
            panel.style.setProperty("bottom", "90px", "important");
            panel.style.removeProperty("top");
        } else {
            panel.style.setProperty("top", "76px", "important");
            panel.style.removeProperty("bottom");
        }
    }

    function replaceButton(id) {
        var oldButton = $(id);

        if (!oldButton || !oldButton.parentNode) {
            return null;
        }

        var newButton = oldButton.cloneNode(true);
        newButton.removeAttribute("onclick");
        oldButton.parentNode.replaceChild(newButton, oldButton);

        return newButton;
    }

    function closeAllPanels() {
        forceHide($("nova-mobile-sessions-panel"));
        forceHide($("nova-mobile-tools-panel"));
        forceHide($("nova-mobile-memory-panel"));
        forceHide($("nova-mobile-execution-panel"));
    }

    function wire() {
        var sessionsButton = replaceButton("nova-mobile-sessions-toggle");
        var toolsButton = replaceButton("nova-mobile-tools-toggle");

        var sessionsPanel = $("nova-mobile-sessions-panel");
        var toolsPanel = $("nova-mobile-tools-panel");
        var memoryPanel = $("nova-mobile-memory-panel");
        var executionPanel = $("nova-mobile-execution-panel");

        closeAllPanels();

        window.NovaOpenMobileSessions = function () {
            closeAllPanels();
            forceShow(sessionsPanel, "top");
        };

        window.NovaCloseMobileSessions = function () {
            forceHide(sessionsPanel);
        };

        window.NovaOpenMobileTools = function () {
            closeAllPanels();
            forceShow(toolsPanel, "bottom");
        };

        window.NovaCloseMobileTools = function () {
            forceHide(toolsPanel);
        };

        window.NovaOpenMobileMemory = function () {
            closeAllPanels();
            forceShow(memoryPanel, "top");
        };

        window.NovaCloseMobileMemory = function () {
            forceHide(memoryPanel);
        };

        window.NovaOpenMobileExecution = function () {
            closeAllPanels();
            forceShow(executionPanel, "top");
        };

        window.NovaCloseMobileExecution = function () {
            forceHide(executionPanel);
        };

        if (sessionsButton) {
            sessionsButton.addEventListener("click", function (event) {
                event.preventDefault();
                event.stopPropagation();
                window.NovaOpenMobileSessions();
            });
        }

        if (toolsButton) {
            toolsButton.addEventListener("click", function (event) {
                event.preventDefault();
                event.stopPropagation();
                window.NovaOpenMobileTools();
            });
        }

        document.querySelectorAll("button").forEach(function (button) {
            var text = (button.textContent || "").trim().toLowerCase();
            var tool = button.getAttribute("data-mobile-tool");

            if (text === "close sessions") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileSessions();
                });
            }

            if (text === "close") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileTools();
                });
            }

            if (text === "memory" || button.id === "nova-mobile-memory-toggle") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaOpenMobileMemory();
                });
            }

            if (text === "close memory" || button.id === "nova-mobile-memory-close") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileMemory();
                });
            }

            if (tool === "execution" || text === "open execution panel") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaOpenMobileExecution();
                });
            }

            if (text === "close execution" || button.id === "nova-mobile-execution-close") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileExecution();
                });
            }
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") {
                closeAllPanels();
            }
        });

        console.log("[Nova Mobile] panel hard lock active");
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", wire);
    } else {
        wire();
    }
})();
</script>
<!-- NOVA MOBILE PANEL HARD LOCK END -->

<script>
/* MOBILE_RESTORE_SEND_BRIDGE_LOCK */
(function () {
    "use strict";

    if (window.__novaMobileSendRestoreInstalled) {
        return;
    }

    window.__novaMobileSendRestoreInstalled = true;

    function qs(selector) {
        return document.querySelector(selector);
    }

    function findInput() {
        return (
            qs("#nova-mobile-input") ||
            qs("#mobileMessageInput") ||
            qs("#messageInput") ||
            document.querySelector("textarea") ||
            document.querySelector("input[type='text']")
        );
    }

    function findMessages() {
        return (
            qs("#mobileChatMessages") ||
            qs("#mobileMessages") ||
            qs("#messages")
        );
    }

    // MOBILE_FALLBACK_ATTACHMENT_PREVIEW_LOCK
    function findAttachmentPreviewBar() {
        var existing = qs("#nova-mobile-fallback-attachments");

        if (existing) {
            return existing;
        }

        var composer = qs(".mobile-composer");
        var bar = document.createElement("div");

        bar.id = "nova-mobile-fallback-attachments";
        bar.style.display = "none";
        bar.style.gap = "8px";
        bar.style.flexWrap = "wrap";
        bar.style.padding = "8px 10px";
        bar.style.margin = "0 10px 8px";
        bar.style.border = "1px solid rgba(255,255,255,0.12)";
        bar.style.borderRadius = "14px";
        bar.style.background = "rgba(255,255,255,0.06)";

        if (composer && composer.parentNode) {
            composer.parentNode.insertBefore(bar, composer);
        } else {
            document.body.appendChild(bar);
        }

        return bar;
    }

    function renderSelectedAttachments() {
        var input = qs("#nova-mobile-file-input");
        var bar = findAttachmentPreviewBar();

        if (!input || !bar) {
            return;
        }

        var files = Array.prototype.slice.call(input.files || []);

        if (!files.length) {
            bar.innerHTML = "";
            bar.style.display = "none";
            return;
        }

        bar.style.display = "flex";

        bar.innerHTML = files.map(function (file, index) {
            var name = escapeHtml(file.name || ("File " + (index + 1)));
            var sizeKb = Math.max(1, Math.round(Number(file.size || 0) / 1024));
            var isImage = String(file.type || "").toLowerCase().indexOf("image/") === 0;

            if (isImage) {
                var objectUrl = URL.createObjectURL(file);

                setTimeout(function () {
                    try {
                        URL.revokeObjectURL(objectUrl);
                    } catch (err) {}
                }, 30000);

                return (
                    '<div class="mobile-attachment-chip" style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:12px;background:rgba(255,255,255,0.08);max-width:100%;">' +
                        '<img src="' + objectUrl + '" alt="' + name + '" style="width:42px;height:42px;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,0.12);">' +
                        '<div style="min-width:0;">' +
                            '<div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;">' + name + '</div>' +
                            '<div style="font-size:11px;opacity:.75;">' + sizeKb + ' KB</div>' +
                        '</div>' +
                    '</div>'
                );
            }

            return (
                '<div class="mobile-attachment-chip" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:12px;background:rgba(255,255,255,0.08);max-width:100%;">' +
                    '<span style="font-size:18px;">📎</span>' +
                    '<div style="min-width:0;">' +
                        '<div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;">' + name + '</div>' +
                        '<div style="font-size:11px;opacity:.75;">' + sizeKb + ' KB</div>' +
                    '</div>' +
                '</div>'
            );
        }).join("");
    }

    function getSessionId() {
        var keys = [
            "nova_mobile_active_session",
            "nova_active_session_id",
            "active_session_id",
            "nova_session_id"
        ];

        for (var i = 0; i < keys.length; i += 1) {
            try {
                var value = localStorage.getItem(keys[i]) || "";
                if (value.trim()) return value.trim();
            } catch (err) {}
        }

        var generated = "mobile_" + Date.now();

        try {
            localStorage.setItem("nova_mobile_active_session", generated);
        } catch (err) {}

        return generated;
    }

    function escapeHtml(value) {
        return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function renderSources(meta) {
        var sources = meta && Array.isArray(meta.sources) ? meta.sources : [];

        if (!sources.length) {
            return "";
        }

        return (
            '<div class="mobile-source-list" style="margin-top:12px;display:grid;gap:10px;">' +
            sources.slice(0, 5).map(function (item, index) {
                item = item || {};

                var title = String(item.title || item.name || item.url || ("Source " + (index + 1))).trim();
                var source = String(item.source || item.domain || item.publisher || "Source").trim();
                var snippet = String(item.snippet || item.description || "").trim();
                var url = String(item.url || item.href || item.link || "").trim();

                return (
                    '<button type="button" class="mobile-source-card" data-mobile-source-url="' + escapeHtml(url) + '" ' +
                    'style="width:100%;text-align:left;border:1px solid rgba(255,255,255,0.16);border-radius:14px;padding:10px 12px;background:rgba(255,255,255,0.08);color:inherit;">' +
                        '<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">' +
                            '<span style="font-size:12px;opacity:.75;">' + (index + 1) + '</span>' +
                            '<strong style="font-size:12px;">' + escapeHtml(source) + '</strong>' +
                        '</div>' +
                        '<div style="font-size:13px;font-weight:700;line-height:1.35;">' + escapeHtml(title) + '</div>' +
                        (snippet ? '<div style="font-size:12px;opacity:.78;margin-top:5px;line-height:1.35;">' + escapeHtml(snippet) + '</div>' : '') +
                    '</button>'
                );
            }).join("") +
            '</div>'
        );
    }

    function addBubble(role, text, meta, isError) {
        var box = findMessages();

        if (!box) {
            return null;
        }

        var bubble = document.createElement("div");
        var rawText = String(text || "");
        bubble.className = "nova-mobile-fallback-message nova-mobile-fallback-" + role + (isError ? " nova-mobile-fallback-error" : "");

        bubble.style.display = "block";
        bubble.style.maxWidth = "92%";
        bubble.style.margin = role === "user" ? "10px 8px 10px auto" : "10px auto 10px 8px";
        bubble.style.padding = "12px 14px";
        bubble.style.borderRadius = "16px";
        bubble.style.whiteSpace = "pre-wrap";
        bubble.style.lineHeight = "1.45";
        bubble.style.border = "1px solid rgba(255,255,255,0.12)";
        bubble.style.background = role === "user" ? "rgba(124,92,255,0.20)" : "rgba(255,255,255,0.08)";
        bubble.style.color = "inherit";
        bubble.style.wordBreak = "break-word";

        if (isError) {
            bubble.style.borderColor = "rgba(255,92,122,0.55)";
            bubble.style.background = "rgba(255,92,122,0.12)";
        }

        if (role === "assistant") {
            bubble.innerHTML =
                '<div class="nova-mobile-fallback-answer">' +
                    escapeHtml(rawText).replace(/\n/g, "<br>") +
                '</div>' +
                renderSources(meta || {}) +
                '<div class="mobile-message-actions" style="display:flex;gap:8px;margin-top:10px;">' +
                    '<button type="button" class="mobile-inline-action" data-mobile-copy-answer="1" style="font-size:12px;padding:6px 9px;border-radius:10px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:inherit;">Copy</button>' +
                    '<button type="button" class="mobile-inline-action" data-mobile-regen-answer="1" style="font-size:12px;padding:6px 9px;border-radius:10px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:inherit;">Regenerate</button>' +
                '</div>';

            bubble.querySelectorAll("[data-mobile-source-url]").forEach(function (btn) {
                btn.addEventListener("click", function () {
                    var url = String(btn.getAttribute("data-mobile-source-url") || "").trim();
                    if (!url) return;
                    window.open(url, "_blank", "noopener,noreferrer");
                });
            });

            var copyBtn = bubble.querySelector("[data-mobile-copy-answer]");
            if (copyBtn) {
                copyBtn.addEventListener("click", async function () {
                    try {
                        await navigator.clipboard.writeText(rawText);
                    } catch (err) {
                        var textarea = document.createElement("textarea");
                        textarea.value = rawText;
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand("copy");
                        textarea.remove();
                    }
                });
            }

            var regenBtn = bubble.querySelector("[data-mobile-regen-answer]");
            if (regenBtn) {
                regenBtn.addEventListener("click", function () {
                    var input = findInput();
                    if (!input) return;
                    var last = String(window.__novaMobileLastUserText || "").trim();
                    if (!last) return;
                    input.value = last;
                    sendMobileMessage();
                });
            }
        } else {
            bubble.textContent = rawText;
        }

        box.appendChild(bubble);

        try {
            box.scrollTop = box.scrollHeight;
        } catch (err) {
            try {
                bubble.scrollIntoView({ block: "end" });
            } catch (err2) {}
        }

        return bubble;
    }

    async function uploadAttachments() {
        var input = qs("#nova-mobile-file-input");

        if (!input || !input.files || !input.files.length) {
            return [];
        }

        var uploaded = [];

        for (var i = 0; i < input.files.length; i += 1) {
            var file = input.files[i];
            var form = new FormData();

            form.append("file", file);

            var response = await fetch("/api/upload", {
                method: "POST",
                body: form
            });

            var data = await response.json();

            if (!response.ok || data.ok === false) {
                throw new Error(data.error || "Upload failed.");
            }

            uploaded.push({
                filename: data.filename || file.name,
                original_filename: data.original_filename || file.name,
                size: Number(data.size || file.size || 0),
                mime_type: data.mime_type || file.type || "application/octet-stream",
                url: data.url || data.file_url || "",
                file_url: data.file_url || data.url || "",
                status: "uploaded"
            });
        }

        input.value = "";
        renderSelectedAttachments();

        return uploaded;
    }

    async function sendMobileMessage() {
        if (window.__novaMobileSendingNow) {
            return;
        }

        var input = findInput();

        if (!input) {
            addBubble("assistant", "Send failed: input box not found.", {}, true);
            return;
        }

        var text = String(input.value || "").trim();

        if (!text) {
            return;
        }

        window.__novaMobileSendingNow = true;

        window.__novaMobileLastUserText = text;

        addBubble("user", text, {}, false);
        input.value = "";

        var thinking = addBubble("assistant", "Thinking...", {}, false);

        try {
            var attachments = await uploadAttachments();

            var response = await fetch("/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    user_text: text,
                    session_id: getSessionId(),
                    attachments: attachments
                })
            });

            var data = await response.json();
            var assistant = data.assistant_message || {};
            var answer = assistant.text || assistant.content || data.error || "Nova could not produce a response.";

            if (thinking) {
                thinking.innerHTML =
                    '<div class="nova-mobile-fallback-answer">' +
                    escapeHtml(answer).replace(/\n/g, "<br>") +
                    '</div>' +
                    renderSources(assistant.meta || {}) +
                    '<div class="mobile-message-actions" style="display:flex;gap:8px;margin-top:10px;">' +
                        '<button type="button" class="mobile-inline-action" data-mobile-copy-answer="1" style="font-size:12px;padding:6px 9px;border-radius:10px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:inherit;">Copy</button>' +
                        '<button type="button" class="mobile-inline-action" data-mobile-regen-answer="1" style="font-size:12px;padding:6px 9px;border-radius:10px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:inherit;">Regenerate</button>' +
                    '</div>';

                thinking.querySelectorAll("[data-mobile-source-url]").forEach(function (btn) {
                    btn.addEventListener("click", function () {
                        var url = String(btn.getAttribute("data-mobile-source-url") || "").trim();
                        if (!url) return;
                        window.open(url, "_blank", "noopener,noreferrer");
                    });
                });

                var copyBtn = thinking.querySelector("[data-mobile-copy-answer]");
                if (copyBtn) {
                    copyBtn.addEventListener("click", async function () {
                        try {
                            await navigator.clipboard.writeText(answer || "");
                            copyBtn.textContent = "Copied";
                            setTimeout(function () {
                                copyBtn.textContent = "Copy";
                            }, 900);
                        } catch (err) {
                            copyBtn.textContent = "Failed";
                            setTimeout(function () {
                                copyBtn.textContent = "Copy";
                            }, 900);
                        }
                    });
                }

                var regenBtn = thinking.querySelector("[data-mobile-regen-answer]");
                if (regenBtn) {
                    regenBtn.addEventListener("click", function () {
                        var input = findInput();
                        var last = String(window.__novaMobileLastUserText || "").trim();

                        if (!input || !last) {
                            regenBtn.textContent = "!";
                            setTimeout(function () {
                                regenBtn.textContent = "Regenerate";
                            }, 900);
                            return;
                        }

                        input.value = last;
                        input.dispatchEvent(new Event("input", { bubbles: true }));
                        input.focus();
                    });
                }
            }

            if (data.active_session_id) {
                try {
                    localStorage.setItem("nova_mobile_active_session", data.active_session_id);
                } catch (err) {}
            }
        } catch (err) {
            if (thinking) {
                thinking.textContent = "Request failed: " + (err && err.message ? err.message : String(err));
                thinking.style.borderColor = "rgba(255,92,122,0.55)";
                thinking.style.background = "rgba(255,92,122,0.12)";
            }
        } finally {
            window.__novaMobileSendingNow = false;
        }
    }

    document.addEventListener("click", function (event) {
        var button = event.target && event.target.closest ? event.target.closest("button") : null;

        if (!button) return;

        var id = String(button.id || "").toLowerCase();
        var text = String(button.textContent || "").trim().toLowerCase();

        if (id === "nova-mobile-attach") {
            event.preventDefault();
            event.stopImmediatePropagation();

            var fileInput = qs("#nova-mobile-file-input");
            if (fileInput) {
                fileInput.click();
            }

            return;
        }

        if (id === "nova-mobile-send" || text === "send" || text === "➤" || text === "âž¤") {
            event.preventDefault();
            event.stopImmediatePropagation();
            sendMobileMessage();
        }
    }, true);

    document.addEventListener("keydown", function (event) {
        var input = findInput();

        if (input && event.target === input && event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            event.stopImmediatePropagation();
            sendMobileMessage();
        }
    }, true);

    var attachmentInput = qs("#nova-mobile-file-input");
    if (attachmentInput) {
        attachmentInput.addEventListener("change", renderSelectedAttachments);
    }

    console.log("[Nova Mobile] send restore bridge active");
})();
</script>
