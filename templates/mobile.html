<!DOCTYPE html>
<html lang="en">
<head>

<!-- NOVA_MOBILE_CONSOLE_SPAM_STOP_EARLY_QUIET_20260624 -->

<script>
/* NOVA_MOBILE_FINAL_GEOMETRY_LAST_OWNER_20260624 */
(function () {
    "use strict";

    function imp(el, prop, value) {
        if (!el) return;
        el.style.setProperty(prop, value, "important");
    }

    function finalGeometryLastOwner() {
        var chat = document.getElementById("mobileChatMessages");
        var comp = document.getElementById("nova-mobile-composer");
        var input = document.getElementById("nova-mobile-input");

        if (!chat || !comp) return;

        chat.style.removeProperty("inset");
        chat.style.removeProperty("transform");

        imp(comp, "position", "fixed");
        imp(comp, "left", "0px");
        imp(comp, "right", "0px");
        imp(comp, "bottom", "0px");
        imp(comp, "top", "auto");
        imp(comp, "max-height", "108px");
        imp(comp, "height", "auto");
        imp(comp, "overflow", "hidden");
        imp(comp, "z-index", "90");

        if (input) {
            imp(input, "min-height", "38px");
            imp(input, "max-height", "46px");
        }

        imp(chat, "position", "fixed");
        imp(chat, "top", "68px");
        imp(chat, "left", "0px");
        imp(chat, "right", "0px");
        imp(chat, "bottom", "118px");
        imp(chat, "height", "auto");
        imp(chat, "max-height", "none");
        imp(chat, "overflow-y", "auto");
        imp(chat, "overflow-x", "hidden");
        imp(chat, "padding-bottom", "24px");
        imp(chat, "z-index", "10");
    }

    window.NovaMobileFinalGeometryLastOwner = finalGeometryLastOwner;
    window.NovaMobileFinalScrollGeometryForce = finalGeometryLastOwner;
    window.NovaMobileMicroScrollTune = finalGeometryLastOwner;

    window.addEventListener("load", function () {
        finalGeometryLastOwner();
        setTimeout(finalGeometryLastOwner, 250);
        setTimeout(finalGeometryLastOwner, 900);
        setTimeout(finalGeometryLastOwner, 1800);
        setTimeout(finalGeometryLastOwner, 3000);
        setTimeout(finalGeometryLastOwner, 5000);
    });

    window.addEventListener("pageshow", function () {
        setTimeout(finalGeometryLastOwner, 120);
        setTimeout(finalGeometryLastOwner, 600);
    });

    window.addEventListener("resize", finalGeometryLastOwner);
    window.addEventListener("orientationchange", finalGeometryLastOwner);

    document.addEventListener("click", function () {
        setTimeout(finalGeometryLastOwner, 80);
    }, true);

    document.addEventListener("input", function () {
        setTimeout(finalGeometryLastOwner, 80);
    }, true);

    setTimeout(finalGeometryLastOwner, 100);
    setTimeout(finalGeometryLastOwner, 700);
    setTimeout(finalGeometryLastOwner, 1600);
    setTimeout(finalGeometryLastOwner, 3000);
    setTimeout(finalGeometryLastOwner, 5000);

    console.log("[NOVA_MOBILE_FINAL_GEOMETRY_LAST_OWNER_20260624] ready");
})();
</script>

</body>
</html>
