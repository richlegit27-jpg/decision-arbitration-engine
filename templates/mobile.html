<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Nova Mobile</title>
  <meta name="theme-color" content="#08101f">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="/static/css/nova-mobile-app.css?v=mobile_deep_fix_final_1">
</head>
<body>
  <div id="mobileApp" class="mobile-app">
    <aside id="mobileSidebar" class="mobile-panel mobile-panel-left" aria-hidden="true">
      <div class="mobile-panel-header">
        <div class="mobile-panel-title-wrap">
          <div class="mobile-panel-title">Chats</div>
          <div id="statusText" class="mobile-panel-subtitle">Ready</div>
        </div>
        <button id="closeLeftPanelBtn" class="icon-btn" type="button" aria-label="Close chats">✕</button>
      </div>

      <div class="mobile-panel-body">
        <div class="mobile-panel-actions">
          <button id="newSessionBtn" class="toolbar-btn primary" type="button">New Chat</button>
        </div>

        <div class="mobile-section">
          <div class="section-kicker">Sessions</div>
          <div id="sessionList" class="session-list"></div>
        </div>
      </div>
    </aside>

    <main class="mobile-main">
      <header class="mobile-topbar">
        <button id="openLeftPanelBtn" class="icon-btn" type="button" aria-label="Open chats">☰</button>

        <div class="mobile-topbar-center">
          <div class="mobile-brand">Nova</div>
          <div id="activeSessionMeta" class="mobile-subtitle">Mobile assistant</div>
        </div>

        <button id="openRightPanelBtn" class="icon-btn" type="button" aria-label="Open memory">✦</button>
      </header>

      <section id="chatScroll" class="mobile-chat-scroll" aria-label="Conversation">
        <div id="welcomeState" class="welcome-state">
          <div class="welcome-card">
            <div class="welcome-title">Nova Mobile</div>
            <div class="welcome-copy">
              Stable mobile shell with chats on the left, memory on the right, and conversation in the center.
            </div>
          </div>
        </div>

        <div id="messageList" class="message-list"></div>
      </section>

      <section class="mobile-composer-shell">
        <div id="attachedFilesBar" class="attached-files-bar" hidden></div>

        <form id="composerForm" class="composer-form">
          <div class="composer-row">
            <button id="attachBtn" class="composer-icon-btn" type="button" aria-label="Attach files">＋</button>
            <button id="voiceBtn" class="composer-icon-btn" type="button" aria-label="Voice input">🎤</button>

            <textarea
              id="messageInput"
              class="composer-input"
              rows="1"
              placeholder="Message Nova..."
              autocomplete="off"
              autocapitalize="sentences"
              spellcheck="true"
            ></textarea>

            <button id="sendBtn" class="send-btn" type="submit">Send</button>
          </div>

          <div class="composer-footer">
            <div id="composerStatus" class="composer-status">Ready</div>
            <div class="composer-hint">Enter to send · Shift+Enter for newline</div>
          </div>

          <input id="fileInput" type="file" multiple hidden>
        </form>
      </section>
    </main>

    <aside id="mobileMemoryPanel" class="mobile-panel mobile-panel-right" aria-hidden="true">
      <div class="mobile-panel-header">
        <div class="mobile-panel-title-wrap">
          <div class="mobile-panel-title">Memory</div>
          <div id="memoryStatus" class="mobile-panel-subtitle">Ready</div>
        </div>
        <button id="closeRightPanelBtn" class="icon-btn" type="button" aria-label="Close memory">✕</button>
      </div>

      <div class="mobile-panel-body">
        <div class="mobile-panel-actions">
          <button id="refreshMemoryBtn" class="toolbar-btn" type="button">Refresh</button>
        </div>

        <div class="mobile-section">
          <div class="section-kicker">Add memory</div>

          <form id="memoryForm" class="memory-form">
            <label class="field-label" for="memoryKind">Type</label>
            <select id="memoryKind" class="field-input">
              <option value="memory">memory</option>
              <option value="preference">preference</option>
              <option value="project">project</option>
              <option value="plan">plan</option>
              <option value="writing">writing</option>
            </select>

            <label class="field-label" for="memoryValue">Value</label>
            <textarea
              id="memoryValue"
              class="field-input field-textarea"
              rows="4"
              placeholder="Save something Nova should remember..."
            ></textarea>

            <div class="memory-actions">
              <button id="saveMemoryBtn" class="toolbar-btn primary" type="submit">Save</button>
            </div>
          </form>
        </div>

        <div class="mobile-section">
          <div class="section-kicker">Saved memory</div>
          <div id="memoryList" class="memory-list"></div>
        </div>
      </div>
    </aside>

    <button id="panelBackdrop" class="panel-backdrop" type="button" aria-label="Close panels" hidden></button>
  </div>

  <template id="sessionItemTemplate">
    <article class="session-item">
      <button class="session-main" type="button">
        <div class="session-title"></div>
        <div class="session-meta"></div>
      </button>

      <div class="session-actions">
        <button class="session-action session-pin" type="button">Pin</button>
        <button class="session-action session-rename" type="button">Rename</button>
        <button class="session-action session-duplicate" type="button">Duplicate</button>
        <button class="session-action session-delete danger" type="button">Delete</button>
      </div>
    </article>
  </template>

  <template id="messageItemTemplate">
    <article class="message-row">
      <div class="message-bubble">
        <div class="message-role"></div>
        <div class="message-content"></div>
      </div>
    </article>
  </template>

  <template id="memoryItemTemplate">
    <article class="memory-item">
      <div class="memory-item-top">
        <div class="memory-kind"></div>
        <button class="memory-delete-btn danger" type="button" aria-label="Delete memory">✕</button>
      </div>
      <div class="memory-value"></div>
    </article>
  </template>

  <script src="/static/js/nova-mobile-app.js?v=mobile_deep_fix_final_1"></script>
</body>
</html>
