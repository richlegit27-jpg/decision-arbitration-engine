<!DOCTYPE html>
<html lang="en">
<head>

<!-- NOVA_MOBILE_CONSOLE_SPAM_STOP_EARLY_QUIET_20260624 -->

<script>
/* NOVA_MOBILE_NATURAL_GRID_SCROLL_OWNER_20260624 */
(function () {
    "use strict";

    function scrollBottom() {
        var chat = document.getElementById("mobileChatMessages");
        if (!chat) return;

        requestAnimationFrame(function () {
            chat.scrollTop = chat.scrollHeight;
        });
    }

    window.NovaMobileLockComposerGeometry = scrollBottom;
    window.NovaMobileScrollBottomHard = scrollBottom;

    document.addEventListener("DOMContentLoaded", scrollBottom);
    window.addEventListener("load", scrollBottom);

    setTimeout(scrollBottom, 150);
    setTimeout(scrollBottom, 700);

    console.log("[Nova Mobile] natural grid scroll owner active");
})();
</script>

</body>
</html>
