<script>
(function () {
    if (window.__novaConsoleSpamStopEarlyQuiet) return;
    window.__novaConsoleSpamStopEarlyQuiet = true;

    const original = {
        log: console.log.bind(console),
        info: console.info.bind(console),
        warn: console.warn.bind(console),
        debug: console.debug.bind(console)
    };

    const blocked = [
        "NOVA_MOBILE_COPY_REGEN_DOM_SCAN_RESTORE_20260624",
        "NOVA_MOBILE_COPY_REGEN_AFTER_BUBBLE_20260624",
        "hosts 0",
        "hosts 1 rows 1",
        "bubble copy/regen observer ready",
        "regen observer ready",
        "Nova Mobile Canonical Session Owner",
        "Nova Mobile Primary Session Watchdog",
        "Nova Mobile Manual Session Lock",
        "Nova Mobile Session SingleFlight",
        "allowed-new-localStorage",
        "blocked session overwrite",
        "clicked session locked"
    ];

    function stringify(value) {
        try {
            if (typeof value === "string") return value;
            return JSON.stringify(value);
        } catch (error) {
            return String(value);
        }
    }

    function shouldBlock(args) {
        const text = args.map(stringify).join(" ");
        return blocked.some(item => text.includes(item));
    }

    ["log", "info", "warn", "debug"].forEach(method => {
        console[method] = function (...args) {
            if (shouldBlock(args)) return;
            original[method](...args);
        };
    });

    original.log("[Nova Console Quiet] ready");
})();
</script>

<script>
(function () {
    "use strict";

    function ready(fn) {
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", fn);
            return;
        }

        fn();
    }

    ready(function () {
        const toolsButton = document.getElementById("nova-mobile-tools-toggle");
        const toolsPanel = document.getElementById("nova-mobile-tools-panel");

        if (!toolsButton || !toolsPanel) {
            console.warn("[Nova Mobile] tools menu fallback missing elements", {
                toolsButton: !!toolsButton,
                toolsPanel: !!toolsPanel,
            });
            return;
        }

        toolsButton.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();

            toolsPanel.classList.toggle("hidden");

            const isOpen = !toolsPanel.classList.contains("hidden");
            toolsButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        toolsButton.setAttribute("aria-controls", "nova-mobile-tools-panel");
        toolsButton.setAttribute("aria-expanded", "false");

        console.log("[Nova Mobile] tools menu fallback wired");
    });
})();
</script>

<script>
(function () {
    "use strict";

    function $(id) {
        return document.getElementById(id);
    }

    function forceHide(panel) {
        if (!panel) return;

        panel.classList.add("hidden");
        panel.setAttribute("aria-hidden", "true");
        panel.style.setProperty("display", "none", "important");
    }

    function forceShow(panel, topOrBottom) {
        if (!panel) return;

        panel.classList.remove("hidden");
        panel.setAttribute("aria-hidden", "false");

        panel.style.setProperty("display", "flex", "important");
        panel.style.setProperty("position", "fixed", "important");
        panel.style.setProperty("left", "10px", "important");
        panel.style.setProperty("right", "10px", "important");
        panel.style.setProperty("z-index", "999999", "important");
        panel.style.setProperty("flex-direction", "column", "important");
        panel.style.setProperty("gap", "10px", "important");
        panel.style.setProperty("padding", "14px", "important");
        panel.style.setProperty("background", "#111827", "important");
        panel.style.setProperty("border", "1px solid rgba(255,255,255,.18)", "important");
        panel.style.setProperty("border-radius", "18px", "important");
        panel.style.setProperty("box-shadow", "0 24px 80px rgba(0,0,0,.55)", "important");

        if (topOrBottom === "bottom") {
            panel.style.setProperty("bottom", "90px", "important");
            panel.style.removeProperty("top");
        } else {
            panel.style.setProperty("top", "76px", "important");
            panel.style.removeProperty("bottom");
        }
    }

    function replaceButton(id) {
        var oldButton = $(id);

        if (!oldButton || !oldButton.parentNode) {
            return null;
        }

        var newButton = oldButton.cloneNode(true);
        newButton.removeAttribute("onclick");
        oldButton.parentNode.replaceChild(newButton, oldButton);

        return newButton;
    }

    function closeAllPanels() {
        forceHide($("nova-mobile-sessions-panel"));
        forceHide($("nova-mobile-tools-panel"));
        forceHide($("nova-mobile-memory-panel"));
        forceHide($("nova-mobile-execution-panel"));
    }

    function wire() {
        var sessionsButton = replaceButton("nova-mobile-sessions-toggle");
        var toolsButton = replaceButton("nova-mobile-tools-toggle");

        var sessionsPanel = $("nova-mobile-sessions-panel");
        var toolsPanel = $("nova-mobile-tools-panel");
        var memoryPanel = $("nova-mobile-memory-panel");
        var executionPanel = $("nova-mobile-execution-panel");

        closeAllPanels();
        // NOVA_MOBILE_REMOVE_INLINE_SESSION_OWNER_20260608
        // Sessions are owned by external mobile session JS/hard bridge.
        // Template only provides fallback close behavior.
        window.NovaCloseMobileSessions = window.NovaCloseMobileSessions || function () {
            forceHide(sessionsPanel);
        };

        window.NovaOpenMobileTools = function () {
            closeAllPanels();
            forceShow(toolsPanel, "bottom");
        };

        window.NovaCloseMobileTools = function () {
            forceHide(toolsPanel);
        };

        window.NovaOpenMobileMemory = function () {
            closeAllPanels();
            forceShow(memoryPanel, "top");
        };

        window.NovaCloseMobileMemory = function () {
            forceHide(memoryPanel);
        };

        window.NovaOpenMobileExecution = function () {
            closeAllPanels();
            forceShow(executionPanel, "top");
        };

        window.NovaCloseMobileExecution = function () {
            forceHide(executionPanel);
        };
        // NOVA_TEMPLATE_SESSIONS_CLICK_REMOVED_20260608_FIXED: sessions click is owned by static/js/mobile/nova-mobile-events.js

        if (toolsButton) {
            toolsButton.addEventListener("click", function (event) {
                event.preventDefault();
                event.stopPropagation();
                window.NovaOpenMobileTools();
            });
        }

        document.querySelectorAll("button").forEach(function (button) {
            var text = (button.textContent || "").trim().toLowerCase();
            var tool = button.getAttribute("data-mobile-tool");

            if (text === "close sessions") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileSessions();
                });
            }

            if (text === "close") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileTools();
                });
            }

            if (text === "memory" || button.id === "nova-mobile-memory-toggle") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaOpenMobileMemory();
                });
            }

            if (text === "close memory" || button.id === "nova-mobile-memory-close") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileMemory();
                });
            }

            if (tool === "execution" || text === "open execution panel") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaOpenMobileExecution();
                });
            }

            if (text === "close execution" || button.id === "nova-mobile-execution-close") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileExecution();
                });
            }
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") {
                closeAllPanels();
            }
        });

        console.log("[Nova Mobile] panel hard lock active");
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", wire);
    } else {
        wire();
    }
})();
</script>

<script>
(function () {
    "use strict";

    var pill = document.getElementById("nova-backend-readiness-pill");
    var button = document.getElementById("nova-backend-readiness-button");

    if (!pill || !button) return;

    function setText(id, value) {
        var el = document.getElementById(id);
        if (el) el.textContent = value;
    }

    function percent(value) {
        var number = Number(value);
        if (!Number.isFinite(number)) return "--%";
        return Math.round(number) + "%";
    }

    function setButtonState(overall) {
        button.classList.remove("ready", "warn", "fail");

        if (!Number.isFinite(overall)) {
            button.classList.add("fail");
            button.textContent = "Backend offline";
            return;
        }

        button.textContent = "Backend " + Math.round(overall) + "%";

        if (overall >= 90) {
            button.classList.add("ready");
        } else if (overall >= 70) {
            button.classList.add("warn");
        } else {
            button.classList.add("fail");
        }
    }

    async function refreshReadiness() {
        try {
            var response = await fetch("/api/backend/readiness", {
                method: "GET",
                headers: {
                    "Accept": "application/json"
                },
                cache: "no-store"
            });

            if (!response.ok) {
                throw new Error("Readiness endpoint returned " + response.status);
            }

            var data = await response.json();
            var overall = Number(data.overall_backend_readiness);

            setButtonState(overall);

            setText("nova-readiness-overall", percent(data.overall_backend_readiness));
            setText("nova-readiness-memory", percent(data.memory_percent));
            setText("nova-readiness-agency", percent(data.agency_percent));
            setText("nova-readiness-planner", percent(data.planner_percent));
            setText("nova-readiness-session", percent(data.session_percent));
            setText("nova-readiness-execution", percent(data.execution_percent));

            setText(
                "nova-readiness-records",
                "E:" + (data.execution_records ?? "--") +
                " M:" + (data.memory_items ?? "--") +
                " S:" + (data.session_records ?? "--")
            );
        } catch (error) {
            setButtonState(NaN);
            setText("nova-readiness-overall", "offline");
            setText("nova-readiness-memory", "--%");
            setText("nova-readiness-agency", "--%");
            setText("nova-readiness-planner", "--%");
            setText("nova-readiness-session", "--%");
            setText("nova-readiness-execution", "--%");
            setText("nova-readiness-records", "--");
            console.warn("[Nova Backend Readiness]", error);
        }
    }

    button.addEventListener("click", function () {
        pill.classList.toggle("open");
        refreshReadiness();
    });

    refreshReadiness();
    window.setInterval(refreshReadiness, 15000);
})();
</script>

<script>
(function () {
  "use strict";

  const MARKER = "NOVA_MOBILE_FETCH_MISSING_SESSION_FALLBACK_20260611";

  function esc(value) {
    return String(value == null ? "" : value).replace(/[&<>"']/g, function (ch) {
      return {
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch] || ch;
    });
  }

  function getActiveSessionId() {
    try {
      return String(
        window.NovaMobileActiveSessionId ||
        window.novaMobileActiveSessionId ||
        window.NovaCurrentSessionId ||
        window.currentSessionId ||
        window.activeSessionId ||
        localStorage.getItem("nova_active_session_id") ||
        localStorage.getItem("active_session_id") ||
        localStorage.getItem("nova_mobile_active_session_id") ||
        ""
      ).trim();
    } catch (_) {
      return "";
    }
  }

  function getMobileBox() {
    let box =
      document.getElementById("mobileChatMessages") ||
      document.getElementById("nova-mobile-chat-messages") ||
      document.getElementById("nova-mobile-messages") ||
      document.querySelector("[data-mobile-chat-messages]") ||
      document.querySelector(".mobile-chat-messages") ||
      document.querySelector(".mobile-chat-container");

    if (box) return box;

    const host =
      document.querySelector("main") ||
      document.body;

    box = document.createElement("div");
    box.id = "nova-mobile-session-rescue-messages";
    box.className = "mobile-chat-messages nova-mobile-session-rescue-messages";
    box.style.padding = "14px";
    box.style.margin = "10px";
    box.style.borderRadius = "16px";
    box.style.background = "rgba(255,255,255,.04)";
    host.appendChild(box);
    return box;
  }

  function attachmentName(attachment) {
    if (!attachment || typeof attachment !== "object") return "";
    return String(
      attachment.original_filename ||
      attachment.filename ||
      attachment.name ||
      attachment.stored_name ||
      "attachment"
    );
  }

  function sourceCardsHtml(message) {
    try {
      const meta = message && typeof message === "object" ? (message.meta || {}) : {};
      const sources = Array.isArray(meta.sources) ? meta.sources : [];
      if (!sources.length) return "";

      return [
        '<div class="nova-source-cards" style="margin-top:10px;display:grid;gap:8px;">',
        sources.map(function (src) {
          const title = esc(src.title || src.source || src.url || "Source");
          const url = esc(src.url || "");
          const snippet = esc(src.snippet || "");
          const source = esc(src.source || "");
          const titleHtml = url
            ? '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + title + '</a>'
            : title;

          return [
            '<div class="nova-source-card" style="padding:10px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);">',
            '<div style="font-weight:700;">' + titleHtml + '</div>',
            source ? '<div style="opacity:.7;font-size:12px;margin-top:2px;">' + source + '</div>' : '',
            snippet ? '<div style="opacity:.85;font-size:13px;margin-top:6px;">' + snippet + '</div>' : '',
            '</div>'
          ].join("");
        }).join(""),
        '</div>'
      ].join("");
    } catch (_) {
      return "";
    }
  }

  function renderMobileSession(session) {
    const box = getMobileBox();
    const messages = Array.isArray(session && session.messages) ? session.messages : [];

    if (!messages.length) {
      box.innerHTML = '<div class="mobile-empty-state">No messages in this session.</div>';
      return 0;
    }

    box.innerHTML = messages.map(function (message) {
      const role = esc(message.role || "message");
      const id = esc(message.id || "");
      const text = esc(message.text || "");
      const attachments = Array.isArray(message.attachments) ? message.attachments : [];
      const attachmentHtml = attachments.length
        ? '<div class="nova-message-attachments" style="margin-top:10px;opacity:.75;font-size:12px;">Attachments: ' +
          esc(attachments.map(attachmentName).filter(Boolean).join(", ")) +
          '</div>'
        : "";

      return [
        '<div class="mobile-message message chat-message ' + role + '" data-message-id="' + id + '" style="padding:14px;margin:10px 0;border-radius:14px;background:rgba(255,255,255,.06);">',

        '<div style="white-space:pre-wrap;">' + text + '</div>',
        attachmentHtml,
        sourceCardsHtml(message),
        '</div>'
      ].join("");
    }).join("");

    box.scrollTop = box.scrollHeight;
    return messages.length;
  }

  async function fetchAndRenderMobileSession(sessionId) {
    if (!sessionId) return false;

    const response = await fetch("/api/sessions/" + encodeURIComponent(sessionId), {
      headers: { "Accept": "application/json" }
    });

    const data = await response.json().catch(function () {
      return null;
    });

    if (!response.ok || !data || !data.ok || !data.session) {
      console.warn("[Nova Mobile Rescue] session detail fallback failed", sessionId, data);
      return false;
    }

    const rendered = renderMobileSession(data.session);
    console.log("[Nova Mobile Rescue] fetched missing session and rendered messages", {
      session_id: sessionId,
      rendered: rendered
    });
    return rendered > 0;
  }

  function installMobileFallback() {
    if (window.__novaMobileFetchMissingSessionFallbackInstalled) return;
    window.__novaMobileFetchMissingSessionFallbackInstalled = true;

    window.NovaMobileFetchAndRenderSession = fetchAndRenderMobileSession;

    const names = [
      "renderMobileChatMessages",
      "renderNovaMobileMessages",
      "NovaRenderMobileMessages",
      "renderMessages",
      "loadMobileSession",
      "openMobileSession"
    ];

    names.forEach(function (name) {
      const original = typeof window[name] === "function" ? window[name] : null;
      if (!original || original.__novaMobileMissingSessionWrapped) return;

      const wrapped = function () {
        const result = original.apply(this, arguments);
        setTimeout(function () {
          try {
            const sessionId = getActiveSessionId();
            const box = getMobileBox();
            const renderedCount = box.querySelectorAll("[data-message-id]").length;
            if (sessionId && renderedCount < 1) {
              fetchAndRenderMobileSession(sessionId);
            }
          } catch (err) {
            console.warn("[Nova Mobile Rescue] missing-session fallback skipped", err);
          }
        }, 100);
        return result;
      };

      wrapped.__novaMobileMissingSessionWrapped = true;
      window[name] = wrapped;
    });

    console.log("[Nova Mobile Rescue] fetch missing session fallback ready", MARKER);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", installMobileFallback);
  } else {
    installMobileFallback();
  }
})();

<script>
(function () {
    "use strict";

    const FIX_ID = "NOVA_MOBILE_TOP_ACTION_USER_LANES_SAFE_20260623";

    function textOf(el) {
        return String((el && el.textContent) || "")
            .replace(/\s+/g, " ")
            .trim()
            .toLowerCase();
    }

    function attrBag(el) {
        if (!el) return "";

        return [
            textOf(el),
            el.id || "",
            el.className || "",
            el.getAttribute && el.getAttribute("aria-label") || "",
            el.getAttribute && el.getAttribute("title") || "",
            el.getAttribute && el.getAttribute("href") || ""
        ].join(" ").toLowerCase();
    }

    function isAuthButton(el) {
        if (!el || !el.matches || !el.matches("a, button")) return false;

        const bag = attrBag(el);
        const text = textOf(el);

        return (
            text === "login" ||
            text === "log in" ||
            text === "logout" ||
            text === "log out" ||
            text === "sign in" ||
            text === "sign out" ||
            bag.includes(" login") ||
            bag.includes(" logout") ||
            bag.includes("sign in") ||
            bag.includes("sign out")
        );
    }

    function isBackendButton(el) {
        if (!el || !el.matches || !el.matches("a, button")) return false;
        if (isAuthButton(el)) return false;

        const bag = attrBag(el);
        const text = textOf(el);

        return (
            text === "backend" ||
            text === "api" ||
            text === "server" ||
            bag.includes("backend") ||
            bag.includes("api status") ||
            bag.includes("server status")
        );
    }

    function isCopyExportButton(el) {
        if (!el || !el.matches || !el.matches("a, button")) return false;

        const bag = attrBag(el);
        const text = textOf(el);

        return (
            text === "copy" ||
            text === "export" ||
            bag.includes("copy") ||
            bag.includes("export")
        );
    }

    function isVisible(el) {
        if (!el || !el.getBoundingClientRect) return false;

        const rect = el.getBoundingClientRect();
        const cs = getComputedStyle(el);

        return (
            rect.width > 4 &&
            rect.height > 4 &&
            cs.display !== "none" &&
            cs.visibility !== "hidden" &&
            cs.opacity !== "0"
        );
    }

    function isUserIdentityNode(el) {
        if (!el || !el.matches) return false;
        if (el.matches("script, style, input, textarea, select, option")) return false;
        if (el.closest(".nova-mobile-auth-dock, .nova-mobile-backend-dock, .nova-mobile-user-dock")) return false;
        if (el.matches("a, button")) return false;

        const rect = el.getBoundingClientRect();
        if (rect.top > 145 || rect.width < 12 || rect.height < 8) return false;

        const text = textOf(el);
        const bag = attrBag(el);

        if (!text || text.length > 80) return false;

        return (
            bag.includes("username") ||
            bag.includes("user-name") ||
            bag.includes("user name") ||
            bag.includes("account") ||
            bag.includes("profile") ||
            bag.includes("current-user") ||
            text.includes("@") ||
            text === "richard" ||
            text.includes("richlegit27") ||
            text === "joe"
        );
    }

    function ensureDock(className) {
        let dock = document.querySelector("." + className);

        if (!dock) {
            dock = document.createElement("div");
            dock.className = className;
            document.body.appendChild(dock);
        }

        return dock;
    }

    function dockFirstMatching(kind) {
        const dockClass =
            kind === "auth"
                ? "nova-mobile-auth-dock"
                : "nova-mobile-backend-dock";

        const buttonClass =
            kind === "auth"
                ? "nova-mobile-auth-button"
                : "nova-mobile-backend-button";

        const matcher =
            kind === "auth"
                ? isAuthButton
                : isBackendButton;

        const dock = ensureDock(dockClass);

        const docked = Array.from(dock.querySelectorAll("a, button")).filter(matcher);

        const loose = Array.from(document.querySelectorAll("a, button"))
            .filter(matcher)
            .filter(function (el) {
                return !el.closest("." + dockClass);
            });

        const all = docked.concat(loose);

        if (!all.length) return;

        const keeper = all[0];

        keeper.classList.add(buttonClass);
        keeper.classList.remove("nova-mobile-hidden-duplicate");
        keeper.removeAttribute("aria-hidden");
        keeper.tabIndex = 0;

        if (keeper.parentElement !== dock) {
            dock.appendChild(keeper);
        }

        all.slice(1).forEach(function (el) {
            el.classList.add("nova-mobile-hidden-duplicate");
            el.setAttribute("aria-hidden", "true");
            el.tabIndex = -1;
        });
    }

    function dockUserIdentity() {
        const dock = ensureDock("nova-mobile-user-dock");

        let existing = dock.querySelector(".nova-mobile-user-pill");
        if (existing) return;

        const candidates = Array.from(document.querySelectorAll("span, div, p, small, strong"))
            .filter(isUserIdentityNode)
            .filter(isVisible);

        if (!candidates.length) return;

        const original = candidates[0];
        const label = document.createElement("div");

        label.className = "nova-mobile-user-pill";
        label.textContent = String(original.textContent || "User").replace(/\s+/g, " ").trim();

        dock.appendChild(label);

        original.classList.add("nova-mobile-hidden-duplicate");
        original.setAttribute("aria-hidden", "true");
    }

    function restoreCopyExportButtons() {
        Array.from(document.querySelectorAll("a, button"))
            .filter(isCopyExportButton)
            .forEach(function (btn) {
                btn.classList.remove("nova-mobile-copy-export-shift");
                btn.classList.remove("nova-mobile-hidden-duplicate");
                btn.removeAttribute("aria-hidden");

                if (btn.style) {
                    btn.style.removeProperty("right");
                    btn.style.removeProperty("transform");
                    btn.style.removeProperty("pointer-events");
                    btn.style.removeProperty("display");
                    btn.style.removeProperty("visibility");
                    btn.style.removeProperty("opacity");
                }

                if (btn.tabIndex < 0) {
                    btn.tabIndex = 0;
                }
            });

        document.querySelectorAll(".nova-mobile-copy-export-safe-row").forEach(function (row) {
            row.classList.remove("nova-mobile-copy-export-safe-row");
            row.style.removeProperty("padding-right");
        });
    }

    function applyFix() {
        restoreCopyExportButtons();
        dockFirstMatching("auth");
        dockUserIdentity();
        dockFirstMatching("backend");
        restoreCopyExportButtons();
    }

    let novaMobileDockFixQueued = false;
    let novaMobileDockFixTimer = null;
    let novaMobileDockFixLastRun = 0;

    function runDockFixOnce() {
        novaMobileDockFixQueued = false;
        novaMobileDockFixTimer = null;
        novaMobileDockFixLastRun = Date.now();
        applyFix();
    }

    function scheduleFix() {
        const now = Date.now();

        if (novaMobileDockFixQueued) {
            return;
        }

        novaMobileDockFixQueued = true;

        if (now - novaMobileDockFixLastRun < 180) {
            novaMobileDockFixTimer = setTimeout(runDockFixOnce, 180);
            return;
        }

        requestAnimationFrame(runDockFixOnce);
    }

    function scheduleFixSlow() {
        if (novaMobileDockFixTimer) {
            clearTimeout(novaMobileDockFixTimer);
        }

        novaMobileDockFixQueued = true;
        novaMobileDockFixTimer = setTimeout(runDockFixOnce, 220);
    }

    document.addEventListener("DOMContentLoaded", scheduleFix);
    document.addEventListener("click", scheduleFix, true);
    document.addEventListener("pointerup", scheduleFix, true);

    const observer = new MutationObserver(scheduleFixSlow);

    observer.observe(document.documentElement, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ["class", "style"]
    });

    console.log("[Nova Mobile Dock Fix Debounced] ready");

    window.NovaMobileFixTopActionUserLanesSafe = applyFix;

    scheduleFix();

    console.log("[" + FIX_ID + "] ready");
})();
</script>

}

<script>
(function () {
    "use strict";

    const FIX_ID = "NOVA_MOBILE_MEMORY_REAL_PANEL_V2_20260623";

    function getApiKey() {
        return (
            window.API_KEY ||
            window.NOVA_API_KEY ||
            window.apiKey ||
            localStorage.getItem("nova_api_key") ||
            localStorage.getItem("NOVA_API_KEY") ||
            "dev"
        );
    }

    function textOf(el) {
        return String((el && el.textContent) || "")
            .replace(/\s+/g, " ")
            .trim()
            .toLowerCase();
    }

    function attrBag(el) {
        if (!el) return "";

        return [
            textOf(el),
            el.id || "",
            el.className || "",
            el.getAttribute && el.getAttribute("aria-label") || "",
            el.getAttribute && el.getAttribute("title") || "",
            el.getAttribute && el.getAttribute("href") || ""
        ].join(" ").toLowerCase();
    }

    function isMemoryButton(el) {
        if (!el || !el.matches || !el.matches("a, button")) return false;
        if (el.id === "novaMobileMemoryV2Close") return false;
        if (el.closest("#novaMobileMemoryV2Overlay")) return false;

        const bag = attrBag(el);
        const text = textOf(el);

        return text === "memory" || text.includes("memory") || bag.includes("memory");
    }

    function ensureOverlay() {
        let overlay = document.getElementById("novaMobileMemoryV2Overlay");

        if (!overlay) {
            overlay = document.createElement("div");
            overlay.id = "novaMobileMemoryV2Overlay";
            overlay.innerHTML = `
                <section id="novaMobileMemoryV2Panel" role="dialog" aria-modal="true" aria-label="Nova memory">
                    <div id="novaMobileMemoryV2Head">
                        <div style="display:flex;align-items:center;gap:8px;min-width:0;">
                            <div id="novaMobileMemoryV2Title">Memory</div>
                            <div id="novaMobileMemoryV2Count">0</div>
                        </div>
                        <button id="novaMobileMemoryV2Close" type="button">Close</button>
                    </div>
                    <div id="novaMobileMemoryV2Body">
                        <div class="nova-mobile-memory-v2-state">Loading memory?</div>
                    </div>
                </section>
            `;
            document.body.appendChild(overlay);
        }

        const close = overlay.querySelector("#novaMobileMemoryV2Close");
        if (close && !close.dataset.novaBound) {
            close.dataset.novaBound = "1";
            close.addEventListener("click", function (event) {
                event.preventDefault();
                event.stopPropagation();
                overlay.classList.remove("is-open");
            }, true);
        }

        if (!overlay.dataset.novaBackdropBound) {
            overlay.dataset.novaBackdropBound = "1";
            overlay.addEventListener("click", function (event) {
                if (event.target === overlay) {
                    overlay.classList.remove("is-open");
                }
            }, true);
        }

        return overlay;
    }

    function setState(message, countText) {
        const overlay = ensureOverlay();
        const body = overlay.querySelector("#novaMobileMemoryV2Body");
        const count = overlay.querySelector("#novaMobileMemoryV2Count");

        if (count) count.textContent = countText || "0";
        if (body) {
            body.innerHTML = "";
            const div = document.createElement("div");
            div.className = "nova-mobile-memory-v2-state";
            div.textContent = message;
            body.appendChild(div);
        }
    }

    function extractMemories(payload) {
        if (!payload) return [];

        if (Array.isArray(payload)) return payload;

        if (payload.data && Array.isArray(payload.data.memory)) return payload.data.memory;
        if (payload.data && Array.isArray(payload.data.memories)) return payload.data.memories;

        if (Array.isArray(payload.memory)) return payload.memory;
        if (Array.isArray(payload.memories)) return payload.memories;

        return [];
    }

    function shortDate(value) {
        if (!value) return "";

        try {
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return "";
            return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
        } catch (_) {
            return "";
        }
    }

    function renderMemories(payload) {
        const overlay = ensureOverlay();
        const body = overlay.querySelector("#novaMobileMemoryV2Body");
        const count = overlay.querySelector("#novaMobileMemoryV2Count");
        const memories = extractMemories(payload);

        if (count) count.textContent = String(memories.length);

        if (!body) return;

        body.innerHTML = "";

        if (!memories.length) {
            setState("No memory items found from /api/memory.", "0");
            return;
        }

        memories
            .slice()
            .sort(function (a, b) {
                if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
                return String(b.updated_at || "").localeCompare(String(a.updated_at || ""));
            })
            .forEach(function (item) {
                const card = document.createElement("article");
                card.className = "nova-mobile-memory-v2-card";
                if (item.pinned) card.classList.add("is-pinned");

                const meta = document.createElement("div");
                meta.className = "nova-mobile-memory-v2-meta";

                const kind = document.createElement("div");
                kind.className = "nova-mobile-memory-v2-kind";
                kind.textContent = (item.pinned ? "Pinned ? " : "") + (item.kind || item.type || "memory");

                const date = document.createElement("div");
                date.className = "nova-mobile-memory-v2-date";
                date.textContent = shortDate(item.updated_at || item.created_at);

                const text = document.createElement("div");
                text.className = "nova-mobile-memory-v2-text";
                text.textContent = item.text || item.content || item.value || item.summary || "";

                meta.appendChild(kind);
                meta.appendChild(date);
                card.appendChild(meta);
                card.appendChild(text);
                body.appendChild(card);
            });
    }

    async function loadMemory() {
        setState("Loading memory?", "?");

        try {
            const response = await fetch("/api/memory", {
                method: "GET",
                headers: {
                    "x-api-key": getApiKey()
                }
            });

            const payload = await response.json();

            console.log("[" + FIX_ID + "] payload", payload);

            if (!response.ok || payload.ok === false) {
                throw new Error(payload.error || payload.message || "Memory request failed.");
            }

            renderMemories(payload);
        } catch (error) {
            console.warn("[" + FIX_ID + "] failed", error);
            setState("Could not load memory: " + String(error && error.message || error), "!");
        }
    }

    function openMemory() {
        const overlay = ensureOverlay();
        overlay.classList.add("is-open");
        loadMemory();
    }

    function bindMemoryButtons() {
        Array.from(document.querySelectorAll("a, button"))
            .filter(isMemoryButton)
            .forEach(function (btn) {
                if (btn.dataset.novaMemoryV2Bound === "1") return;

                btn.dataset.novaMemoryV2Bound = "1";
                btn.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    event.stopImmediatePropagation();
                    openMemory();
                    return false;
                }, true);
            });
    }

    function scheduleBind() {
        [50, 200, 600, 1200].forEach(function (ms) {
            setTimeout(bindMemoryButtons, ms);
        });
    }

    document.addEventListener("DOMContentLoaded", scheduleBind);
    document.addEventListener("click", scheduleBind, true);

    const observer = new MutationObserver(scheduleBind);
    observer.observe(document.documentElement, {
        childList: true,
        subtree: true
    });

    document.addEventListener("keyup", function (event) {
        if (event.key === "Escape") {
            const overlay = document.getElementById("novaMobileMemoryV2Overlay");
            if (overlay) overlay.classList.remove("is-open");
        }
    });

    window.NovaMobileOpenMemoryPanelV2 = openMemory;
    window.NovaMobileLoadMemoryPanelV2 = loadMemory;

    ensureOverlay();
    scheduleBind();

    console.log("[" + FIX_ID + "] ready");
})();
</script>

<script>
(function () {
    "use strict";

    const FIX_ID = "NOVA_MOBILE_MEMORY_V2_ADD_BOX_20260623";

    function getApiKey() {
        return (
            window.API_KEY ||
            window.NOVA_API_KEY ||
            window.apiKey ||
            localStorage.getItem("nova_api_key") ||
            localStorage.getItem("NOVA_API_KEY") ||
            "dev"
        );
    }

    function getOverlay() {
        return document.getElementById("novaMobileMemoryV2Overlay");
    }

    function getPanel() {
        return document.getElementById("novaMobileMemoryV2Panel");
    }

    function closeMemoryPanelHard() {
        const overlay = getOverlay();
        if (!overlay) return;

        overlay.classList.remove("is-open");
        overlay.style.display = "none";

        setTimeout(function () {
            overlay.style.removeProperty("display");
        }, 250);
    }

    function setAddStatus(text) {
        const status = document.getElementById("novaMobileMemoryV2AddStatus");
        if (status) status.textContent = text || "";
    }

    async function saveMobileMemory() {
        const input = document.getElementById("novaMobileMemoryV2Input");
        const kind = document.getElementById("novaMobileMemoryV2Kind");
        const save = document.getElementById("novaMobileMemoryV2Save");

        const text = String((input && input.value) || "").trim();
        const kindValue = String((kind && kind.value) || "preference").trim();

        if (!text) {
            setAddStatus("Type something to remember first.");
            if (input) input.focus();
            return;
        }

        if (save) {
            save.disabled = true;
            save.textContent = "Saving";
        }

        setAddStatus("Saving memory?");

        try {
            const response = await fetch("/api/memory/add", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-api-key": getApiKey()
                },
                body: JSON.stringify({
                    text: text,
                    kind: kindValue,
                    pinned: false
                })
            });

            const payload = await response.json();

            console.log("[" + FIX_ID + "] add payload", payload);

            if (!response.ok || payload.ok === false) {
                throw new Error(payload.error || payload.message || "Save failed.");
            }

            if (input) input.value = "";

            setAddStatus("Saved.");

            if (typeof window.NovaMobileLoadMemoryPanelV2 === "function") {
                window.NovaMobileLoadMemoryPanelV2();
            }
        } catch (error) {
            console.warn("[" + FIX_ID + "] save failed", error);
            setAddStatus("Could not save: " + String(error && error.message || error));
        } finally {
            if (save) {
                save.disabled = false;
                save.textContent = "Save";
            }
        }
    }

    function installAddBox() {
        const panel = getPanel();

        if (!panel) return;
        if (document.getElementById("novaMobileMemoryV2AddBox")) return;

        const body = document.getElementById("novaMobileMemoryV2Body");
        const addBox = document.createElement("div");

        addBox.id = "novaMobileMemoryV2AddBox";
        addBox.innerHTML = `
            <select id="novaMobileMemoryV2Kind" aria-label="Memory kind">
                <option value="preference">Preference</option>
                <option value="people">People</option>
                <option value="project">Project</option>
                <option value="note">Note</option>
            </select>
            <button id="novaMobileMemoryV2Save" type="button">Save</button>
            <input id="novaMobileMemoryV2Input" type="text" placeholder="Add memory, e.g. favorite color is purple">
            <div id="novaMobileMemoryV2AddStatus"></div>
        `;

        if (body && body.parentElement === panel) {
            panel.insertBefore(addBox, body);
        } else {
            panel.appendChild(addBox);
        }

        const save = document.getElementById("novaMobileMemoryV2Save");
        const input = document.getElementById("novaMobileMemoryV2Input");

        if (save) {
            save.addEventListener("click", function (event) {
                event.preventDefault();
                event.stopPropagation();
                saveMobileMemory();
            }, true);
        }

        if (input) {
            input.addEventListener("keydown", function (event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    event.stopPropagation();
                    saveMobileMemory();
                }
            }, true);
        }
    }

    function bindCloseHard() {
        document.addEventListener("pointerdown", function (event) {
            const close = event.target.closest && event.target.closest("#novaMobileMemoryV2Close");
            const overlay = getOverlay();

            if (close || (overlay && event.target === overlay)) {
                event.preventDefault();
                event.stopPropagation();
                event.stopImmediatePropagation();
                closeMemoryPanelHard();
                return false;
            }
        }, true);

        document.addEventListener("click", function (event) {
            const close = event.target.closest && event.target.closest("#novaMobileMemoryV2Close");
            const overlay = getOverlay();

            if (close || (overlay && event.target === overlay)) {
                event.preventDefault();
                event.stopPropagation();
                event.stopImmediatePropagation();
                closeMemoryPanelHard();
                return false;
            }
        }, true);
    }

    function scheduleInstall() {
        [50, 200, 600, 1200, 1800].forEach(function (ms) {
            setTimeout(installAddBox, ms);
        });
    }

    document.addEventListener("DOMContentLoaded", scheduleInstall);
    document.addEventListener("click", scheduleInstall, true);

    const observer = new MutationObserver(scheduleInstall);
    observer.observe(document.documentElement, {
        childList: true,
        subtree: true
    });

    bindCloseHard();

    window.NovaMobileInstallMemoryAddBox = installAddBox;
    window.NovaMobileSaveMemoryFromPanel = saveMobileMemory;
    window.NovaMobileCloseMemoryPanelHard = closeMemoryPanelHard;

    scheduleInstall();

    console.log("[" + FIX_ID + "] ready");
})();
</script>

<script>
(function () {
    "use strict";

    const FIX_ID = "NOVA_MOBILE_TOP_COPY_EXPORT_SESSION_20260623";

    function $(id) {
        return document.getElementById(id);
    }

    function clean(value) {
        return String(value || "")
            .replace(/\r/g, "")
            .replace(/[ \t]+\n/g, "\n")
            .replace(/\n[ \t]+/g, "\n")
            .replace(/\n{3,}/g, "\n\n")
            .trim();
    }

    function toast(message) {
        if (typeof window.showToast === "function") {
            window.showToast(message);
            return;
        }

        if (window.NovaMobileUI && typeof window.NovaMobileUI.showToast === "function") {
            window.NovaMobileUI.showToast(message);
            return;
        }

        console.log("[" + FIX_ID + "] " + message);
    }

    function getApiKey() {
        return (
            window.API_KEY ||
            window.NOVA_API_KEY ||
            window.apiKey ||
            localStorage.getItem("nova_api_key") ||
            localStorage.getItem("NOVA_API_KEY") ||
            "dev"
        );
    }

    function getSessionId() {
        try {
            if (window.NovaMobileBridge && typeof window.NovaMobileBridge.getSessionId === "function") {
                const sid = window.NovaMobileBridge.getSessionId();

                if (sid) return sid;
            }
        } catch (_) {}

        const keys = [
            "nova_mobile_active_session_id",
            "novaMobileSessionId",
            "active_session_id",
            "session_id",
            "nova_session_id"
        ];

        for (const key of keys) {
            try {
                const value = localStorage.getItem(key);

                if (value) return value;
            } catch (_) {}
        }

        return "";
    }

    function extractMessages(payload) {
        if (!payload) return [];

        if (Array.isArray(payload.messages)) return payload.messages;
        if (payload.session && Array.isArray(payload.session.messages)) return payload.session.messages;
        if (payload.data && Array.isArray(payload.data.messages)) return payload.data.messages;
        if (payload.chat && Array.isArray(payload.chat.messages)) return payload.chat.messages;

        return [];
    }

    function roleOf(message) {
        const raw = String(
            message.role ||
            message.sender ||
            message.type ||
            message.author ||
            ""
        ).toLowerCase();

        if (raw.includes("user") || raw.includes("human")) return "user";
        if (raw.includes("assistant") || raw.includes("bot") || raw.includes("ai")) return "assistant";

        return "";
    }

    function textOfMessage(message) {
        return clean(
            message.text ||
            message.content ||
            message.body ||
            message.message ||
            message.value ||
            message.output ||
            ""
        );
    }

    function formatSessionMessages(messages) {
        const parts = [];

        messages.forEach(function (message) {
            const role = roleOf(message);
            const value = textOfMessage(message);

            if (!role || !value) return;
            if (value === "New chat started and saved to Sessions.") return;

            parts.push(role + "\n" + value);
        });

        return clean(parts.join("\n\n"));
    }

    async function fetchSessionTranscript() {
        const sessionId = getSessionId();

        if (!sessionId) return "";

        const urls = [
            "/api/sessions/" + encodeURIComponent(sessionId),
            "/api/chat/" + encodeURIComponent(sessionId)
        ];

        for (const url of urls) {
            try {
                const response = await fetch(url, {
                    method: "GET",
                    headers: {
                        "Accept": "application/json",
                        "x-api-key": getApiKey()
                    }
                });

                if (!response.ok) continue;

                const payload = await response.json();
                const messages = extractMessages(payload);
                const transcript = formatSessionMessages(messages);

                if (transcript) return transcript;
            } catch (_) {}
        }

        return "";
    }

    function getDomTranscriptFallback() {
        const root =
            $("mobileChatMessages") ||
            $("nova-mobile-messages") ||
            $("messagesContainer") ||
            $("messages-container") ||
            document.querySelector("[data-mobile-chat-messages]") ||
            document.querySelector(".mobile-chat-messages") ||
            document.querySelector(".mobile-chat-container") ||
            document.querySelector(".chat-messages");

        if (!root) return "";

        const clone = root.cloneNode(true);

        clone.querySelectorAll([
            "button",
            ".nova-mobile-assistant-actions",
            ".nova-mobile-message-actions",
            ".nova-code-copy-btn",
            ".mobile-panel",
            "#nova-mobile-tools-panel",
            "#nova-mobile-artifacts-panel",
            "#nova-mobile-execution-panel",
            "#nova-mobile-memory-panel",
            "[data-mobile-assistant-action]"
        ].join(",")).forEach(function (el) {
            el.remove();
        });

        return clean(
            String(clone.innerText || clone.textContent || "")
                .replace(/New chat started and saved to Sessions\./g, "")
        );
    }

    async function getTranscript() {
        const sessionTranscript = await fetchSessionTranscript();

        if (sessionTranscript) return sessionTranscript;

        return getDomTranscriptFallback() || "No chat messages.";
    }

    async function copyText(value) {
        value = clean(value);

        if (!value) {
            toast("Nothing to copy.");
            return false;
        }

        try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                await navigator.clipboard.writeText(value);
                toast("Copied chat.");
                return true;
            }
        } catch (_) {}

        const area = document.createElement("textarea");
        area.value = value;
        area.style.position = "fixed";
        area.style.left = "-9999px";
        area.style.top = "0";

        document.body.appendChild(area);
        area.focus();
        area.select();

        try {
            document.execCommand("copy");
            toast("Copied chat.");
            return true;
        } catch (error) {
            toast("Copy failed.");
            return false;
        } finally {
            area.remove();
        }
    }

    async function copyWholeChat() {
        const transcript = await getTranscript();
        await copyText(transcript);
    }

    async function exportWholeChat() {
        const transcript = await getTranscript();
        const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
        const filename = "nova-chat-" + stamp + ".txt";

        try {
            const blob = new Blob([transcript], {
                type: "text/plain;charset=utf-8"
            });

            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");

            link.href = url;
            link.download = filename;
            link.style.display = "none";

            document.body.appendChild(link);
            link.click();

            setTimeout(function () {
                URL.revokeObjectURL(url);
                link.remove();
            }, 800);

            toast("Exported chat.");
        } catch (error) {
            await copyText(transcript);
            toast("Export failed, copied instead.");
        }
    }

    function restoreButton(button) {
        if (!button) return;

        button.classList.remove("nova-mobile-top-copy-export-hidden");
        button.classList.remove("nova-mobile-hidden-duplicate");
        button.removeAttribute("aria-hidden");
        button.tabIndex = 0;

        button.style.setProperty("display", "inline-flex", "important");
        button.style.setProperty("visibility", "visible", "important");
        button.style.setProperty("opacity", "1", "important");
        button.style.setProperty("pointer-events", "auto", "important");
    }

    function bind(id, handler) {
        const oldButton = $(id);

        if (!oldButton || !oldButton.parentNode) return;

        const button = oldButton.cloneNode(true);

        restoreButton(button);
        button.removeAttribute("onclick");
        button.dataset.novaTopCopyExportSession = "1";

        button.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
            handler();
            return false;
        }, true);

        oldButton.parentNode.replaceChild(button, oldButton);
    }

    function wire() {
        bind("nova-mobile-copy-chat", copyWholeChat);
        bind("nova-mobile-export-chat", exportWholeChat);
    }

    window.NovaMobileCopyWholeChat = copyWholeChat;
    window.NovaMobileExportWholeChat = exportWholeChat;
    window.NovaMobileGetTopTranscript = getTranscript;

    document.addEventListener("DOMContentLoaded", wire);
    wire();

    setTimeout(wire, 250);
    setTimeout(wire, 900);

    console.log("[" + FIX_ID + "] ready");
})();
</script>

        important(el, "top", "-10000px");

        important(el, "border", "0");
        important(el, "overflow", "hidden");
        important(el, "clip-path", "inset(50%)");
    }

    function hideRealDuplicates() {
        hiddenRealIds.forEach(id => {

        if (!btn) return;

        important(btn, "display", "flex");
        important(btn, "visibility", "visible");

        important(btn, "transform", "none");
        important(btn, "flex", "0 0 auto");

        [
            "onclick",
            "onpointerdown",
            "onpointerup",
            "ontouchstart",
            "ontouchend",
            "onmousedown",
            "onmouseup"
        ].forEach(name => {
            btn[name] = null;
            btn.removeAttribute(name);
        });
    }

    function replaceOnce(buttonId) {
        const oldBtn = document.getElementById(buttonId);
        if (!oldBtn) return null;

        if (oldBtn.__novaHardTopCleaned) {
            return oldBtn;
        }

        const btn = oldBtn.cloneNode(false);
        btn.id = oldBtn.id;
        btn.className = oldBtn.className;
        btn.__novaHardTopCleaned = true;

        oldBtn.replaceWith(btn);
        cleanInlineHandlers(btn);

        return btn;
    }

    function clickRealTarget(targetId) {
        const target = document.getElementById(targetId);

        if (target) {
            target.click();
            return true;
        }

        return false;
    }

    function wireVisibleTop(buttonId, label, targetId) {
        const btn = replaceOnce(buttonId);
        if (!btn) return;

        btn.textContent = label;
        btn.setAttribute("aria-label", label);

        styleVisibleTopButton(btn);

                event.preventDefault();
                event.stopPropagation();
                event.stopImmediatePropagation?.();

                hideRealDuplicates();
                clickRealTarget(targetId);

                return false;
            }, true);
        }
    }

    function hideExtraTopSiblings() {
        const newBtn = document.getElementById("mobileMenuButton");
        const sessionsBtn = document.getElementById("mobileMemoryButton");

        if (!newBtn || !sessionsBtn) return;
        if (newBtn.parentElement !== sessionsBtn.parentElement) return;

        const host = newBtn.parentElement;

        Array.from(host.children).forEach(child => {
            if (child === newBtn || child === sessionsBtn) return;

            const isButtonish =
                child.tagName === "BUTTON" ||
                child.tagName === "A" ||
                child.getAttribute("role") === "button";

            if (isButtonish) {
                hideButKeepAlive(child);
            }
        });
    }

    let polishing = false;

    function polish() {
        if (polishing) return;
        polishing = true;

        try {
            removeGeneratedTop();
            hideRealDuplicates();

            wireVisibleTop("mobileMenuButton", "New", "nova-mobile-new-chat");
            wireVisibleTop("mobileMemoryButton", "Sessions", "nova-mobile-sessions-toggle");

            hideExtraTopSiblings();

            const bottomMenu = document.getElementById("nova-mobile-tools-toggle");
            if (bottomMenu) {
                bottomMenu.textContent = "Menu";
                bottomMenu.setAttribute("aria-label", "Tools");
                bottomMenu.title = "Tools";
            }
        } finally {
            polishing = false;
        }
    }

    let scheduled = false;

    function schedulePolish() {
        if (scheduled) return;
        scheduled = true;

        requestAnimationFrame(() => {
            scheduled = false;
            polish();
        });
    }

    window.NovaMobileTopUseExistingTwoOnly = polish;

    polish();
    setTimeout(polish, 50);
    setTimeout(polish, 250);
    setTimeout(polish, 750);
    setTimeout(polish, 1500);
    setTimeout(polish, 3000);

    const observer = new MutationObserver(schedulePolish);
    observer.observe(document.documentElement, {
        childList: true,
        subtree: true
    });

    console.log("[" + MARK + "] ready");
})();
</script>

<script>
(function () {
    const MARK = "NOVA_MOBILE_LOGIN_FLOATING_SINGLE_OWNER_FINAL_20260624";
    const EMAIL_RE = /[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i;

    let knownEmail = window.__novaMobileKnownAuthEmail || "";
    let building = false;

    function safeText(value) {
        return String(value || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function emailFromValue(value, depth = 0) {
        if (!value || depth > 3) return "";

        if (typeof value === "string") {
            const match = value.match(EMAIL_RE);
            return match ? match[0] : "";
        }

        if (typeof value === "object") {
            const keys = [
                "email",
                "userEmail",
                "accountEmail",
                "username",
                "user",
                "account",
                "profile",
                "auth",
                "state"
            ];

            for (const key of keys) {
                try {
                    const found = emailFromValue(value[key], depth + 1);
                    if (found) return found;
                } catch (err) {}
            }

            try {
                const found = emailFromValue(JSON.stringify(value), depth + 1);
                if (found) return found;
            } catch (err) {}
        }

        return "";
    }

    function readStorageEmail(store) {
        if (!store) return "";

        try {
            for (let i = 0; i < store.length; i += 1) {
                const key = store.key(i) || "";
                const value = store.getItem(key) || "";
                const joined = key + " " + value;

                if (!/nova|auth|user|account|email|login/i.test(joined)) {
                    continue;
                }

                const found = emailFromValue(joined);
                if (found) return found;
            }
        } catch (err) {}

        return "";
    }

    function readWindowEmail() {
        const names = [
            "NovaMobileAuth",
            "NovaMobileUser",
            "NovaUser",
            "NovaAuth",
            "novaMobileAuth",
            "novaMobileUser",
            "novaUser",
            "novaAuth",
            "currentUser",
            "user",
            "__NOVA_AUTH__",
            "__novaAuth"
        ];

        for (const name of names) {
            try {
                const found = emailFromValue(window[name]);
                if (found) return found;
            } catch (err) {}
        }

        return "";
    }

    function readEmail() {
        return (
            knownEmail ||
            window.__novaMobileKnownAuthEmail ||
            readWindowEmail() ||
            readStorageEmail(window.localStorage) ||
            readStorageEmail(window.sessionStorage) ||
            ""
        );
    }

    function removeOldTopLogin() {
        document.querySelectorAll(
            "#nova-mobile-account-top, .nova-mobile-user-dock, .nova-mobile-user-pill, .nova-mobile-login-top, .nova-mobile-auth-top"

        if (!panel) {
            panel = document.createElement("div");
            panel.id = "nova-mobile-login-panel";
            panel.dataset.open = "0";
        }

        if (panel.parentElement !== document.body) {
            document.body.appendChild(panel);
        }

        return panel;
    }

    function buildLoggedIn(email) {
        const btn = getButton();
        const panel = getPanel();
        const safeEmail = safeText(email);

        knownEmail = email;
        window.__novaMobileKnownAuthEmail = email;

        btn.textContent = "Account";
        btn.setAttribute("aria-label", "Account");
        btn.title = "Account";
        btn.dataset.loggedIn = "1";
        btn.dataset.email = email;
        btn.dataset.ready = "1";

        panel.innerHTML = `
            <div id="nova-mobile-login-panel-title">Account</div>
            <div style="color:#fff;font:700 12px Arial,system-ui,sans-serif;margin:0 0 8px;word-break:break-word;">
                Signed in as ${safeEmail}
            </div>
            <a class="nova-mobile-login-panel-action" href="/mobile">Back to Nova</a>
            <button id="nova-mobile-account-panel-logout" type="button">Logout</button>
        `;

        const logout = document.getElementById("nova-mobile-account-panel-logout");

        if (logout && !logout.__novaFloatingLogoutBound) {
            logout.__novaFloatingLogoutBound = true;

            logout.addEventListener("click", async function (event) {
                event.preventDefault();
                event.stopPropagation();
                event.stopImmediatePropagation?.();

                knownEmail = "";
                window.__novaMobileKnownAuthEmail = "";

                try {
                    if (typeof window.NovaMobileAuthLogout === "function") {
                        await window.NovaMobileAuthLogout();
                    }
                } catch (err) {}

                try {
                    if (typeof window.novaMobileLogout === "function") {
                        await window.novaMobileLogout();
                    }
                } catch (err) {}

                try {
                    await fetch("/logout", {
                        method: "GET",
                        cache: "no-store",
                        credentials: "same-origin",
                        redirect: "manual"
                    });
                } catch (err) {}

                [window.localStorage, window.sessionStorage].forEach(store => {
                    if (!store) return;

                    try {
                        const keys = [];

                        for (let i = 0; i < store.length; i += 1) {
                            const key = store.key(i) || "";

                            if (/auth|login|token|email|user/i.test(key) && !/session|message|history|chat/i.test(key)) {
                                keys.push(key);
                            }
                        }

                        keys.forEach(key => store.removeItem(key));
                    } catch (err) {}
                });

                location.href = "/mobile?fresh=logout-floating-single-owner-20260624";
            }, true);
        }
    }

    function buildLoggedOut(showReady) {
        const btn = getButton();
        const panel = getPanel();

        btn.textContent = "Login";
        btn.setAttribute("aria-label", "Login");
        btn.title = "Login";
        btn.dataset.loggedIn = "0";
        btn.dataset.email = "";

        if (showReady) {
            btn.dataset.ready = "1";

        panel.innerHTML = `
            <div id="nova-mobile-login-panel-title">Account</div>
            <a class="nova-mobile-login-panel-action" href="/login">Login</a>
        `;
    }

    function build(showLoggedOutNow = false) {
        if (building) return;
        building = true;

        try {
            removeOldTopLogin();

            const email = readEmail();

            if (email) {
                buildLoggedIn(email);
            } else {
                buildLoggedOut(showLoggedOutNow);
            }
        } finally {
            building = false;
        }
    }

    function openPanel() {
        build(true);

        const panel = getPanel();
        panel.dataset.open = panel.dataset.open === "1" ? "0" : "1";
    }

    document.addEventListener("click", function (event) {
        const btn = event.target.closest("#nova-mobile-bottom-login");

        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation?.();

        if (event.target.closest("#nova-mobile-bottom-login")) return;
        if (event.target.closest("#nova-mobile-login-panel")) return;

        const panel = document.getElementById("nova-mobile-login-panel");
        if (panel) panel.dataset.open = "0";
    }, true);

    if (!window.__novaMobileFloatingAuthConsoleBridgeInstalled) {
        window.__novaMobileFloatingAuthConsoleBridgeInstalled = true;

        const originalLog = console.log.bind(console);

        console.log = function (...args) {
            try {
                const joined = args.map(arg => {
                    if (typeof arg === "string") return arg;
                    try { return JSON.stringify(arg); } catch (err) { return ""; }
                }).join(" ");

                if (/Nova Mobile Auth/i.test(joined) && /authenticated/i.test(joined)) {
                    const found = emailFromValue(joined);

                    if (found) {
                        knownEmail = found;
                        window.__novaMobileKnownAuthEmail = found;
                        setTimeout(() => build(false), 0);
                    }
                }
            } catch (err) {}

            return originalLog(...args);
        };
    }

    const observer = new MutationObserver(function () {
        const email = readEmail();
        const btn = document.getElementById("nova-mobile-bottom-login");
        const panel = document.getElementById("nova-mobile-login-panel");

        if (email && btn && btn.textContent.trim() !== "Account") {
            requestAnimationFrame(() => build(false));
            return;
        }

        if (email && panel && panel.dataset.open === "1" && !/Logout/i.test(panel.innerText || "")) {
            requestAnimationFrame(() => build(false));
        }
    });

    observer.observe(document.documentElement, {
        childList: true,
        subtree: true,
        characterData: true
    });

    window.NovaMobileLoginSingleOwnerRefresh = function () {
        build(true);
    };

    window.NovaMobileLoginFloatingOwnerRefresh = window.NovaMobileLoginSingleOwnerRefresh;

    build(false);

    setTimeout(() => build(false), 250);
    setTimeout(() => build(false), 750);
    setTimeout(() => build(true), 1500);

    console.log("[" + MARK + "] ready");
})();
</script>

            ".nova-message.assistant",
            ".nova-mobile-message.assistant",
            ".assistant-message",
            ".message-row.assistant",
            ".bubble.assistant",
            "[data-role='assistant']",
            "[data-author='assistant']",
            "[data-sender='assistant']",
            "[data-message-role='assistant']"
        ];

        const found = [];

        selectors.forEach(selector => {
            document.querySelectorAll(selector).forEach(el => {
                if (looksAssistant(el) && textOf(el)) {
                    found.push(el);
                }
            });
        });

        return [...new Set(found)];
    }

    async function copyText(text, button) {
        try {
            await navigator.clipboard.writeText(text);
            flash(button, "Copied");
        } catch (error) {
            const area = document.createElement("textarea");
            area.value = text;
            area.style.position = "fixed";
            area.style.left = "-9999px";
            document.body.appendChild(area);
            area.focus();
            area.select();

            try {
                document.execCommand("copy");
                flash(button, "Copied");
            } catch {
                flash(button, "Copy?");
            }

            area.remove();
        }
    }

    function flash(button, label) {
        if (!button) return;

        const old = button.textContent;
        button.textContent = label;

        clearTimeout(button.__novaFlashTimer);
        button.__novaFlashTimer = setTimeout(() => {
            button.textContent = old;
        }, 900);
    }

    function lastUserText() {
        const selectors = [
            ".message.user",
            ".chat-message.user",
            ".nova-message.user",
            ".nova-mobile-message.user",
            ".user-message",
            ".message-row.user",
            ".bubble.user",
            "[data-role='user']",
            "[data-author='user']",
            "[data-sender='user']",
            "[data-message-role='user']"
        ];

        const nodes = [];

        selectors.forEach(selector => {
            document.querySelectorAll(selector).forEach(el => {
                if (visible(el) && !el.closest("#nova-mobile-composer")) {
                    const text = textOf(el);
                    if (text) nodes.push(text);
                }
            });
        });

        return nodes[nodes.length - 1] || "";
    }

    function clickNativeRegenerate() {
        const candidates = [...document.querySelectorAll("button,a,[role='button']")]
            .filter(el => {
                if (!visible(el)) return false;
                if (el.closest(".nova-mobile-copy-regen-row")) return false;

                const hay = [
                    el.textContent || "",
                    el.getAttribute("aria-label") || "",
                    el.getAttribute("title") || "",
                    el.getAttribute("data-action") || ""
                ].join(" ").toLowerCase();

                return hay.includes("regen") || hay.includes("regenerate") || hay.includes("retry");
            });

        const target = candidates[candidates.length - 1];

        if (target) {
            target.click();
            return true;
        }

        return false;
    }

    function fallbackRegenerate(button) {
        if (clickNativeRegenerate()) {
            flash(button, "Regen");
            return;
        }

        const text = lastUserText();
        const input = document.getElementById("nova-mobile-input") ||
            document.querySelector("#nova-mobile-composer textarea,.nova-mobile-composer textarea,textarea");

        const send = document.getElementById("nova-mobile-send") ||
            document.querySelector("#nova-mobile-composer button[type='submit'],.nova-mobile-composer button[type='submit']");

        if (!text || !input || !send) {
            flash(button, "No regen");
            return;
        }

        input.value = text;
        input.dispatchEvent(new Event("input", { bubbles: true }));
        input.dispatchEvent(new Event("change", { bubbles: true }));

        setTimeout(() => send.click(), 30);
        flash(button, "Sent");
    }

    function makeRow(host) {
        const row = document.createElement("div");
        row.className = "nova-mobile-copy-regen-row";
        row.setAttribute("data-nova-copy-regen-row", "1");

        const copy = document.createElement("button");
        copy.type = "button";
        copy.className = "nova-mobile-copy-btn";
        copy.textContent = "Copy";
        copy.setAttribute("aria-label", "Copy assistant response");

        const regen = document.createElement("button");
        regen.type = "button";
        regen.className = "nova-mobile-regen-btn";
        regen.textContent = "Regen";
        regen.setAttribute("aria-label", "Regenerate response");

        copy.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();
            copyText(textOf(host), copy);
        });

        regen.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();
            fallbackRegenerate(regen);
        });

        row.appendChild(copy);
        row.appendChild(regen);

        return row;
    }

    function removeDuplicatesAfter(host) {
        let node = host.nextElementSibling;

        while (node && node.classList?.contains("nova-mobile-copy-regen-row")) {
            const next = node.nextElementSibling;
            node.remove();
            node = next;
        }
    }

    function restoreRows() {
        assistantHosts().forEach(host => {
            removeDuplicatesAfter(host);

            if (host.nextElementSibling?.classList?.contains("nova-mobile-copy-regen-row")) {
                return;
            }

            host.insertAdjacentElement("afterend", makeRow(host));
        });
    }

    function restoreSessionNames() {
        document.querySelectorAll(
            ".nova-mobile-session-title,.mobile-session-title,.session-title,.session-name,[data-session-title],#nova-mobile-session-title,#mobile-session-title,#nova-mobile-current-session-title"
        ).forEach(el => {
            el.style.setProperty("white-space", "normal", "important");
            el.style.setProperty("overflow-wrap", "anywhere", "important");
            el.style.setProperty("word-break", "break-word", "important");
            el.style.setProperty("line-height", "1.25", "important");
            el.style.setProperty("max-width", "100%", "important");
            el.style.setProperty("min-width", "0", "important");
        });
    }

    function run() {
        restoreRows();
        restoreSessionNames();
    }

    window.NovaMobileCopyRegenSessionNameRestore = run;

    run();
    setTimeout(run, 250);
    setTimeout(run, 1000);
    setTimeout(run, 2500);

    new MutationObserver(function () {
        clearTimeout(window.__novaCopyRegenSessionNameTimer);
        window.__novaCopyRegenSessionNameTimer = setTimeout(run, 180);
    }).observe(document.documentElement, {
        childList: true,
        subtree: true
    });
})();
</script>
