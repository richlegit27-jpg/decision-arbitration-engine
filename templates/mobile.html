<!DOCTYPE html>
<html lang="en">
<head>

<!-- NOVA_MOBILE_CONSOLE_SPAM_STOP_EARLY_QUIET_20260624 -->


<script>
/* NOVA_MOBILE_COMPACT_FIXED_GEOMETRY_OWNER_20260624 */
(function () {
    "use strict";

    function setImp(el, prop, value) {
        if (!el) return;
        el.style.setProperty(prop, value, "important");
    }

    function applyCompactGeometry() {
        var chat = document.getElementById("mobileChatMessages");
        var comp = document.getElementById("nova-mobile-composer");
        var input = document.getElementById("nova-mobile-input");

        if (!chat || !comp) return;

        setImp(comp, "position", "fixed");
        setImp(comp, "left", "0px");
        setImp(comp, "right", "0px");
        setImp(comp, "bottom", "0px");
        setImp(comp, "top", "auto");
        setImp(comp, "max-height", "106px");
        setImp(comp, "overflow", "hidden");

        setImp(chat, "position", "fixed");
        setImp(chat, "top", "118px");
        setImp(chat, "left", "0px");
        setImp(chat, "right", "0px");
        setImp(chat, "bottom", "112px");
        setImp(chat, "height", "auto");
        setImp(chat, "overflow-y", "auto");
        setImp(chat, "overflow-x", "hidden");
        setImp(chat, "padding-bottom", "28px");

        if (input) {
            setImp(input, "min-height", "38px");
            setImp(input, "max-height", "46px");
        }
    }

    window.NovaMobileLockComposerGeometry = applyCompactGeometry;

    window.addEventListener("load", function () {
        applyCompactGeometry();
        setTimeout(applyCompactGeometry, 300);
        setTimeout(applyCompactGeometry, 1200);
    });

    window.addEventListener("pageshow", function () {
        setTimeout(applyCompactGeometry, 100);
    });

    window.addEventListener("resize", applyCompactGeometry);
    window.addEventListener("orientationchange", applyCompactGeometry);

    setTimeout(applyCompactGeometry, 50);
    setTimeout(applyCompactGeometry, 700);

    console.log("[Nova Mobile] compact fixed geometry owner active");
})();
</script>

</body>
</html>
