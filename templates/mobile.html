<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Nova Mobile</title>

  <link rel="stylesheet" href="/static/css/nova-mobile-app.css?v=phase4mobileux1">
  <link rel="stylesheet" href="/static/css/nova-router-control.css?v=phase4mobileux1">
</head>
<body>
  <div id="mobileApp" class="mobile-app-shell">
    <div id="panelBackdrop" class="mobile-panel-backdrop" hidden></div>

    <aside id="mobileSidebar" class="mobile-sidebar" aria-hidden="true">
      <div class="mobile-panel-header">
        <div class="mobile-panel-title-wrap">
          <div class="mobile-panel-title">Chats</div>
          <div class="mobile-panel-subtitle">Sessions and controls</div>
        </div>
        <button id="closeLeftPanelBtn" type="button" class="mobile-panel-close" aria-label="Close left panel">×</button>
      </div>

      <div class="mobile-panel-body">
        <div class="mobile-action-stack">
          <button id="newSessionBtn" type="button" class="mobile-action-btn">New Chat</button>
        </div>

        <div id="sessionList" class="mobile-session-list"></div>
      </div>
    </aside>

    <main class="mobile-main">
      <header class="mobile-topbar">
        <button id="openLeftPanelBtn" type="button" class="mobile-topbar-btn" aria-label="Open chats">☰</button>

        <div class="mobile-topbar-center">
          <div class="mobile-brand">Nova</div>
          <div id="activeSessionMeta" class="mobile-subtitle">Mobile assistant</div>
        </div>

        <button id="openRightPanelBtn" type="button" class="mobile-topbar-btn" aria-label="Open memory">Memory</button>
      </header>

      <section id="chatScroll" class="mobile-chat-scroll">
        <div id="welcomeState" class="mobile-welcome">
          <div class="mobile-welcome-card">
            <div class="mobile-welcome-title">Nova is ready</div>
            <div class="mobile-welcome-text">Ask something to start the conversation.</div>
          </div>
        </div>

        <div id="messageList" class="mobile-message-list"></div>
      </section>

      <section class="mobile-composer-wrap">
        <div id="attachedFilesBar" class="mobile-attached-files" hidden></div>

        <form id="composerForm" class="mobile-composer-form">
          <button id="attachBtn" type="button" class="mobile-composer-icon" aria-label="Attach file">+</button>

          <textarea
            id="messageInput"
            class="mobile-message-input"
            rows="1"
            placeholder="Message Nova..."
            aria-label="Message Nova"
          ></textarea>

          <div class="mobile-composer-actions">
            <button id="regenerateBtn" type="button" class="mobile-regen-btn" aria-label="Regenerate last reply" title="Regenerate last reply">↻</button>
            <button id="sendBtn" type="submit" class="mobile-send-btn" aria-label="Send message">Send</button>
          </div>
        </form>

        <div class="mobile-composer-footer">
          <div id="statusText" class="mobile-status-text">Ready</div>
          <div id="composerStatus" class="mobile-composer-status">Ready</div>
        </div>
      </section>
    </main>

    <aside id="mobileMemoryPanel" class="mobile-memory-panel" aria-hidden="true">
      <div class="mobile-panel-header">
        <div class="mobile-panel-title-wrap">
          <div class="mobile-panel-title">Memory</div>
          <div class="mobile-panel-subtitle">Saved notes and context</div>
        </div>
        <button id="closeRightPanelBtn" type="button" class="mobile-panel-close" aria-label="Close right panel">×</button>
      </div>

      <div class="mobile-panel-body">
        <section class="mobile-memory-section">
          <div class="mobile-memory-section-title">Status</div>
          <div id="memoryStatus" class="mobile-memory-status">Ready</div>
        </section>

        <section class="mobile-memory-section">
          <div class="mobile-memory-section-title">Add Memory</div>

          <form id="memoryForm" class="mobile-memory-form">
            <label class="mobile-memory-label" for="memoryKind">Type</label>
            <select id="memoryKind" class="mobile-memory-input" name="memoryKind">
              <option value="preference">preference</option>
              <option value="goal">goal</option>
              <option value="project">project</option>
              <option value="name">name</option>
              <option value="memory">memory</option>
            </select>

            <label class="mobile-memory-label" for="memoryValue">Value</label>
            <textarea
              id="memoryValue"
              class="mobile-memory-input mobile-memory-textarea"
              name="memoryValue"
              rows="3"
              placeholder="Add something Nova should remember..."
            ></textarea>

            <div class="mobile-memory-actions">
              <button type="submit" class="mobile-memory-btn">Save</button>
              <button id="refreshMemoryBtn" type="button" class="mobile-memory-btn secondary">Refresh</button>
            </div>
          </form>
        </section>

        <section class="mobile-memory-section">
          <div class="mobile-memory-section-title">Items</div>
          <div id="memoryList" class="mobile-memory-list"></div>
        </section>
      </div>
    </aside>
  </div>

  <template id="messageItemTemplate">
    <article class="mobile-message-item">
      <div class="message-role"></div>
      <div class="message-content"></div>
    </article>
  </template>

  <template id="sessionItemTemplate">
    <article class="mobile-session-item">
      <button type="button" class="session-main">
        <div class="session-title"></div>
        <div class="session-meta"></div>
      </button>

      <div class="mobile-session-actions">
        <button type="button" class="session-pin">Pin</button>
        <button type="button" class="session-rename">Rename</button>
        <button type="button" class="session-duplicate">Duplicate</button>
        <button type="button" class="session-delete">Delete</button>
      </div>
    </article>
  </template>

  <template id="memoryItemTemplate">
    <article class="mobile-memory-item">
      <div class="memory-kind"></div>
      <div class="memory-value"></div>
      <button type="button" class="memory-delete-btn">Delete</button>
    </article>
  </template>

  <input id="fileInput" type="file" multiple hidden>

  <script src="/static/js/nova-mobile-app.js?v=phase4mobileux1" defer></script>
  <script src="/static/js/nova-brain-router-panel.js?v=phase4mobileux1" defer></script>
</body>
</html>
