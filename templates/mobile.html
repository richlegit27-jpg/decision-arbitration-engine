<!DOCTYPE html>
<html lang="en">
<head>

<!-- NOVA_MOBILE_CONSOLE_SPAM_STOP_EARLY_QUIET_20260624 -->

<script>
/* NOVA_MOBILE_LATE_OVERLAP_CLAMP_20260624 */
(function () {
    "use strict";

    var scheduled = false;

    function important(el, prop, value) {
        if (!el) return;
        if (el.style.getPropertyValue(prop) === value) return;
        el.style.setProperty(prop, value, "important");
    }

    function clampIfNeeded(reason) {
        scheduled = false;

        try {
            var chat = document.getElementById("mobileChatMessages");
            var composer = document.getElementById("nova-mobile-composer");

            if (!chat || !composer) return;

            var cr = chat.getBoundingClientRect();
            var pr = composer.getBoundingClientRect();

            var overlaps = cr.bottom > pr.top;
            var wrongTop = Math.round(cr.top) !== 72;
            var tooLow = Math.round(cr.bottom) > Math.round(pr.top - 8);

            if (!overlaps && !wrongTop && !tooLow) return;

            var composerHeight = Math.ceil(pr.height || 132);
            var bottomSpace = Math.max(142, Math.min(158, composerHeight + 10));

            important(composer, "position", "fixed");
            important(composer, "left", "0px");
            important(composer, "right", "0px");
            important(composer, "bottom", "0px");
            important(composer, "top", "auto");
            important(composer, "width", "100%");
            important(composer, "max-width", "100%");
            important(composer, "z-index", "90");

            important(chat, "position", "fixed");
            important(chat, "top", "72px");
            important(chat, "left", "0px");
            important(chat, "right", "0px");
            important(chat, "bottom", bottomSpace + "px");
            important(chat, "height", "auto");
            important(chat, "max-height", "none");
            important(chat, "overflow-y", "auto");
            important(chat, "overflow-x", "hidden");
            important(chat, "box-sizing", "border-box");
            important(chat, "padding-bottom", "34px");
            important(chat, "z-index", "10");
        } catch (_) {}
    }

    function schedule(reason) {
        if (scheduled) return;
        scheduled = true;

        requestAnimationFrame(function () {
            clampIfNeeded(reason || "scheduled");
        });
    }

    window.NovaMobileLockComposerGeometry = function () {
        schedule("manual");
    };

    window.addEventListener("load", function () {
        schedule("load");
        setTimeout(schedule, 250);
        setTimeout(schedule, 800);
        setTimeout(schedule, 1800);
        setTimeout(schedule, 3500);
    });

    window.addEventListener("pageshow", function () {
        schedule("pageshow");
        setTimeout(schedule, 300);
    });

    window.addEventListener("resize", function () {
        schedule("resize");
    });

    window.addEventListener("orientationchange", function () {
        schedule("orientation");
    });

    document.addEventListener("click", function () {
        setTimeout(schedule, 80);
    }, true);

    document.addEventListener("input", function () {
        setTimeout(schedule, 80);
    }, true);

    setTimeout(schedule, 50);
    setTimeout(schedule, 300);
    setTimeout(schedule, 1200);
    setTimeout(schedule, 3000);

    console.log("[Nova Mobile] late overlap clamp active");
})();
</script>

</body>
</html>
