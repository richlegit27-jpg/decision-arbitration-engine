<script>
(function () {
    if (window.__novaConsoleSpamStopEarlyQuiet) return;
    window.__novaConsoleSpamStopEarlyQuiet = true;

    const original = {
        log: console.log.bind(console),
        info: console.info.bind(console),
        warn: console.warn.bind(console),
        debug: console.debug.bind(console)
    };

    const blocked = [
        "NOVA_MOBILE_COPY_REGEN_DOM_SCAN_RESTORE_20260624",
        "NOVA_MOBILE_COPY_REGEN_AFTER_BUBBLE_20260624",
        "hosts 0",
        "hosts 1 rows 1",
        "bubble copy/regen observer ready",
        "regen observer ready",
        "Nova Mobile Canonical Session Owner",
        "Nova Mobile Primary Session Watchdog",
        "Nova Mobile Manual Session Lock",
        "Nova Mobile Session SingleFlight",
        "allowed-new-localStorage",
        "blocked session overwrite",
        "clicked session locked"
    ];

    function stringify(value) {
        try {
            if (typeof value === "string") return value;
            return JSON.stringify(value);
        } catch (error) {
            return String(value);
        }
    }

    function shouldBlock(args) {
        const text = args.map(stringify).join(" ");
        return blocked.some(item => text.includes(item));
    }

    ["log", "info", "warn", "debug"].forEach(method => {
        console[method] = function (...args) {
            if (shouldBlock(args)) return;
            original[method](...args);
        };
    });

    original.log("[Nova Console Quiet] ready");
})();
</script>

<script>
(function () {
    "use strict";

    function ready(fn) {
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", fn);
            return;
        }

        fn();
    }

    ready(function () {
        const toolsButton = document.getElementById("nova-mobile-tools-toggle");
        const toolsPanel = document.getElementById("nova-mobile-tools-panel");

        if (!toolsButton || !toolsPanel) {
            console.warn("[Nova Mobile] tools menu fallback missing elements", {
                toolsButton: !!toolsButton,
                toolsPanel: !!toolsPanel,
            });
            return;
        }

        toolsButton.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();

            toolsPanel.classList.toggle("hidden");

            const isOpen = !toolsPanel.classList.contains("hidden");
            toolsButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        toolsButton.setAttribute("aria-controls", "nova-mobile-tools-panel");
        toolsButton.setAttribute("aria-expanded", "false");

        console.log("[Nova Mobile] tools menu fallback wired");
    });
})();
</script>

<script>
(function () {
    "use strict";

    function $(id) {
        return document.getElementById(id);
    }

    function forceHide(panel) {
        if (!panel) return;

        panel.classList.add("hidden");
        panel.setAttribute("aria-hidden", "true");
        panel.style.setProperty("display", "none", "important");
    }

    function forceShow(panel, topOrBottom) {
        if (!panel) return;

        panel.classList.remove("hidden");
        panel.setAttribute("aria-hidden", "false");

        panel.style.setProperty("display", "flex", "important");
        panel.style.setProperty("position", "fixed", "important");
        panel.style.setProperty("left", "10px", "important");
        panel.style.setProperty("right", "10px", "important");
        panel.style.setProperty("z-index", "999999", "important");
        panel.style.setProperty("flex-direction", "column", "important");
        panel.style.setProperty("gap", "10px", "important");
        panel.style.setProperty("padding", "14px", "important");
        panel.style.setProperty("background", "#111827", "important");
        panel.style.setProperty("border", "1px solid rgba(255,255,255,.18)", "important");
        panel.style.setProperty("border-radius", "18px", "important");
        panel.style.setProperty("box-shadow", "0 24px 80px rgba(0,0,0,.55)", "important");

        if (topOrBottom === "bottom") {
            panel.style.setProperty("bottom", "90px", "important");
            panel.style.removeProperty("top");
        } else {
            panel.style.setProperty("top", "76px", "important");
            panel.style.removeProperty("bottom");
        }
    }

    function replaceButton(id) {
        var oldButton = $(id);

        if (!oldButton || !oldButton.parentNode) {
            return null;
        }

        var newButton = oldButton.cloneNode(true);
        newButton.removeAttribute("onclick");
        oldButton.parentNode.replaceChild(newButton, oldButton);

        return newButton;
    }

    function closeAllPanels() {
        forceHide($("nova-mobile-sessions-panel"));
        forceHide($("nova-mobile-tools-panel"));
        forceHide($("nova-mobile-memory-panel"));
        forceHide($("nova-mobile-execution-panel"));
    }

    function wire() {
        var sessionsButton = replaceButton("nova-mobile-sessions-toggle");
        var toolsButton = replaceButton("nova-mobile-tools-toggle");

        var sessionsPanel = $("nova-mobile-sessions-panel");
        var toolsPanel = $("nova-mobile-tools-panel");
        var memoryPanel = $("nova-mobile-memory-panel");
        var executionPanel = $("nova-mobile-execution-panel");

        closeAllPanels();
        // NOVA_MOBILE_REMOVE_INLINE_SESSION_OWNER_20260608
        // Sessions are owned by external mobile session JS/hard bridge.
        // Template only provides fallback close behavior.
        window.NovaCloseMobileSessions = window.NovaCloseMobileSessions || function () {
            forceHide(sessionsPanel);
        };

        window.NovaOpenMobileTools = function () {
            closeAllPanels();
            forceShow(toolsPanel, "bottom");
        };

        window.NovaCloseMobileTools = function () {
            forceHide(toolsPanel);
        };

        window.NovaOpenMobileMemory = function () {
            closeAllPanels();
            forceShow(memoryPanel, "top");
        };

        window.NovaCloseMobileMemory = function () {
            forceHide(memoryPanel);
        };

        window.NovaOpenMobileExecution = function () {
            closeAllPanels();
            forceShow(executionPanel, "top");
        };

        window.NovaCloseMobileExecution = function () {
            forceHide(executionPanel);
        };
        // NOVA_TEMPLATE_SESSIONS_CLICK_REMOVED_20260608_FIXED: sessions click is owned by static/js/mobile/nova-mobile-events.js

        if (toolsButton) {
            toolsButton.addEventListener("click", function (event) {
                event.preventDefault();
                event.stopPropagation();
                window.NovaOpenMobileTools();
            });
        }

        document.querySelectorAll("button").forEach(function (button) {
            var text = (button.textContent || "").trim().toLowerCase();
            var tool = button.getAttribute("data-mobile-tool");

            if (text === "close sessions") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileSessions();
                });
            }

            if (text === "close") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileTools();
                });
            }

            if (text === "memory" || button.id === "nova-mobile-memory-toggle") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaOpenMobileMemory();
                });
            }

            if (text === "close memory" || button.id === "nova-mobile-memory-close") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileMemory();
                });
            }

            if (tool === "execution" || text === "open execution panel") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaOpenMobileExecution();
                });
            }

            if (text === "close execution" || button.id === "nova-mobile-execution-close") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileExecution();
                });
            }
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") {
                closeAllPanels();
            }
        });

        console.log("[Nova Mobile] panel hard lock active");
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", wire);
    } else {
        wire();
    }
})();
</script>

<script>
(function () {
    "use strict";

    var pill = document.getElementById("nova-backend-readiness-pill");
    var button = document.getElementById("nova-backend-readiness-button");

    if (!pill || !button) return;

    function setText(id, value) {
        var el = document.getElementById(id);
        if (el) el.textContent = value;
    }

    function percent(value) {
        var number = Number(value);
        if (!Number.isFinite(number)) return "--%";
        return Math.round(number) + "%";
    }

    function setButtonState(overall) {
        button.classList.remove("ready", "warn", "fail");

        if (!Number.isFinite(overall)) {
            button.classList.add("fail");
            button.textContent = "Backend offline";
            return;
        }

        button.textContent = "Backend " + Math.round(overall) + "%";

        if (overall >= 90) {
            button.classList.add("ready");
        } else if (overall >= 70) {
            button.classList.add("warn");
        } else {
            button.classList.add("fail");
        }
    }

    async function refreshReadiness() {
        try {
            var response = await fetch("/api/backend/readiness", {
                method: "GET",
                headers: {
                    "Accept": "application/json"
                },
                cache: "no-store"
            });

            if (!response.ok) {
                throw new Error("Readiness endpoint returned " + response.status);
            }

            var data = await response.json();
            var overall = Number(data.overall_backend_readiness);

            setButtonState(overall);

            setText("nova-readiness-overall", percent(data.overall_backend_readiness));
            setText("nova-readiness-memory", percent(data.memory_percent));
            setText("nova-readiness-agency", percent(data.agency_percent));
            setText("nova-readiness-planner", percent(data.planner_percent));
            setText("nova-readiness-session", percent(data.session_percent));
            setText("nova-readiness-execution", percent(data.execution_percent));

            setText(
                "nova-readiness-records",
                "E:" + (data.execution_records ?? "--") +
                " M:" + (data.memory_items ?? "--") +
                " S:" + (data.session_records ?? "--")
            );
        } catch (error) {
            setButtonState(NaN);
            setText("nova-readiness-overall", "offline");
            setText("nova-readiness-memory", "--%");
            setText("nova-readiness-agency", "--%");
            setText("nova-readiness-planner", "--%");
            setText("nova-readiness-session", "--%");
            setText("nova-readiness-execution", "--%");
            setText("nova-readiness-records", "--");
            console.warn("[Nova Backend Readiness]", error);
        }
    }

    button.addEventListener("click", function () {
        pill.classList.toggle("open");
        refreshReadiness();
    });

    refreshReadiness();
    window.setInterval(refreshReadiness, 15000);
})();
</script>

(function () {

    const MENU_WORDS = [
        "memory",
        "upload",
        "open",
        "execution",
        "artifact",
        "artifacts"
    ];

    function cleanText(el) {
        return String((el && el.textContent) || "")
            .replace(/\s+/g, " ")
            .trim()
            .toLowerCase();
    }

    function attrBag(el) {
        if (!el) return "";

        return [
            cleanText(el),
            el.id || "",
            el.className || "",
            el.getAttribute && el.getAttribute("aria-label") || "",
            el.getAttribute && el.getAttribute("title") || ""
        ].join(" ").toLowerCase();

        if (!el || !el.getBoundingClientRect) return false;

        const rect = el.getBoundingClientRect();
        const cs = getComputedStyle(el);

        return (
            rect.width > 20 &&
            rect.height > 20 &&
            cs.display !== "none" &&
            cs.visibility !== "hidden" &&
            cs.opacity !== "0"
        );
    }

    function scoreMenu(el) {
        const bag = attrBag(el);
        let score = 0;

        MENU_WORDS.forEach(function (word) {
            if (bag.includes(word)) {
                score += 1;
            }
        });

        const buttons = el.querySelectorAll("button, a");
        if (buttons.length >= 3) {
            score += 2;
        }

        if (/menu|tools|drawer|panel|actions|more/i.test(String(el.id || "") + " " + String(el.className || ""))) {
            score += 2;
        }

        return score;
    }

    function fixMobileMenuPanels() {
        const candidates = Array.from(document.querySelectorAll(
            "div, section, nav, aside, menu, ul, [role='menu'], [class*='menu'], [class*='tools'], [class*='drawer'], [class*='panel'], [id*='menu'], [id*='tools'], [id*='drawer'], [id*='panel']"
        ));

        candidates
            .filter(isVisible)
            .filter(function (el) {
                if (el.closest(".nova-mobile-auth-dock, .nova-mobile-user-dock, .nova-mobile-backend-dock")) return false;

                const rect = el.getBoundingClientRect();
                if (rect.width < 100 || rect.height < 80) return false;

                return scoreMenu(el) >= 4;
            })
            .forEach(function (panel) {
                panel.classList.add("nova-mobile-tools-menu-fixed");
                panel.classList.add("nova-mobile-menu-panel-fixed");
            });
    }

    /* NOVA_MOBILE_MENU_PANEL_FIX_DEBOUNCED_20260623 */
    let novaMobileMenuPanelFixQueued = false;
    let novaMobileMenuPanelFixTimer = null;
    let novaMobileMenuPanelFixLastRun = 0;

    function runMenuPanelFixOnce() {
        novaMobileMenuPanelFixQueued = false;
        novaMobileMenuPanelFixTimer = null;
        novaMobileMenuPanelFixLastRun = Date.now();
        fixMobileMenuPanels();
    }

    function scheduleFix() {
        const now = Date.now();

        if (novaMobileMenuPanelFixQueued) {
            return;
        }

        novaMobileMenuPanelFixQueued = true;

        if (now - novaMobileMenuPanelFixLastRun < 220) {
            novaMobileMenuPanelFixTimer = setTimeout(runMenuPanelFixOnce, 220);
            return;
        }

        requestAnimationFrame(runMenuPanelFixOnce);
    }

    document.addEventListener("DOMContentLoaded", scheduleFix);
    document.addEventListener("click", scheduleFix, true);
    document.addEventListener("pointerup", scheduleFix, true);

    const observer = new MutationObserver(scheduleFix);

    observer.observe(document.documentElement, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ["class", "style", "aria-expanded"]
    });

    window.NovaMobileFixToolsMenuPanel = fixMobileMenuPanels;

    scheduleFix();

    console.log("[" + FIX_ID + "] ready");
})();

<script>
(function () {
    "use strict";

    const FIX_ID = "NOVA_MOBILE_MEMORY_REAL_PANEL_V2_20260623";

    function getApiKey() {
        return (
            window.API_KEY ||
            window.NOVA_API_KEY ||
            window.apiKey ||
            localStorage.getItem("nova_api_key") ||
            localStorage.getItem("NOVA_API_KEY") ||
            "dev"
        );
    }

    function textOf(el) {
        return String((el && el.textContent) || "")
            .replace(/\s+/g, " ")
            .trim()
            .toLowerCase();
    }

    function attrBag(el) {
        if (!el) return "";

        return [
            textOf(el),
            el.id || "",
            el.className || "",
            el.getAttribute && el.getAttribute("aria-label") || "",
            el.getAttribute && el.getAttribute("title") || "",
            el.getAttribute && el.getAttribute("href") || ""
        ].join(" ").toLowerCase();
    }

    function isMemoryButton(el) {
        if (!el || !el.matches || !el.matches("a, button")) return false;
        if (el.id === "novaMobileMemoryV2Close") return false;
        if (el.closest("#novaMobileMemoryV2Overlay")) return false;

        const bag = attrBag(el);
        const text = textOf(el);

        return text === "memory" || text.includes("memory") || bag.includes("memory");
    }

    function ensureOverlay() {
        let overlay = document.getElementById("novaMobileMemoryV2Overlay");

        if (!overlay) {
            overlay = document.createElement("div");
            overlay.id = "novaMobileMemoryV2Overlay";
            overlay.innerHTML = `
                <section id="novaMobileMemoryV2Panel" role="dialog" aria-modal="true" aria-label="Nova memory">
                    <div id="novaMobileMemoryV2Head">
                        <div style="display:flex;align-items:center;gap:8px;min-width:0;">
                            <div id="novaMobileMemoryV2Title">Memory</div>
                            <div id="novaMobileMemoryV2Count">0</div>
                        </div>
                        <button id="novaMobileMemoryV2Close" type="button">Close</button>
                    </div>
                    <div id="novaMobileMemoryV2Body">
                        <div class="nova-mobile-memory-v2-state">Loading memory?</div>
                    </div>
                </section>
            `;
            document.body.appendChild(overlay);
        }

        const close = overlay.querySelector("#novaMobileMemoryV2Close");
        if (close && !close.dataset.novaBound) {
            close.dataset.novaBound = "1";
            close.addEventListener("click", function (event) {
                event.preventDefault();
                event.stopPropagation();
                overlay.classList.remove("is-open");
            }, true);
        }

        if (!overlay.dataset.novaBackdropBound) {
            overlay.dataset.novaBackdropBound = "1";
            overlay.addEventListener("click", function (event) {
                if (event.target === overlay) {
                    overlay.classList.remove("is-open");
                }
            }, true);
        }

        return overlay;
    }

    function setState(message, countText) {
        const overlay = ensureOverlay();
        const body = overlay.querySelector("#novaMobileMemoryV2Body");
        const count = overlay.querySelector("#novaMobileMemoryV2Count");

        if (count) count.textContent = countText || "0";
        if (body) {
            body.innerHTML = "";
            const div = document.createElement("div");
            div.className = "nova-mobile-memory-v2-state";
            div.textContent = message;
            body.appendChild(div);
        }
    }

    function extractMemories(payload) {
        if (!payload) return [];

        if (Array.isArray(payload)) return payload;

        if (payload.data && Array.isArray(payload.data.memory)) return payload.data.memory;
        if (payload.data && Array.isArray(payload.data.memories)) return payload.data.memories;

        if (Array.isArray(payload.memory)) return payload.memory;
        if (Array.isArray(payload.memories)) return payload.memories;

        return [];
    }

    function shortDate(value) {
        if (!value) return "";

        try {
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return "";
            return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
        } catch (_) {
            return "";
        }
    }

    function renderMemories(payload) {
        const overlay = ensureOverlay();
        const body = overlay.querySelector("#novaMobileMemoryV2Body");
        const count = overlay.querySelector("#novaMobileMemoryV2Count");
        const memories = extractMemories(payload);

        if (count) count.textContent = String(memories.length);

        if (!body) return;

        body.innerHTML = "";

        if (!memories.length) {
            setState("No memory items found from /api/memory.", "0");
            return;
        }

        memories
            .slice()
            .sort(function (a, b) {
                if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
                return String(b.updated_at || "").localeCompare(String(a.updated_at || ""));
            })
            .forEach(function (item) {
                const card = document.createElement("article");
                card.className = "nova-mobile-memory-v2-card";
                if (item.pinned) card.classList.add("is-pinned");

                const meta = document.createElement("div");
                meta.className = "nova-mobile-memory-v2-meta";

                const kind = document.createElement("div");
                kind.className = "nova-mobile-memory-v2-kind";
                kind.textContent = (item.pinned ? "Pinned ? " : "") + (item.kind || item.type || "memory");

                const date = document.createElement("div");
                date.className = "nova-mobile-memory-v2-date";
                date.textContent = shortDate(item.updated_at || item.created_at);

                const text = document.createElement("div");
                text.className = "nova-mobile-memory-v2-text";
                text.textContent = item.text || item.content || item.value || item.summary || "";

                meta.appendChild(kind);
                meta.appendChild(date);
                card.appendChild(meta);
                card.appendChild(text);
                body.appendChild(card);
            });
    }

    async function loadMemory() {
        setState("Loading memory?", "?");

        try {
            const response = await fetch("/api/memory", {
                method: "GET",
                headers: {
                    "x-api-key": getApiKey()
                }
            });

            const payload = await response.json();

            console.log("[" + FIX_ID + "] payload", payload);

            if (!response.ok || payload.ok === false) {
                throw new Error(payload.error || payload.message || "Memory request failed.");
            }

            renderMemories(payload);
        } catch (error) {
            console.warn("[" + FIX_ID + "] failed", error);
            setState("Could not load memory: " + String(error && error.message || error), "!");
        }
    }

    function openMemory() {
        const overlay = ensureOverlay();
        overlay.classList.add("is-open");
        loadMemory();
    }

    function bindMemoryButtons() {
        Array.from(document.querySelectorAll("a, button"))
            .filter(isMemoryButton)
            .forEach(function (btn) {
                if (btn.dataset.novaMemoryV2Bound === "1") return;

                btn.dataset.novaMemoryV2Bound = "1";
                btn.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    event.stopImmediatePropagation();
                    openMemory();
                    return false;
                }, true);
            });
    }

    function scheduleBind() {
        [50, 200, 600, 1200].forEach(function (ms) {
            setTimeout(bindMemoryButtons, ms);
        });
    }

    document.addEventListener("DOMContentLoaded", scheduleBind);
    document.addEventListener("click", scheduleBind, true);

    const observer = new MutationObserver(scheduleBind);
    observer.observe(document.documentElement, {
        childList: true,
        subtree: true
    });

    document.addEventListener("keyup", function (event) {
        if (event.key === "Escape") {
            const overlay = document.getElementById("novaMobileMemoryV2Overlay");
            if (overlay) overlay.classList.remove("is-open");
        }
    });

    window.NovaMobileOpenMemoryPanelV2 = openMemory;
    window.NovaMobileLoadMemoryPanelV2 = loadMemory;

    ensureOverlay();
    scheduleBind();

    console.log("[" + FIX_ID + "] ready");
})();
</script>

        setTimeout(function () {
            overlay.style.removeProperty("display");

        const input = document.getElementById("novaMobileMemoryV2Input");
        const kind = document.getElementById("novaMobileMemoryV2Kind");
        const save = document.getElementById("novaMobileMemoryV2Save");

        const text = String((input && input.value) || "").trim();
        const kindValue = String((kind && kind.value) || "preference").trim();

        if (!text) {
            setAddStatus("Type something to remember first.");
            if (input) input.focus();
            return;

        if (save) {
            save.disabled = true;
            save.textContent = "Saving";
        }

        setAddStatus("Saving memory?");

        try {
            const response = await fetch("/api/memory/add", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-api-key": getApiKey()
                },
                body: JSON.stringify({
                    text: text,
                    kind: kindValue,
                    pinned: false
                })
            });

            const payload = await response.json();

            console.log("[" + FIX_ID + "] add payload", payload);

            if (!response.ok || payload.ok === false) {
                throw new Error(payload.error || payload.message || "Save failed.");
            }

            if (input) input.value = "";

            setAddStatus("Saved.");

            if (typeof window.NovaMobileLoadMemoryPanelV2 === "function") {
                window.NovaMobileLoadMemoryPanelV2();

            if (save) {
                save.disabled = false;
                save.textContent = "Save";
            }
        }

                event.stopPropagation();

                closeMemoryPanelHard();
                return false;

<script>
(function () {
    "use strict";

    const FIX_ID = "NOVA_MOBILE_TOP_COPY_EXPORT_SESSION_20260623";

    function $(id) {
        return document.getElementById(id);
    }

    function clean(value) {
        return String(value || "")
            .replace(/\r/g, "")
            .replace(/[ \t]+\n/g, "\n")
            .replace(/\n[ \t]+/g, "\n")
            .replace(/\n{3,}/g, "\n\n")
            .trim();
    }

    function toast(message) {
        if (typeof window.showToast === "function") {
            window.showToast(message);
            return;
        }

        if (window.NovaMobileUI && typeof window.NovaMobileUI.showToast === "function") {
            window.NovaMobileUI.showToast(message);
            return;
        }

        console.log("[" + FIX_ID + "] " + message);
    }

    function getApiKey() {
        return (
            window.API_KEY ||
            window.NOVA_API_KEY ||
            window.apiKey ||
            localStorage.getItem("nova_api_key") ||
            localStorage.getItem("NOVA_API_KEY") ||
            "dev"
        );
    }

    function getSessionId() {
        try {
            if (window.NovaMobileBridge && typeof window.NovaMobileBridge.getSessionId === "function") {
                const sid = window.NovaMobileBridge.getSessionId();

                if (sid) return sid;
            }
        } catch (_) {}

        const keys = [
            "nova_mobile_active_session_id",
            "novaMobileSessionId",
            "active_session_id",
            "session_id",
            "nova_session_id"
        ];

        for (const key of keys) {
            try {
                const value = localStorage.getItem(key);

                if (value) return value;
            } catch (_) {}
        }

        return "";
    }

    function extractMessages(payload) {
        if (!payload) return [];

        if (Array.isArray(payload.messages)) return payload.messages;
        if (payload.session && Array.isArray(payload.session.messages)) return payload.session.messages;
        if (payload.data && Array.isArray(payload.data.messages)) return payload.data.messages;
        if (payload.chat && Array.isArray(payload.chat.messages)) return payload.chat.messages;

        return [];
    }

    function roleOf(message) {
        const raw = String(
            message.role ||
            message.sender ||
            message.type ||
            message.author ||
            ""
        ).toLowerCase();

        if (raw.includes("user") || raw.includes("human")) return "user";
        if (raw.includes("assistant") || raw.includes("bot") || raw.includes("ai")) return "assistant";

        return "";
    }

    function textOfMessage(message) {
        return clean(
            message.text ||
            message.content ||
            message.body ||
            message.message ||
            message.value ||
            message.output ||
            ""
        );
    }

    function formatSessionMessages(messages) {
        const parts = [];

        messages.forEach(function (message) {
            const role = roleOf(message);
            const value = textOfMessage(message);

            if (!role || !value) return;
            if (value === "New chat started and saved to Sessions.") return;

            parts.push(role + "\n" + value);
        });

        return clean(parts.join("\n\n"));
    }

    async function fetchSessionTranscript() {
        const sessionId = getSessionId();

        if (!sessionId) return "";

        const urls = [
            "/api/sessions/" + encodeURIComponent(sessionId),
            "/api/chat/" + encodeURIComponent(sessionId)
        ];

        for (const url of urls) {
            try {
                const response = await fetch(url, {
                    method: "GET",
                    headers: {
                        "Accept": "application/json",
                        "x-api-key": getApiKey()
                    }
                });

                if (!response.ok) continue;

                const payload = await response.json();
                const messages = extractMessages(payload);
                const transcript = formatSessionMessages(messages);

                if (transcript) return transcript;
            } catch (_) {}
        }

        return "";
    }

    function getDomTranscriptFallback() {
        const root =
            $("mobileChatMessages") ||
            $("nova-mobile-messages") ||
            $("messagesContainer") ||
            $("messages-container") ||
            document.querySelector("[data-mobile-chat-messages]") ||
            document.querySelector(".mobile-chat-messages") ||
            document.querySelector(".mobile-chat-container") ||
            document.querySelector(".chat-messages");

        if (!root) return "";

        const clone = root.cloneNode(true);

        clone.querySelectorAll([
            "button",
            ".nova-mobile-assistant-actions",
            ".nova-mobile-message-actions",
            ".nova-code-copy-btn",
            ".mobile-panel",
            "#nova-mobile-tools-panel",
            "#nova-mobile-artifacts-panel",
            "#nova-mobile-execution-panel",
            "#nova-mobile-memory-panel",
            "[data-mobile-assistant-action]"
        ].join(",")).forEach(function (el) {
            el.remove();
        });

        return clean(
            String(clone.innerText || clone.textContent || "")
                .replace(/New chat started and saved to Sessions\./g, "")
        );
    }

    async function getTranscript() {
        const sessionTranscript = await fetchSessionTranscript();

        if (sessionTranscript) return sessionTranscript;

        return getDomTranscriptFallback() || "No chat messages.";
    }

    async function copyText(value) {
        value = clean(value);

        if (!value) {
            toast("Nothing to copy.");
            return false;
        }

        try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                await navigator.clipboard.writeText(value);
                toast("Copied chat.");
                return true;
            }
        } catch (_) {}

        const area = document.createElement("textarea");
        area.value = value;
        area.style.position = "fixed";
        area.style.left = "-9999px";
        area.style.top = "0";

        document.body.appendChild(area);
        area.focus();
        area.select();

        try {
            document.execCommand("copy");
            toast("Copied chat.");
            return true;
        } catch (error) {
            toast("Copy failed.");
            return false;
        } finally {
            area.remove();
        }
    }

    async function copyWholeChat() {
        const transcript = await getTranscript();
        await copyText(transcript);
    }

    async function exportWholeChat() {
        const transcript = await getTranscript();
        const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
        const filename = "nova-chat-" + stamp + ".txt";

        try {
            const blob = new Blob([transcript], {
                type: "text/plain;charset=utf-8"
            });

            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");

            link.href = url;
            link.download = filename;
            link.style.display = "none";

            document.body.appendChild(link);
            link.click();

            setTimeout(function () {
                URL.revokeObjectURL(url);
                link.remove();
            }, 800);

            toast("Exported chat.");
        } catch (error) {
            await copyText(transcript);
            toast("Export failed, copied instead.");
        }
    }

    function restoreButton(button) {
        if (!button) return;

        button.classList.remove("nova-mobile-top-copy-export-hidden");
        button.classList.remove("nova-mobile-hidden-duplicate");
        button.removeAttribute("aria-hidden");
        button.tabIndex = 0;

        button.style.setProperty("display", "inline-flex", "important");
        button.style.setProperty("visibility", "visible", "important");
        button.style.setProperty("opacity", "1", "important");
        button.style.setProperty("pointer-events", "auto", "important");
    }

    function bind(id, handler) {
        const oldButton = $(id);

        if (!oldButton || !oldButton.parentNode) return;

        const button = oldButton.cloneNode(true);

        restoreButton(button);
        button.removeAttribute("onclick");
        button.dataset.novaTopCopyExportSession = "1";

        button.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
            handler();
            return false;
        }, true);

        oldButton.parentNode.replaceChild(button, oldButton);
    }

    function wire() {
        bind("nova-mobile-copy-chat", copyWholeChat);
        bind("nova-mobile-export-chat", exportWholeChat);
    }

    window.NovaMobileCopyWholeChat = copyWholeChat;
    window.NovaMobileExportWholeChat = exportWholeChat;
    window.NovaMobileGetTopTranscript = getTranscript;

    document.addEventListener("DOMContentLoaded", wire);
    wire();

    setTimeout(wire, 250);
    setTimeout(wire, 900);

    console.log("[" + FIX_ID + "] ready");
})();
</script>

<script>
(function () {
    const MARK = "NOVA_MOBILE_INLINE_SESSION_SHAPE_ADAPTER_20260623";

        return;

    function normalize(data) {
        try {
            if (
                data &&
                typeof data === "object" &&
                data.session &&
                typeof data.session === "object"
            ) {
                if (!Array.isArray(data.messages) && Array.isArray(data.session.messages)) {
                    data.messages = data.session.messages;

                data.id = data.id || data.session.id || data.active_session_id || "";

                data.created_at = data.created_at || data.session.created_at || "";
                data.updated_at = data.updated_at || data.session.updated_at || "";
                data.active_session_id = data.active_session_id || data.session.id || "";
            }
        } catch (e) {}

        return data;
    }

    if (!Response.prototype.__novaMobileSessionShapeAdapterPatched) {
        const rawJson = Response.prototype.json;

        Response.prototype.json = function () {
            return rawJson.call(this).then(data => normalize(data));
        };

    }

    window.NovaMobileNormalizeSessionResponse = normalize;

            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function getText(el) {
        return String(el?.innerText || el?.textContent || "")
            .replace(/\s+/g, " ")
            .trim();
    }

    function isSessionsButtonTarget(target) {
        const el = target?.closest?.("button, a, [role='button'], div, span");
        if (!el) return false;

        if (el.id === "nova-mobile-sessions-toggle") return true;
        if (el.closest?.("#nova-mobile-sessions-toggle")) return true;

        const text = getText(el);
        const idClass = `${el.id || ""} ${el.className || ""}`.toLowerCase();

        if (text === "Sessions") return true;
        if (text.includes("Sessions") && /session/.test(idClass)) return true;

        return false;
    }

    function closePanel() {
        document.getElementById(PANEL_ID)?.remove();
    }

    function removeOldSessionOverlays() {
        [
            "nova-mobile-session-restore-panel-v1",
            "nova-mobile-sessions-panel",
            "nova-mobile-sessions-shell",
            "nova-mobile-visible-sessions-fallback",
            "nova-mobile-final-real-sessions-overlay"
        ].forEach(id => {
            const el = document.getElementById(id);
            if (el && id !== PANEL_ID) el.remove();
        });
    }

    function findChatTarget() {
        const direct = [
            "nova-mobile-chat",
            "mobileChat",
            "chatMessages",
            "messages",
            "mobile-messages",
            "nova-chat-messages"
        ];

        for (const id of direct) {
            const el = document.getElementById(id);
            if (el) return el;
        }

        const candidates = Array.from(document.querySelectorAll(
            ".nova-mobile-chat, .nova-mobile-chat-messages, .mobile-chat, .mobile-chat-messages, .chat-messages, .messages, [data-chat-messages], [data-nova-chat], [id*='messages' i], [class*='messages' i], [id*='chat' i], [class*='chat' i]"
        ))
            .filter(el => {
                const tag = el.tagName;
                if (["TEXTAREA", "INPUT", "BUTTON", "FORM", "SCRIPT", "STYLE"].includes(tag)) return false;

                const r = el.getBoundingClientRect();
                if (r.width < 180 || r.height < 120) return false;

                const name = `${el.id || ""} ${el.className || ""}`.toLowerCase();
                if (/composer|input|toolbar|tools|session|panel|menu|button/.test(name)) return false;

                return true;
            })
            .map(el => {
                const r = el.getBoundingClientRect();
                const name = `${el.id || ""} ${el.className || ""}`.toLowerCase();
                let score = 0;
                if (name.includes("messages")) score += 10;
                if (name.includes("chat")) score += 6;
                if (el.scrollHeight > el.clientHeight) score += 3;
                score += Math.min(6, Math.round(r.height / 100));
                return { el, score, height: r.height };
            })
            .sort((a, b) => b.score - a.score || b.height - a.height);

        return candidates[0]?.el || null;
    }

    function messageText(message) {
        const raw = message?.content ?? message?.text ?? message?.message ?? "";

        if (Array.isArray(raw)) {
            return raw.map(part => {
                if (typeof part === "string") return part;
                return part?.text || part?.content || "";
            }).join("\n");
        }

        if (typeof raw === "object" && raw !== null) {
            return raw.text || raw.content || JSON.stringify(raw);
        }

        return String(raw || "");
    }

    function messageRole(message) {
        const role = String(message?.role || message?.author || "assistant").toLowerCase();
        if (role.includes("user")) return "user";
        if (role.includes("system")) return "system";
        return "assistant";
    }

    function renderMessages(messages) {
        const chat = findChatTarget();

        if (!chat) {
            console.warn(TAG, "no chat target found");
            return false;
        }

        chat.innerHTML = "";

        messages.forEach(message => {
            const role = messageRole(message);
            const bubble = document.createElement("div");

            bubble.className = `nova-mobile-restored-message nova-mobile-restored-${role}`;
            bubble.textContent = messageText(message);

            css(bubble, {
                margin: role === "user" ? "10px 12px 10px auto" : "10px auto 10px 12px",
                maxWidth: "86%",
                padding: "12px 14px",
                borderRadius: "16px",
                background: role === "user" ? "rgba(124,92,255,.26)" : "rgba(255,255,255,.09)",
                color: "#fff",
                whiteSpace: "pre-wrap",
                lineHeight: "1.42",
                fontSize: "14px",
                boxSizing: "border-box",
                border: "1px solid rgba(255,255,255,.08)"
            });

            chat.appendChild(bubble);
        });

        requestAnimationFrame(() => {
            chat.scrollTop = chat.scrollHeight;
        });

        return true;
    }

    async function fetchSessions() {
        const data = await fetch("/api/sessions", { cache: "no-store" }).then(r => r.json());
        return data.items || data.sessions || data.list || [];

    async function fetchMessages(sessionId) {

        return data.messages || data.session?.messages || data.item?.messages || [];

        window.novaMobileActiveSessionId = sessionId;

        renderMessages(messages);
        closePanel();

        if (DEBUG_SESSIONS) console.log(TAG, "restore done", {
            sessionId,
            messages: messages.length
        });
    }

    function sessionTitle(session) {
        return String(session.title || session.name || session.id || "Session");
    }

    function sessionCount(session) {
        return session.messages?.length ?? session.message_count ?? session.count ?? 0;
    }

    function sessionUpdated(session) {
        return session.updated_at || session.created_at || session.timestamp || "";
    }

    function makeCard(session) {
        const card = document.createElement("button");
        card.type = "button";
        card.dataset.sessionId = session.id;

        card.innerHTML = `
            <div style="font-weight:900;font-size:14px;margin-bottom:4px;">${escapeHtml(sessionTitle(session))}</div>
            <div style="font-size:12px;opacity:.82;">${Number(sessionCount(session) || 0)} messages</div>
            <div style="font-size:11px;opacity:.55;margin-top:4px;">${escapeHtml(sessionUpdated(session))}</div>
        `;

        css(card, {
            display: "block",
            width: "100%",
            textAlign: "left",
            padding: "12px",
            margin: "0 0 10px 0",
            borderRadius: "16px",
            border: "1px solid rgba(255,255,255,.12)",
            background: "rgba(255,255,255,.08)",
            color: "#fff",

            cursor: "pointer"
        });

        card.addEventListener("click", ev => {
            ev.preventDefault();
            ev.stopPropagation();
            ev.stopImmediatePropagation();
            restoreSession(session.id);
        }, true);

        return card;
    }

    async function openPanel() {
        removeOldSessionOverlays();
        closePanel();

        const panel = document.createElement("div");
        panel.id = PANEL_ID;

        panel.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;">
                <div style="font-weight:900;font-size:17px;">Sessions</div>
                <button type="button" data-close-session-restore-v2="1">Close</button>
            </div>
            <div id="${LIST_ID}">
                <div style="opacity:.7;padding:14px;">Loading sessions...</div>
            </div>
        `;

        css(panel, {
            position: "fixed",
            zIndex: "2147483647",
            top: "58px",
            left: "14px",
            right: "14px",
            bottom: "86px",
            overflow: "auto",
            WebkitOverflowScrolling: "touch",
            padding: "14px",
            borderRadius: "22px",
            background: "rgba(18,18,26,.985)",
            color: "#fff",
            border: "1px solid rgba(255,255,255,.14)",
            boxShadow: "0 20px 60px rgba(0,0,0,.55)",
            boxSizing: "border-box",
            fontFamily: "inherit"
        });

        const close = panel.querySelector("[data-close-session-restore-v2]");
        css(close, {
            minHeight: "36px",
            padding: "0 14px",
            borderRadius: "12px",
            border: "1px solid rgba(255,255,255,.15)",
            background: "rgba(255,255,255,.10)",
            color: "#fff",
            fontWeight: "800"
        });

        close.addEventListener("click", ev => {
            ev.preventDefault();
            ev.stopPropagation();
            closePanel();
        }, true);

        document.body.appendChild(panel);

        const listEl = document.getElementById(LIST_ID);

        try {
            const sessions = await fetchSessions();
            listEl.innerHTML = "";

            sessions.forEach(session => {
                if (!session?.id) return;
                listEl.appendChild(makeCard(session));
            });

            if (!listEl.children.length) {
                listEl.innerHTML = `<div style="opacity:.7;padding:14px;">No sessions found.</div>`;
            }

            if (DEBUG_SESSIONS) console.log(TAG, "panel loaded", { count: sessions.length });
        } catch (err) {
            console.warn(TAG, "panel load failed", err);
            listEl.innerHTML = `<div style="opacity:.7;padding:14px;">Could not load sessions.</div>`;
        }
    }

    function togglePanelFromEvent(ev) {
        if (!isSessionsButtonTarget(ev.target)) return;

        ev.preventDefault();
        ev.stopPropagation();
        ev.stopImmediatePropagation();

        if (document.getElementById(PANEL_ID)) {
            closePanel();
        } else {
            openPanel();
        }

        if (DEBUG_SESSIONS) console.log(TAG, "sessions click captured");
        return false;
    }

    function ownButton() {
        const btn = document.getElementById("nova-mobile-sessions-toggle");
        if (!btn) return false;

        btn.type = "button";

        btn.dataset.sessionRestoreBridgeV2 = "1";

        btn.addEventListener("click", togglePanelFromEvent, true);
        btn.addEventListener("pointerdown", togglePanelFromEvent, true);
        btn.addEventListener("touchstart", togglePanelFromEvent, true);

        if (DEBUG_SESSIONS) console.log(TAG, "sessions button owned");
        return true;
    }

    ["pointerdown", "touchstart", "click"].forEach(type => {
        window.addEventListener(type, togglePanelFromEvent, true);
        document.addEventListener(type, togglePanelFromEvent, true);
    });

    window.NovaMobileSessionRestoreBridgeV2 = () => {
        ownButton();

        return {
            button: !!document.getElementById("nova-mobile-sessions-toggle"),
            panel: !!document.getElementById(PANEL_ID),
            chat: !!findChatTarget(),
            marker: TAG
        };
    };

    ownButton();

    setTimeout(ownButton, 100);
    setTimeout(ownButton, 400);
    setTimeout(ownButton, 1000);
    setInterval(ownButton, 1500);

    console.log(TAG, "ready");
})();
</script>

    function makeButton(id, text, href) {
        let btn = document.getElementById(id);

        if (!btn) {
            btn = document.createElement("button");
            btn.id = id;
            btn.type = "button";
            btn.textContent = text;
            btn.title = text;
            btn.setAttribute("aria-label", text);

            btn.addEventListener("click", function (event) {
                event.preventDefault();
                event.stopPropagation();
                window.location.href = href;
            }, true);
        }

        btn.textContent = text;
        btn.title = text;
        btn.setAttribute("aria-label", text);

        return btn;
    }

    function ensureHelpBlog(host) {
        if (!host) return;

        const help = makeButton("nova-mobile-menu-help-restored", "Help", "/help");
        const blog = makeButton("nova-mobile-menu-blog-restored", "Blog", "/blog");

        if (help.parentElement !== host) host.appendChild(help);
        if (blog.parentElement !== host) host.appendChild(blog);
    }

    function classify(el) {
        const id = clean(el.id);
        const cls = clean(el.className);
        const text = clean(el.innerText || el.textContent);
        const raw = `${id} ${cls} ${text}`;

        if (id === "nova-mobile-menu-account-restored") return "account";
        if (id === "nova-mobile-menu-account-detail-restored") return "account-detail";

        if (id === "nova-mobile-menu-help-restored" || text === "help" || raw.includes("help")) {
            return "help";
        }

        if (id === "nova-mobile-menu-blog-restored" || text === "blog" || raw.includes("blog")) {
            return "blog";
        }

        if (raw.includes("memory")) return "memory";

        if (
            raw.includes("mobile artifacts") ||
            raw.includes("mobile artifact")
        ) return "mobile-artifacts";

        if (raw.includes("artifacts") || raw.includes("artifact")) return "artifacts";

        if (
            text === "home" ||
            raw.includes("back to nova") ||
            raw.includes("nova home")
        ) return "home";

        if (
            raw.includes("close execution") ||
            raw.includes("execution")
        ) return "close-execution";

        return "other";
    }

    function rank(el) {
        const type = classify(el);
        const index = ORDER.indexOf(type);

        if (index >= 0) return index;

        return 1000 + Number(el.dataset.novaMenuOriginalIndex || 0);
    }

    function shouldOrder(el) {
        if (!el || el.nodeType !== 1) return false;

        const tag = String(el.tagName || "").toLowerCase();
        const role = clean(el.getAttribute("role"));
        const text = clean(el.innerText || el.textContent);
        const id = clean(el.id);

        if (id === "nova-mobile-menu-account-detail-restored") return true;
        if (tag === "button" || tag === "a" || role === "button") return true;

        return text &&
            el.children.length <= 4 &&
            (
                text.includes("account") ||
                text.includes("help") ||
                text.includes("memory") ||
                text.includes("home") ||
                text.includes("blog") ||
                text.includes("artifact") ||
                text.includes("execution")
            );
    }

    function orderMenu(reason) {
        if (typeof window.NovaMobileRestoreMenuAccountFinal === "function") {
            try {
                window.NovaMobileRestoreMenuAccountFinal("order-before-" + (reason || "boot"));
            } catch (error) {
                console.warn(TAG, "account restore failed", error);
            }
        }

        const host = panel();

        if (!host) {
            if (DEBUG) console.log(TAG, reason || "boot", { panel: false });
            return false;
        }

        ensureHelpBlog(host);

        const items = Array.from(host.children).filter(shouldOrder);

        items.forEach((el, index) => {
            if (!el.dataset.novaMenuOriginalIndex) {
                el.dataset.novaMenuOriginalIndex = String(index);
            }
        });

        const sorted = items.slice().sort((a, b) => {
            const ar = rank(a);
            const br = rank(b);

            if (ar !== br) return ar - br;

            return Number(a.dataset.novaMenuOriginalIndex || 0) -
                Number(b.dataset.novaMenuOriginalIndex || 0);
        });

        sorted.forEach(el => {
            if (el.parentElement === host) {
                host.appendChild(el);
            }
        });

        if (DEBUG) console.log(TAG, reason || "boot", {
            panel: true,
            ordered: sorted.map(el => ({
                id: el.id || "",
                type: classify(el),
                text: String(el.innerText || el.textContent || "").trim().slice(0, 50)
            }))
        });

        return true;
    }

    function bindMenuButton() {
        const menu = document.getElementById("nova-mobile-tools-toggle");
        if (!menu || menu.dataset.novaMenuHelpBlogOrderFinal) return;

        menu.dataset.novaMenuHelpBlogOrderFinal = "1";
        menu.addEventListener("click", function () {
            requestAnimationFrame(() => orderMenu("menu-click"));
            setTimeout(() => orderMenu("menu-click-late"), 300);
        }, false);
    }

    function boot() {
        bindMenuButton();
        orderMenu("boot");
    }

    window.NovaMobileOrderMenuHelpBlogFinal = orderMenu;

    boot();
    setTimeout(boot, 300);

    if (DEBUG) console.log(TAG, "ready");
})();
</script>
