<script>
window.NovaOpenMobileSessions = function () {
    var panel = document.getElementById("nova-mobile-sessions-panel");

    if (!panel) {
        alert("Sessions panel not found.");
        return;
    }

    panel.classList.remove("hidden");
    panel.style.cssText =
        "display:flex !important;" +
        "position:fixed !important;" +
        "left:10px !important;" +
        "right:10px !important;" +
        "top:76px !important;" +
        "z-index:999999 !important;" +
        "flex-direction:column !important;" +
        "gap:10px !important;" +
        "padding:14px !important;" +
        "background:#111827 !important;" +
        "border:1px solid rgba(255,255,255,.18) !important;" +
        "border-radius:18px !important;" +
        "box-shadow:0 24px 80px rgba(0,0,0,.55) !important;";
};

window.NovaCloseMobileSessions = function () {
    var panel = document.getElementById("nova-mobile-sessions-panel");

    if (!panel) return;

    panel.classList.add("hidden");
    panel.style.cssText = "display:none !important;";
};
</script>

<script>
(function () {
    "use strict";

    function ready(fn) {
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", fn);
            return;
        }

        fn();
    }

    ready(function () {
        const toolsButton = document.getElementById("nova-mobile-tools-toggle");
        const toolsPanel = document.getElementById("nova-mobile-tools-panel");

        if (!toolsButton || !toolsPanel) {
            console.warn("[Nova Mobile] tools menu fallback missing elements", {
                toolsButton: !!toolsButton,
                toolsPanel: !!toolsPanel,
            });
            return;
        }

        toolsButton.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();

            toolsPanel.classList.toggle("hidden");

            const isOpen = !toolsPanel.classList.contains("hidden");
            toolsButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        toolsButton.setAttribute("aria-controls", "nova-mobile-tools-panel");
        toolsButton.setAttribute("aria-expanded", "false");

        console.log("[Nova Mobile] tools menu fallback wired");
    });
})();
</script>

<!-- NOVA MOBILE PANEL HARD LOCK START -->
<script>
(function () {
    "use strict";

    function $(id) {
        return document.getElementById(id);
    }

    function forceHide(panel) {
        if (!panel) return;

        panel.classList.add("hidden");
        panel.setAttribute("aria-hidden", "true");
        panel.style.setProperty("display", "none", "important");
    }

    function forceShow(panel, topOrBottom) {
        if (!panel) return;

        panel.classList.remove("hidden");
        panel.setAttribute("aria-hidden", "false");

        panel.style.setProperty("display", "flex", "important");
        panel.style.setProperty("position", "fixed", "important");
        panel.style.setProperty("left", "10px", "important");
        panel.style.setProperty("right", "10px", "important");
        panel.style.setProperty("z-index", "999999", "important");
        panel.style.setProperty("flex-direction", "column", "important");
        panel.style.setProperty("gap", "10px", "important");
        panel.style.setProperty("padding", "14px", "important");
        panel.style.setProperty("background", "#111827", "important");
        panel.style.setProperty("border", "1px solid rgba(255,255,255,.18)", "important");
        panel.style.setProperty("border-radius", "18px", "important");
        panel.style.setProperty("box-shadow", "0 24px 80px rgba(0,0,0,.55)", "important");

        if (topOrBottom === "bottom") {
            panel.style.setProperty("bottom", "90px", "important");
            panel.style.removeProperty("top");
        } else {
            panel.style.setProperty("top", "76px", "important");
            panel.style.removeProperty("bottom");
        }
    }

    function replaceButton(id) {
        var oldButton = $(id);

        if (!oldButton || !oldButton.parentNode) {
            return null;
        }

        var newButton = oldButton.cloneNode(true);
        newButton.removeAttribute("onclick");
        oldButton.parentNode.replaceChild(newButton, oldButton);

        return newButton;
    }

    function closeAllPanels() {
        forceHide($("nova-mobile-sessions-panel"));
        forceHide($("nova-mobile-tools-panel"));
        forceHide($("nova-mobile-memory-panel"));
        forceHide($("nova-mobile-execution-panel"));
    }

    function wire() {
        var sessionsButton = replaceButton("nova-mobile-sessions-toggle");
        var toolsButton = replaceButton("nova-mobile-tools-toggle");

        var sessionsPanel = $("nova-mobile-sessions-panel");
        var toolsPanel = $("nova-mobile-tools-panel");
        var memoryPanel = $("nova-mobile-memory-panel");
        var executionPanel = $("nova-mobile-execution-panel");

        closeAllPanels();

        window.NovaOpenMobileSessions = function () {
            closeAllPanels();
            forceShow(sessionsPanel, "top");
        };

        window.NovaCloseMobileSessions = function () {
            forceHide(sessionsPanel);
        };

        window.NovaOpenMobileTools = function () {
            closeAllPanels();
            forceShow(toolsPanel, "bottom");
        };

        window.NovaCloseMobileTools = function () {
            forceHide(toolsPanel);
        };

        window.NovaOpenMobileMemory = function () {
            closeAllPanels();
            forceShow(memoryPanel, "top");
        };

        window.NovaCloseMobileMemory = function () {
            forceHide(memoryPanel);
        };

        window.NovaOpenMobileExecution = function () {
            closeAllPanels();
            forceShow(executionPanel, "top");
        };

        window.NovaCloseMobileExecution = function () {
            forceHide(executionPanel);
        };

        if (sessionsButton) {
            sessionsButton.addEventListener("click", function (event) {
                event.preventDefault();
                event.stopPropagation();
                window.NovaOpenMobileSessions();
            });
        }

        if (toolsButton) {
            toolsButton.addEventListener("click", function (event) {
                event.preventDefault();
                event.stopPropagation();
                window.NovaOpenMobileTools();4:58 PM 2026-06-03
            });
        }

        document.querySelectorAll("button").forEach(function (button) {
            var text = (button.textContent || "").trim().toLowerCase();
            var tool = button.getAttribute("data-mobile-tool");

            if (text === "close sessions") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileSessions();
                });
            }

            if (text === "close") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileTools();
                });
            }

            if (text === "memory" || button.id === "nova-mobile-memory-toggle") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaOpenMobileMemory();
                });
            }

            if (text === "close memory" || button.id === "nova-mobile-memory-close") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileMemory();
                });
            }

            if (tool === "execution" || text === "open execution panel") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaOpenMobileExecution();
                });
            }

            if (text === "close execution" || button.id === "nova-mobile-execution-close") {
                button.removeAttribute("onclick");
                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.NovaCloseMobileExecution();
                });
            }
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") {
                closeAllPanels();
            }
        });

        console.log("[Nova Mobile] panel hard lock active");
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", wire);
    } else {
        wire();
    }
})();
</script>
<!-- NOVA MOBILE PANEL HARD LOCK END -->
