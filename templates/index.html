<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Ultimate 2026</title>
  <link rel="stylesheet" href="/static/css/nova-main.css?v=endgame" />
  <style>
    :root {
      --bg: #07111f;
      --bg-2: #0b1730;
      --panel: rgba(12, 20, 37, 0.94);
      --panel-2: rgba(16, 27, 49, 0.97);
      --line: rgba(130, 158, 222, 0.14);
      --text: #eef4ff;
      --muted: #9cafcf;
      --accent: #6ea8ff;
      --accent-soft: rgba(110, 168, 255, 0.16);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
    }

    .nova-app-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .nova-main {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      overflow: hidden;
    }

    .nova-topbar {
      flex: 0 0 auto;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(10px);
    }

    .nova-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
    }

    .nova-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .nova-chat-wrap {
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .nova-chat-panel {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 18px;
      padding-bottom: 28px;
      scroll-behavior: smooth;
    }

    .nova-empty-state {
      padding: 20px 18px 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .nova-message {
      margin-bottom: 14px;
    }

    .nova-message-inner {
      background: rgba(255,255,255,0.035);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .nova-message-user .nova-message-inner {
      background: rgba(110, 168, 255, 0.08);
    }

    .nova-message-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 12px;
    }

    .nova-message-role {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .nova-message-time {
      font-size: 12px;
      color: var(--muted);
    }

    .nova-message-markdown {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.55;
      font-size: 14px;
    }

    .nova-message-attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .nova-attachment-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      text-decoration: none;
      font-size: 12px;
    }

    .nova-attachment-chip-remove {
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0;
    }

    .nova-message-debug {
      margin-top: 12px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .nova-message-debug summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .nova-message-debug pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      color: #cfe0ff;
      background: rgba(0,0,0,0.22);
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      margin: 0;
    }

    .nova-composer-wrap {
      flex: 0 0 auto;
      border-top: 1px solid var(--line);
      padding: 14px;
      background: rgba(255,255,255,0.02);
    }

    .nova-pending-files {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .nova-composer {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #chatInput {
      flex: 1;
      min-height: 54px;
      max-height: 180px;
      resize: vertical;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      outline: none;
    }

    #sendBtn,
    #uploadBtn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      min-width: 72px;
      flex: 0 0 auto;
    }

    #sendBtn:hover,
    #uploadBtn:hover {
      background: rgba(255,255,255,0.1);
    }

    .nova-right-rail {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.02);
      overflow: hidden;
    }

    .nova-rail-head {
      flex: 0 0 auto;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      font-weight: 700;
    }

    #novaArtifactsPanel {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
    }

    @media (max-width: 1100px) {
      html, body {
        overflow: auto;
      }

      .nova-app-shell {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) 320px;
        height: auto;
        min-height: 100vh;
      }

      .nova-main {
        min-height: 70vh;
      }

      .nova-right-rail {
        border-top: 1px solid var(--line);
        min-height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="nova-app-shell" id="novaAppShell">
    <main class="nova-main">
      <div class="nova-topbar">
        <div class="nova-title">Nova Ultimate 2026</div>
        <div class="nova-subtitle">Stateful chat • artifacts • brain retrieval</div>
      </div>

      <div class="nova-chat-wrap">
        <div class="nova-chat-panel" id="messages">
          <div id="novaEmptyState" class="nova-empty-state">Nova is ready. Type a message.</div>
        </div>
      </div>

      <div class="nova-composer-wrap">
        <div id="novaPendingFiles" class="nova-pending-files"></div>
        <div class="nova-composer">
          <textarea id="chatInput" placeholder="Type your message..."></textarea>
          <button id="uploadBtn" type="button">Upload</button>
          <button id="sendBtn" type="button">Send</button>
          <input
            type="file"
            id="fileInput"
            style="display:none"
            multiple
            accept=".txt,.md,.log,.json,.csv,.pdf,image/*"
          />
        </div>
      </div>
    </main>

    <aside class="nova-right-rail">
      <div class="nova-rail-head">Artifacts</div>
      <div id="novaArtifactsPanel">
        <div id="novaArtifactsList"></div>
        <div class="nova-artifact-viewer-fallback">
          <div id="novaArtifactViewerTitle" style="font-weight:700;margin-bottom:6px;"></div>
          <div id="novaArtifactViewerMeta" style="font-size:12px;opacity:.72;margin-bottom:10px;"></div>
          <pre id="novaArtifactViewerContent" style="white-space:pre-wrap;word-break:break-word;"></pre>
        </div>
      </div>
    </aside>
  </div>

  <script src="/static/js/nova-render.js?v=endgame"></script>
  <script src="/static/js/nova-artifacts.js?v=endgame"></script>
  <script src="/static/js/nova-composer-bundle.js?v=endgame"></script>
</body>
</html>
