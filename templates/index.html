<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nova Ultimate 2026</title>
  <link rel="stylesheet" href="/static/css/nova-main.css?v=frontend-lock-2026-03-31-005">
  <style>
    :root {
      --bg: #07111f;
      --bg-2: #0b1730;
      --panel: rgba(12, 20, 37, 0.94);
      --panel-2: rgba(16, 27, 49, 0.97);
      --text: #eef4ff;
      --muted: #9cafcf;
      --line: rgba(130, 158, 222, 0.14);
      --line-strong: rgba(130, 158, 222, 0.24);
      --accent: #6ea8ff;
      --accent-soft: rgba(110, 168, 255, 0.16);
      --danger: #ff6f91;
      --ok: #79e1b0;
      --shadow-xl: 0 24px 80px rgba(0,0,0,0.28);
      --left-w: 320px;
      --right-w: 420px;
    }

    * { box-sizing: border-box; min-width: 0; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(110,168,255,0.12), transparent 28%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
    }

    .nova-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--left-w) minmax(0,1fr) var(--right-w);
      width: 100%;
    }

    .nova-sidebar,
    .nova-right-rail {
      min-height: 100vh;
      background: var(--panel);
      backdrop-filter: blur(14px);
      min-width: 0;
    }

    .nova-sidebar {
      border-right: 1px solid var(--line);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto auto minmax(0,1fr);
    }

    .nova-right-rail {
      border-left: 1px solid var(--line);
      background: var(--panel-2);
      display: grid !important;
      grid-template-rows: auto auto auto minmax(220px, 38vh) minmax(0,1fr);
      overflow: hidden;
      visibility: visible !important;
      opacity: 1 !important;
    }

    .nova-main {
      min-width: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto minmax(0,1fr) auto;
    }

    .nova-panel-head,
    .nova-topbar {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
    }

    .nova-panel-head h1,
    .nova-panel-head h2,
    .nova-topbar h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .02em;
    }

    .nova-panel-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .nova-session-actions,
    .nova-rail-tabs,
    .nova-artifact-tools,
    .nova-composer-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .nova-session-actions,
    .nova-artifact-tools,
    .nova-rail-tabs {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
    }

    .nova-btn {
      appearance: none;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: .18s ease;
    }

    .nova-btn:hover { background: rgba(255,255,255,0.08); }

    .nova-btn.is-primary {
      background: var(--accent-soft);
      border-color: rgba(110,168,255,0.32);
    }

    .nova-btn.is-danger {
      background: rgba(255,111,145,0.10);
      border-color: rgba(255,111,145,0.22);
      color: #ffd7e1;
    }

    .nova-btn.is-tab.is-active {
      background: var(--accent-soft);
      border-color: rgba(110,168,255,0.32);
    }

    .nova-session-list,
    .nova-artifact-list {
      padding: 16px 18px;
      display: grid;
      gap: 10px;
      align-content: start;
      overflow: auto;
      min-height: 0;
    }

    #sessionRail {
      min-height: 0;
      overflow: auto;
    }

    #sessionList {
      padding: 16px 18px;
      display: grid;
      gap: 10px;
      align-content: start;
      min-height: 0;
    }

    .nova-chat-wrap {
      min-height: 0;
      overflow: auto;
      padding: 20px;
    }

    #messages {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .nova-empty-state {
      padding: 22px;
      border: 1px dashed var(--line-strong);
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      color: var(--muted);
    }

    .nova-composer {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
    }

    #chatInput {
      width: 100%;
      min-height: 52px;
      max-height: 320px;
      resize: vertical;
      border-radius: 16px;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 14px 15px;
      font: inherit;
      outline: none;
      flex: 1 1 auto;
    }

    #chatInput::placeholder {
      color: var(--muted);
    }

    .nova-status-strip {
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      min-height: 38px;
      display: flex;
      align-items: center;
    }

    .nova-artifact-viewer {
      min-height: 0;
      overflow: auto;
      padding: 18px;
      display: grid;
      gap: 14px;
      border-top: 1px solid var(--line);
    }

    .nova-artifact-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      padding: 14px;
      display: grid;
      gap: 8px;
      cursor: pointer;
    }

    .nova-artifact-card.is-active {
      border-color: rgba(110,168,255,0.34);
      background: rgba(110,168,255,0.08);
    }

    .nova-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nova-badge {
      font-size: 10px;
      font-weight: 800;
      padding: 4px 7px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .nova-pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
      font-size: 14px;
      color: var(--text);
    }

    .nova-kv {
      display: grid;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    #memoryPanel,
    #webPanel {
      display: none;
    }

    @media (max-width: 1500px) {
      :root {
        --left-w: 300px;
        --right-w: 380px;
      }
    }

    @media (max-width: 1280px) {
      :root {
        --left-w: 280px;
        --right-w: 340px;
      }
    }

    @media (max-width: 1100px) {
      :root {
        --left-w: 250px;
        --right-w: 300px;
      }
    }

    @media (max-width: 900px) {
      .nova-shell {
        grid-template-columns: 1fr;
      }

      .nova-sidebar,
      .nova-right-rail {
        min-height: auto;
      }

      .nova-sidebar {
        border-right: none;
        border-bottom: 1px solid var(--line);
      }

      .nova-right-rail {
        border-left: none;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <div id="novaAppShell" class="nova-shell" data-api-base="">
    <aside id="novaSidebar" class="nova-sidebar" data-session-rail>
      <div class="nova-panel-head">
        <h1>Nova Sessions</h1>
        <div class="nova-panel-sub">Backend truth rail</div>
      </div>

      <div class="nova-session-actions">
        <button id="sessionNewBtn" class="nova-btn is-primary" type="button">New</button>
        <button id="sessionRenameBtn" class="nova-btn" type="button">Rename</button>
        <button id="sessionPinBtn" class="nova-btn" type="button">Pin</button>
        <button id="sessionDeleteBtn" class="nova-btn is-danger" type="button">Delete</button>
      </div>

      <div id="sessionRail" class="nova-session-list" data-session-list>
        <div id="sessionList"></div>
      </div>
    </aside>

    <main class="nova-main">
      <div class="nova-topbar">
        <h1>Nova Ultimate 2026</h1>
        <div class="nova-panel-sub">Session truth + artifact rail live pass</div>
      </div>

      <div id="novaSessionStatus" class="nova-status-strip">Ready.</div>

      <div class="nova-chat-wrap">
        <div id="messages"></div>
        <div id="novaEmptyState" class="nova-empty-state">
          Start a session, send a message, and saved assistant replies will show up in the artifacts rail.
        </div>
      </div>

      <div class="nova-composer">
        <div class="nova-composer-row">
          <textarea id="chatInput" placeholder="Type a message to Nova..." autocomplete="off" spellcheck="false"></textarea>
          <button id="sendBtn" class="nova-btn is-primary" type="button">Send</button>
        </div>
      </div>
    </main>

    <aside id="artifactsPanel" class="nova-right-rail" aria-hidden="false">
      <div class="nova-panel-head">
        <h2>Artifacts</h2>
        <div class="nova-panel-sub">Saved assistant replies from backend truth</div>
      </div>

      <div class="nova-rail-tabs">
        <button id="artifactsPanelToggle" class="nova-btn is-tab is-active" type="button" aria-pressed="true">Artifacts</button>
        <button id="memoryPanelToggle" class="nova-btn is-tab" type="button" disabled aria-disabled="true">Memory</button>
        <button id="webPanelToggle" class="nova-btn is-tab" type="button" disabled aria-disabled="true">Web</button>
      </div>

      <div class="nova-artifact-tools">
        <button id="artifactRefreshBtn" class="nova-btn" type="button">Refresh</button>
        <button id="artifactOpenSessionBtn" class="nova-btn" type="button">Open Session</button>
        <button id="artifactCopyBtn" class="nova-btn" type="button">Copy</button>
        <button id="artifactCleanJunkBtn" class="nova-btn is-danger" type="button">Clean Junk</button>
      </div>

      <div id="artifactList" class="nova-artifact-list"></div>

      <div id="artifactViewer" class="nova-artifact-viewer">
        <div class="nova-empty-state">
          No artifact selected yet.
        </div>
      </div>

      <div id="memoryPanel" aria-hidden="true"></div>
      <div id="webPanel" aria-hidden="true"></div>
    </aside>
  </div>

  <script>
    (function () {
      "use strict";

      const statusEl = document.getElementById("novaSessionStatus");
      if (!statusEl) return;

      function setStatus(text) {
        statusEl.textContent = text || "Ready.";
      }

      window.NovaSessionStatus = {
        _timer: null,
        pending(message) {
          window.clearTimeout(this._timer);
          setStatus(message || "Working...");
        },
        success(message) {
          window.clearTimeout(this._timer);
          setStatus(message || "Done.");
          this._timer = window.setTimeout(() => setStatus("Ready."), 1200);
        },
        error(message) {
          window.clearTimeout(this._timer);
          setStatus(message || "Something went wrong.");
          this._timer = window.setTimeout(() => setStatus("Ready."), 2400);
        }
      };

      window.NovaFrontendLock = {
        apiBase: "",
        sameOrigin: true,
        build: "frontend-lock-2026-03-31-005"
      };
    })();
  </script>

  <script src="/static/js/nova-session-rail.js?v=frontend-lock-2026-03-31-005"></script>
  <script src="/static/js/nova-composer-bundle.js?v=frontend-lock-2026-03-31-005"></script>
  <script src="/static/js/nova-artifacts.js?v=frontend-lock-2026-03-31-005"></script>
</body>
</html>
