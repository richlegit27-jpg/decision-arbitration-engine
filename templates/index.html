<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nova</title>
  <link rel="stylesheet" href="/static/css/nova-main.css?v=shell-polish-lock-2026-04-05-003">
</head>
<body>
  <div class="nova-app-shell" data-app-shell>
    <aside class="nova-sidebar" data-sidebar>
      <div class="nova-sidebar-top">
        <button class="nova-icon-btn" type="button" data-action="toggle-sidebar" aria-label="Toggle sidebar">☰</button>
        <button class="nova-primary-btn nova-new-chat-btn" type="button" data-action="new-chat">New Chat</button>
      </div>

      <div class="nova-sidebar-brand">
        <div class="nova-sidebar-brand-title">Nova</div>
        <div class="nova-sidebar-brand-subtitle">Fast local AI workspace</div>
      </div>

      <div class="nova-session-list" data-session-list></div>
    </aside>

    <main class="nova-main">
      <header class="nova-topbar">
        <div class="nova-topbar-left">
          <div class="nova-topbar-title-wrap">
            <div class="nova-topbar-title" data-session-title>Nova</div>
            <div class="nova-status-pill">
              <span class="nova-status-dot"></span>
              <span data-state-chip-text>Ready</span>
            </div>
          </div>
          <div class="nova-topbar-subtitle" data-session-subtitle>Fast local AI workspace</div>
        </div>

        <div class="nova-topbar-right">
          <div class="nova-chip" data-route-chip>route: idle / ready</div>
          <div class="nova-chip" data-memory-chip>memory: 0</div>
          <button class="nova-secondary-btn" type="button" data-action="toggle-debug">Debug</button>
        </div>
      </header>

      <section class="nova-chat" data-chat-thread></section>

      <section class="nova-composer-shell">
        <section class="nova-composer">
          <div class="nova-upload-strip" data-upload-strip></div>

          <textarea
            class="nova-chat-input"
            data-chat-input
            placeholder="Message Nova"
            rows="1"
          ></textarea>

          <div class="nova-composer-footer">
            <div class="nova-composer-hint">Enter to send · Shift+Enter for newline</div>
            <div class="nova-composer-actions">
              <button class="nova-secondary-btn" type="button" data-action="upload">Attach</button>
              <button class="nova-primary-btn" type="button" data-action="send">Send</button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <aside class="nova-right-rail" data-right-rail>
      <div class="nova-right-rail-header">
        <div class="nova-right-rail-title">Workspace</div>
        <div class="nova-right-rail-subtitle">Artifacts, memory, web</div>
      </div>

      <div class="nova-right-rail-tabs">
        <button class="nova-rail-tab is-active" type="button" data-panel-tab="artifacts">Artifacts</button>
        <button class="nova-rail-tab" type="button" data-panel-tab="memory">Memory</button>
        <button class="nova-rail-tab" type="button" data-panel-tab="web">Web</button>
      </div>

      <div class="nova-right-rail-body">
        <section class="nova-panel is-active" data-panel="artifacts">
          <div class="nova-panel-list" data-artifact-list></div>
        </section>

        <section class="nova-panel" data-panel="memory">
          <div class="nova-panel-list" data-memory-list></div>
        </section>

        <section class="nova-panel" data-panel="web">
          <div class="nova-panel-list" data-web-list></div>
        </section>
      </div>
    </aside>
  </div>

  <section class="nova-debug-panel" data-debug-panel hidden>
    <div class="nova-debug-header">
      <div>
        <div class="nova-debug-title">Nova Debug</div>
        <div class="nova-debug-subtitle">Memory + route + state</div>
      </div>
      <div class="nova-debug-actions">
        <button class="nova-secondary-btn" type="button" data-action="debug-refresh">Refresh</button>
        <button class="nova-secondary-btn" type="button" data-action="debug-copy">Copy</button>
        <button class="nova-secondary-btn" type="button" data-action="toggle-debug">Close</button>
      </div>
    </div>

    <div class="nova-debug-grid">
      <section class="nova-debug-card">
        <div class="nova-debug-card-title">Route</div>
        <pre class="nova-debug-pre" data-debug-route>{}</pre>
      </section>

      <section class="nova-debug-card">
        <div class="nova-debug-card-title">Memory</div>
        <pre class="nova-debug-pre" data-debug-memory>[]</pre>
      </section>

      <section class="nova-debug-card">
        <div class="nova-debug-card-title">State</div>
        <pre class="nova-debug-pre" data-debug-state>{}</pre>
      </section>

      <section class="nova-debug-card">
        <div class="nova-debug-card-title">Last response</div>
        <pre class="nova-debug-pre" data-debug-response>{}</pre>
      </section>
    </div>
  </section>

  <script src="/static/js/nova-composer-core.js?v=final-lock-2026-04-05"></script>
  <script src="/static/js/nova-composer-sessions.js?v=session-rail-polish-001"></script>
  <script src="/static/js/nova-composer-artifacts.js?v=artifact-viewer-polish-2026-04-05-001"></script>
  <script src="/static/js/nova-composer-bundle.js?v=shell-polish-lock-2026-04-05-003"></script>t>
</body>
</html>
