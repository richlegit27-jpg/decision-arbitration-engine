<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Nova</title>
  <link rel="stylesheet" href="/static/css/nova-style.css">
</head>
<body>
  <div id="appShell" class="app-shell">
    <!-- LEFT SIDEBAR -->
    <aside id="sidebar" class="left-sidebar" aria-hidden="false">
      <div class="sidebar-header">
        <button id="toggleSidebar" class="rail-toggle" type="button" aria-label="Toggle sidebar" title="Toggle sidebar">
          ☰
        </button>

        <div class="sidebar-brand">
          <div class="brand-title">Nova</div>
          <div class="brand-subtitle">Control Center</div>
        </div>
      </div>

      <div class="sidebar-content">
        <div class="sidebar-controls">
          <button id="newSessionBtn" type="button">New</button>
          <button id="deleteSessionBtn" type="button">Delete</button>
          <button id="renameSessionBtn" type="button">Rename</button>
          <button id="duplicateSessionBtn" type="button">Duplicate</button>
          <button id="pinSessionBtn" type="button">Pin</button>
          <button id="exportSessionBtn" type="button">Export</button>
        </div>

        <section class="sidebar-section">
          <div class="sidebar-section-title">Appearance</div>
          <div class="sidebar-actions">
            <button id="themeToggleBtn" type="button">Theme</button>
            <button id="backgroundBtn" type="button">Background</button>
          </div>
        </section>

        <section class="sidebar-section">
          <div class="sidebar-section-title">Chats</div>

          <div class="session-search-wrap">
            <input
              id="sessionSearchInput"
              class="session-search-input"
              type="text"
              placeholder="Search chats..."
              aria-label="Search chats"
              autocomplete="off"
            >
          </div>

          <div id="sessionList" class="session-list"></div>
        </section>
      </div>
    </aside>

    <!-- MAIN PANEL -->
    <main id="mainPanel" class="main-panel">
      <header class="main-topbar">
        <div class="topbar-left">
          <button id="mobileSidebarBtn" class="icon-btn" type="button" aria-label="Open sidebar" title="Open sidebar">
            ☰
          </button>
        </div>

        <div class="topbar-center">
          <div>
            <div id="chatTitle" class="topbar-title">Nova</div>
            <div id="chatSubtitle" class="topbar-subtitle">Ready</div>
          </div>
        </div>

        <div class="topbar-right">
          <select id="modelSelect" class="topbar-chip" aria-label="Select model">
            <option value="gpt-4.1-mini">gpt-4.1-mini</option>
          </select>
          <button id="memoryToggleBtnTop" class="icon-btn" type="button" aria-label="Toggle memory panel" title="Toggle memory panel">
            Memory
          </button>
        </div>
      </header>

      <section class="chat-main">
        <div id="chatMessages" class="chat-messages">
          <div class="empty-state">
            <div class="empty-card">
              <div class="empty-title">Nova is ready</div>
              <div class="empty-subtitle">
                Start a new message, use voice, attach files, or open memory.
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="composer-wrap">
        <div class="composer-box">
          <div id="attachedFiles" class="attachments-bar"></div>

          <div class="composer-row">
            <div class="composer-left">
              <button id="attachBtn" class="attach-btn" type="button" aria-label="Attach file" title="Attach file">
                +
              </button>
            </div>

            <div class="composer-center">
              <textarea
                id="messageInput"
                class="message-input"
                rows="1"
                placeholder="Message Nova..."
                aria-label="Message Nova"
              ></textarea>
            </div>

            <div class="composer-right">
              <button id="voiceBtn" class="voice-btn" type="button" aria-label="Voice input" title="Voice input">
                Voice
              </button>
              <button id="sendBtn" class="send-btn" type="button" aria-label="Send message" title="Send message">
                Send
              </button>
              <button id="stopBtn" class="stop-btn hidden" type="button" aria-label="Stop response" title="Stop response">
                Stop
              </button>
            </div>
          </div>

          <div class="composer-footer">
            <div id="composerHint" class="composer-hint">Enter to send · Shift+Enter for new line</div>
            <div id="modelStatus" class="model-status">Model ready</div>
          </div>
        </div>
      </section>
    </main>

    <!-- RIGHT / MEMORY PANEL -->
    <aside id="memoryPanel" class="memory-panel" aria-hidden="false">
      <div class="memory-header">
        <div class="memory-title-wrap">
          <div class="memory-title-main">Memory</div>
          <div class="memory-title-sub">Saved notes and context</div>
        </div>

        <button id="closeMemoryBtn" class="panel-toggle" type="button" aria-label="Close memory panel" title="Close memory panel">
          ×
        </button>
      </div>

      <div class="memory-body">
        <section class="memory-card">
          <div class="memory-card-title">Status</div>
          <div id="memoryStatusText" class="memory-card-text">Memory panel ready.</div>
        </section>

        <section class="memory-card">
          <div class="memory-card-title">Add Memory</div>

          <form id="memoryForm" class="memory-form">
            <div class="memory-form-row">
              <label class="memory-label" for="memoryKind">Type</label>
              <select id="memoryKind" class="memory-input" name="memoryKind">
                <option value="preference">preference</option>
                <option value="goal">goal</option>
                <option value="project">project</option>
                <option value="name">name</option>
                <option value="memory">memory</option>
              </select>
            </div>

            <div class="memory-form-row">
              <label class="memory-label" for="memoryValue">Value</label>
              <textarea
                id="memoryValue"
                class="memory-input memory-textarea"
                name="memoryValue"
                rows="3"
                placeholder="Add something Nova should remember..."
              ></textarea>
            </div>

            <div class="memory-form-actions">
              <button type="submit" class="memory-save-btn">Save</button>
              <button id="refreshMemoryBtn" type="button" class="memory-refresh-btn">Refresh</button>
            </div>
          </form>
        </section>

        <section class="panel-section">
          <div class="panel-section-title">Items</div>
          <div id="memoryEmpty" class="memory-empty">No saved memory yet.</div>
          <div id="memoryList" class="memory-list"></div>
        </section>
      </div>
    </aside>
  </div>

  <input id="fileInput" type="file" multiple class="hidden">

  <script src="/static/js/nova-ultimate.js"></script>
</body>
</html>
