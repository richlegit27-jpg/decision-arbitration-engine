<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Ultimate 2026</title>

  <link rel="stylesheet" href="/static/css/nova-main.css?v=session-rail-2026-03-31-001" />

  <style>
    :root {
      --bg: #07111f;
      --bg-2: #0b1730;
      --panel: rgba(12, 20, 37, 0.94);
      --panel-2: rgba(16, 27, 49, 0.97);
      --line: rgba(130, 158, 222, 0.14);
      --line-strong: rgba(130, 158, 222, 0.24);
      --text: #eef4ff;
      --muted: #9cafcf;
      --accent: #6ea8ff;
      --accent-soft: rgba(110, 168, 255, 0.16);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      --left-rail-w: 300px;
      --right-rail-w: 430px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .nova-app-shell {
      display: grid;
      grid-template-columns: var(--left-rail-w) minmax(0, 1fr) var(--right-rail-w);
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .nova-left-rail {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: rgba(255,255,255,0.025);
      overflow: hidden;
    }

    .nova-left-rail-head {
      flex: 0 0 auto;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nova-left-rail-title {
      font-size: 14px;
      font-weight: 700;
    }

    .nova-session-toolbar {
      display: flex;
      gap: 8px;
    }

    .nova-session-toolbar button {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      flex: 1 1 auto;
    }

    .nova-session-toolbar button:hover {
      background: rgba(255,255,255,0.10);
    }

    .nova-session-list {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px;
    }

    .nova-session-card {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.035);
      color: var(--text);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      display: block;
    }

    .nova-session-card:hover {
      background: rgba(255,255,255,0.07);
    }

    .nova-session-card.is-active {
      border-color: rgba(110,168,255,0.42);
      background: rgba(110,168,255,0.12);
      box-shadow: 0 0 0 1px rgba(110,168,255,0.16) inset;
    }

    .nova-session-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.35;
      word-break: break-word;
    }

    .nova-session-meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .nova-session-preview {
      font-size: 12px;
      line-height: 1.45;
      color: #d7e6ff;
      white-space: pre-wrap;
      word-break: break-word;
      opacity: 0.92;
    }

    .nova-session-empty {
      color: var(--muted);
      font-size: 13px;
      padding: 8px 4px;
    }

    .nova-main {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      overflow: hidden;
    }

    .nova-topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(10px);
    }

    .nova-topbar-copy {
      min-width: 0;
    }

    .nova-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
    }

    .nova-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .nova-session-chip {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      color: #dcecff;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
    }

    .nova-rail-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nova-rail-tab {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .nova-rail-tab.is-active {
      background: var(--accent-soft);
      border-color: rgba(110, 168, 255, 0.35);
      color: #dcecff;
    }

    .nova-chat-wrap {
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .nova-chat-panel {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 18px;
      padding-bottom: 28px;
      scroll-behavior: smooth;
    }

    .nova-empty-state {
      padding: 20px 18px 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .nova-message {
      margin-bottom: 14px;
    }

    .nova-message-inner {
      background: rgba(255,255,255,0.035);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .nova-message-user .nova-message-inner {
      background: rgba(110, 168, 255, 0.08);
    }

    .nova-message-time {
      font-size: 12px;
      color: var(--muted);
    }

    .nova-message-markdown {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.55;
      font-size: 14px;
    }

    .nova-message-attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .nova-attachment-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      text-decoration: none;
      font-size: 12px;
    }

    .nova-attachment-chip-remove {
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0;
    }

    .nova-composer-wrap {
      flex: 0 0 auto;
      border-top: 1px solid var(--line);
      padding: 14px;
      background: rgba(255,255,255,0.02);
    }

    .nova-pending-files {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .nova-composer {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #chatInput {
      flex: 1;
      min-height: 54px;
      max-height: 180px;
      resize: vertical;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 12px 14px;
      outline: none;
    }

    #sendBtn,
    #uploadBtn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      min-width: 72px;
      flex: 0 0 auto;
    }

    #sendBtn:hover,
    #uploadBtn:hover,
    .nova-rail-tab:hover {
      background: rgba(255,255,255,0.10);
    }

    .nova-right-rail {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.02);
      overflow: hidden;
    }

    .nova-right-rail-head {
      flex: 0 0 auto;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      font-weight: 700;
    }

    .nova-right-rail-panels {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .nova-rail-panel {
      position: absolute;
      inset: 0;
      display: none;
      min-height: 0;
      min-width: 0;
      background: transparent;
    }

    .nova-rail-panel.is-active {
      display: flex;
      flex-direction: column;
    }

    .nova-rail-panel-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px;
    }

    .nova-panel-empty {
      color: var(--muted);
      font-size: 13px;
      padding: 10px 4px;
    }

    .nova-panel-block {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .nova-panel-block-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .nova-panel-block-meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .nova-panel-block-content {
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #artifactsPanel {
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }

    .nova-artifacts-toolbar {
      flex: 0 0 auto;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #artifactSearch {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }

    .nova-artifacts-toolbar-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #artifactPinnedOnly,
    #artifactRefreshBtn,
    #artifactCleanBtn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
    }

    .nova-artifacts-split {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: 42% 58%;
      overflow: hidden;
    }

    #artifactList {
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      border-right: 1px solid var(--line);
      padding: 12px;
    }

    #artifactViewer {
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px;
    }

    @media (max-width: 1350px) {
      .nova-app-shell {
        grid-template-columns: 260px minmax(0, 1fr) 380px;
      }
    }

    @media (max-width: 1100px) {
      html,
      body {
        overflow: auto;
      }

      .nova-app-shell {
        grid-template-columns: 1fr;
        grid-template-rows: 260px minmax(0, 1fr) 360px;
        height: auto;
        min-height: 100vh;
      }

      .nova-left-rail {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        min-height: 260px;
      }

      .nova-main {
        min-height: 70vh;
        border-right: 0;
      }

      .nova-right-rail {
        border-top: 1px solid var(--line);
        min-height: 360px;
      }

      .nova-artifacts-split {
        grid-template-columns: 1fr;
      }

      #artifactList {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <div class="nova-app-shell" id="novaAppShell">
    <aside class="nova-left-rail" id="sessionsRail">
      <div class="nova-left-rail-head">
        <div class="nova-left-rail-title">Sessions</div>

        <div class="nova-session-toolbar">
          <button id="newChatBtn" type="button">New Chat</button>
          <button id="refreshSessionsBtn" type="button">Refresh</button>
        </div>
      </div>

      <div class="nova-session-list" id="sessionList">
        <div class="nova-session-empty">No sessions loaded yet.</div>
      </div>
    </aside>

    <main class="nova-main">
      <div class="nova-topbar">
        <div class="nova-topbar-copy">
          <div class="nova-title">Nova Ultimate 2026</div>
          <div class="nova-subtitle">Stateful chat • artifacts • brain retrieval • web</div>
          <div class="nova-session-chip" id="activeSessionChip">Session: loading...</div>
        </div>

        <div class="nova-rail-tabs">
          <button id="memoryPanelToggle" class="nova-rail-tab" type="button">Memory</button>
          <button id="artifactsPanelToggle" class="nova-rail-tab is-active" type="button">Artifacts</button>
          <button id="webPanelToggle" class="nova-rail-tab" type="button">Web</button>
        </div>
      </div>

      <div class="nova-chat-wrap">
        <div class="nova-chat-panel" id="messages">
          <div id="novaEmptyState" class="nova-empty-state">Nova is ready. Type a message.</div>
        </div>
      </div>

      <div class="nova-composer-wrap">
        <div id="novaPendingFiles" class="nova-pending-files"></div>

        <div class="nova-composer">
          <textarea id="chatInput" placeholder="Type your message..."></textarea>
          <button id="uploadBtn" type="button">Upload</button>
          <button id="sendBtn" type="button">Send</button>

          <input
            type="file"
            id="fileInput"
            style="display:none"
            multiple
            accept=".txt,.md,.log,.json,.csv,.pdf,image/*"
          />
        </div>
      </div>
    </main>

    <aside class="nova-right-rail" id="rightRail">
      <div class="nova-right-rail-head">Nova Right Rail</div>

      <div class="nova-right-rail-panels">
        <section id="memoryPanel" class="nova-rail-panel">
          <div class="nova-rail-panel-body">
            <div id="memoryList">
              <div class="nova-panel-empty">No memory loaded yet.</div>
            </div>
          </div>
        </section>

        <section id="artifactsPanel" class="nova-rail-panel is-active">
          <div class="nova-artifacts-toolbar">
            <input id="artifactSearch" type="text" placeholder="Search artifacts..." />

            <div class="nova-artifacts-toolbar-row">
              <button id="artifactPinnedOnly" type="button">Pinned</button>
              <button id="artifactRefreshBtn" type="button">Refresh</button>
              <button id="artifactCleanBtn" type="button">Clean</button>
            </div>
          </div>

          <div class="nova-artifacts-split">
            <div id="artifactList"></div>
            <div id="artifactViewer">
              <div class="nova-panel-empty">Select an artifact to view it here.</div>
            </div>
          </div>
        </section>

        <section id="webPanel" class="nova-rail-panel">
          <div class="nova-rail-panel-body">
            <div id="webPreviewList">
              <div class="nova-panel-empty">No web preview yet.</div>
            </div>
          </div>
        </section>
      </div>
    </aside>
  </div>

  <script>
    window.NOVA_BUILD = "session-rail-2026-03-31-001";

    (function () {
      const panelToggles = {
        memory: document.getElementById("memoryPanelToggle"),
        artifacts: document.getElementById("artifactsPanelToggle"),
        web: document.getElementById("webPanelToggle")
      };

      const panels = {
        memory: document.getElementById("memoryPanel"),
        artifacts: document.getElementById("artifactsPanel"),
        web: document.getElementById("webPanel")
      };

      function openPanel(name) {
        Object.keys(panels).forEach((key) => {
          const panel = panels[key];
          const toggle = panelToggles[key];
          if (panel) {
            panel.classList.toggle("is-active", key === name);
          }
          if (toggle) {
            toggle.classList.toggle("is-active", key === name);
          }
        });
      }

      if (panelToggles.memory) {
        panelToggles.memory.addEventListener("click", function () {
          openPanel("memory");
        });
      }

      if (panelToggles.artifacts) {
        panelToggles.artifacts.addEventListener("click", function () {
          openPanel("artifacts");
        });
      }

      if (panelToggles.web) {
        panelToggles.web.addEventListener("click", function () {
          openPanel("web");
        });
      }

      openPanel("artifacts");
    })();
  </script>

  <script src="/static/js/nova-render.js?v=history-hooks-2026-03-31-001"></script>
  <script src="/static/js/nova-artifacts.js?v=historybadge-2026-03-30-001"></script>
  <script src="/static/js/nova-panels.js?v=session-rail-2026-03-31-001"></script>
  <script src="/static/js/nova-composer-bundle.js?v=session-rail-2026-03-31-001"></script>
</body>
</html>
