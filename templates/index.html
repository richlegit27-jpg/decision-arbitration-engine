<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nova</title>
  <link rel="stylesheet" href="/static/css/nova-main.css?v=shell-sidepanels-lock-2026-04-04-001">
</head>
<body>
  <div class="nova-app-shell" data-app-shell>
    <aside class="nova-sidebar" data-sidebar>
      <div class="nova-sidebar-top">
        <button class="nova-icon-btn" type="button" data-action="toggle-sidebar" aria-label="Toggle sidebar">☰</button>
        <button class="nova-primary-btn nova-new-chat-btn" type="button" data-action="new-chat">New Chat</button>
      </div>

      <div class="nova-sidebar-brand">
        <div class="nova-brand-mark">N</div>
        <div class="nova-brand-copy">
          <div class="nova-brand-title">Nova</div>
          <div class="nova-brand-subtitle">Local AI workspace</div>
        </div>
      </div>

      <div class="nova-sidebar-section-title">Sessions</div>
      <div id="sessionsList" class="nova-sessions-list" data-role="sessions-list"></div>
    </aside>

    <main class="nova-main" data-main-column>
      <header class="nova-topbar" data-topbar>
        <div class="nova-topbar-left">
          <div class="nova-session-heading">
            <div id="activeSessionTitle" class="nova-active-session-title" data-role="active-session-title">Nova</div>
            <div id="activeSessionMeta" class="nova-active-session-meta" data-role="active-session-meta">Fast local AI workspace</div>
          </div>
        </div>

        <div class="nova-topbar-right">
          <button class="nova-chip-btn" type="button" data-action="toggle-right-rail" id="rightRailToggle">Panels</button>
          <div id="modelChip" class="nova-chip" data-role="model-chip">gpt-5.4</div>
          <div id="readyStatus" class="nova-status-chip" data-role="ready-status">Ready</div>
        </div>
      </header>

      <section class="nova-center-stage" data-center-stage>
        <div id="messages" class="nova-messages" data-role="messages"></div>
        <div id="routeInspector" class="nova-route-inspector" data-role="route-inspector"></div>
      </section>

      <footer class="nova-composer" data-composer>
        <div id="pendingUploads" class="nova-pending-uploads" data-role="pending-uploads"></div>

        <div class="nova-composer-row">
          <button id="attachBtn" class="nova-icon-btn" type="button" data-action="attach" aria-label="Attach file">＋</button>
          <textarea
            id="chatInput"
            class="nova-chat-input"
            name="message"
            rows="1"
            placeholder="Message Nova..."
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button id="sendBtn" class="nova-primary-btn" type="button" data-action="send">Send</button>
        </div>

        <input id="fileInput" data-role="upload" type="file" multiple hidden>
        <div id="composerStatus" class="nova-composer-status" data-role="composer-status">Ready</div>
      </footer>
    </main>

    <aside class="nova-right-rail is-open" data-right-rail>
      <div class="nova-rail-header" data-rail-header>
        <div class="nova-rail-header-copy">
          <div id="railTitle" class="nova-rail-title" data-role="rail-title">Artifacts</div>
          <div id="railSubtitle" class="nova-rail-subtitle" data-role="rail-subtitle">0 items</div>
        </div>
        <button class="nova-icon-btn" type="button" data-action="close-right-rail" id="closeRightRail" aria-label="Close panels">×</button>
      </div>

      <div class="nova-rail-tabs" data-rail-tabs>
        <button class="nova-tab-btn is-active" type="button" data-panel="artifacts" aria-pressed="true">Artifacts</button>
        <button class="nova-tab-btn" type="button" data-panel="memory" aria-pressed="false">Memory</button>
        <button class="nova-tab-btn" type="button" data-panel="web" aria-pressed="false">Web</button>
      </div>

      <div class="nova-rail-body">
        <div class="nova-memory-toolbar">
          <input id="memoryInput" class="nova-memory-input" data-role="memory-input" type="text" placeholder="Add memory note...">
          <button id="memoryAddBtn" class="nova-chip-btn" type="button" data-action="memory-add">Add</button>
        </div>

        <div id="memoryList" class="nova-memory-list" data-role="memory-list"></div>
        <div id="artifactsList" class="nova-artifacts-list" data-role="artifacts-list"></div>
        <div id="webList" class="nova-web-list" data-role="web-list"></div>
        <div id="railContent" class="nova-rail-content" data-role="rail-content"></div>
      </div>
    </aside>
  </div>

  <script src="/static/js/nova-artifacts.js?v=artifact-upgrade-2026-04-03-006"></script>
  <script src="/static/js/nova-composer-bundle.js?v=shell-sidepanels-lock-2026-04-04-001"></script>
</body>
</html>
