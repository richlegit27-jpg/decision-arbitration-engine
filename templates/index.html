<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Ultimate Chat + Web + Media</title>
  <link rel="stylesheet" href="/static/css/nova-main.css?v=endgame">
</head>
<body>
  <div class="nova-app-shell" id="novaAppShell">

    <!-- Chat Messages -->
    <div class="nova-chat-panel" id="messages"></div>
    <div id="novaEmptyState" class="nova-empty-state">Nova is ready. Type a message!</div>

    <!-- Typing indicator -->
    <div id="typingIndicator" class="nova-typing-indicator" style="display:none;">Nova is typing...</div>

    <!-- Composer -->
    <div class="nova-composer">
      <textarea id="chatInput" placeholder="Type your message..."></textarea>
      <button id="sendBtn">Send</button>
      <button id="uploadBtn">📎</button>
      <input type="file" id="fileInput" style="display:none;" accept="image/*,video/*">
    </div>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');
      const messages = document.getElementById('messages');
      const emptyState = document.getElementById('novaEmptyState');
      const typingIndicator = document.getElementById('typingIndicator');
      const uploadBtn = document.getElementById('uploadBtn');
      const fileInput = document.getElementById('fileInput');

      let sessionId = localStorage.getItem('nova_session_id') || crypto.randomUUID();
      localStorage.setItem('nova_session_id', sessionId);

      function appendMessage(content, from='assistant', badge='') {
        emptyState.style.display = 'none';
        const div = document.createElement('div');
        div.className = `nova-message nova-message-${from}`;
        div.textContent = content;
        if(badge) div.textContent = `[${badge}] ${content}`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      async function sendChat(content='', attachments=[]) {
        if(!content.trim() && attachments.length===0) return;
        if(content) appendMessage(content, 'user');

        typingIndicator.style.display = 'block';
        try {
          const payload = { content, session_id: sessionId };
          if(attachments.length) payload.attachments = attachments;

          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(payload)
          });
          const data = await res.json();
          if(data.ok){
            appendMessage(data.message, 'assistant', 'AI');
            if(data.web) appendMessage(data.web, 'assistant', 'Web');
            if(data.attachments_desc){
              data.attachments_desc.forEach(desc => appendMessage(desc, 'assistant', 'Attachment'));
            }
          } else appendMessage(`Error: ${data.error || 'Unknown'}`, 'assistant');
        } catch(e){
          appendMessage('Network error while sending message.', 'assistant');
        } finally { typingIndicator.style.display='none'; }
      }

      sendBtn.addEventListener('click', () => sendChat(chatInput.value));

      chatInput.addEventListener('keydown', e => {
        if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendBtn.click(); }
      });

      uploadBtn.addEventListener('click', () => fileInput.click());

      fileInput.addEventListener('change', async () => {
        if(!fileInput.files.length) return;
        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append('files', file);

        try {
          const res = await fetch('/api/upload', { method:'POST', body:formData });
          const data = await res.json();
          if(data.ok && data.files && data.files.length){
            const attachmentIds = data.files.map(f => f.id || f.filename);
            sendChat('', attachmentIds);
          } else appendMessage('Upload failed.', 'assistant');
        } catch(e){
          appendMessage('Network error during upload.', 'assistant');
        } finally { fileInput.value=''; }
      });
    });
  </script>
</body>
</html>
