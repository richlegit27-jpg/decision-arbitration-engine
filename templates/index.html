<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <title>Nova</title>

  <meta name="theme-color" content="#0f172a" />
  <meta name="color-scheme" content="dark light" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/nova-base.css') }}?v=loadorder1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/nova-main.css') }}?v=loadorder1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/nova-sidebar.css') }}?v=loadorder1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/nova-memory.css') }}?v=loadorder1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/nova-composer.css') }}?v=loadorder1" />
</head>
<body>
  <div id="nova-app" class="nova-app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-top">
          <button
            id="sidebarToggle"
            class="icon-btn"
            type="button"
            aria-label="Toggle sidebar"
            title="Toggle sidebar"
          >
            ☰
          </button>

          <button
            id="newChatBtn"
            class="primary-btn"
            type="button"
          >
            New Chat
          </button>
        </div>

        <div class="sidebar-section">
          <div class="section-title-row">
            <h2 class="section-title">Chats</h2>
          </div>
          <div id="sessionList" class="session-list"></div>
        </div>
      </div>
    </aside>

    <main class="main-shell">
      <header class="main-topbar">
        <div class="topbar-left">
          <button
            id="mobileSidebarToggle"
            class="icon-btn mobile-only"
            type="button"
            aria-label="Open sidebar"
            title="Open sidebar"
          >
            ☰
          </button>

          <div class="brand-wrap">
            <div class="brand-title">Nova</div>
            <div id="routerBadge" class="router-badge">Ready</div>
          </div>
        </div>

        <div class="topbar-right">
          <select id="modelSelect" class="model-select" aria-label="Model"></select>

          <button
            id="themeToggle"
            class="icon-btn"
            type="button"
            aria-label="Toggle theme"
            title="Toggle theme"
          >
            ◐
          </button>

          <button
            id="memoryToggle"
            class="icon-btn"
            type="button"
            aria-label="Toggle memory panel"
            title="Toggle memory panel"
          >
            ✦
          </button>
        </div>
      </header>

      <section id="chatView" class="chat-view">
        <div id="chatMessages" class="chat-messages">
          <div id="emptyState" class="empty-state">
            <div class="empty-state-card">
              <h1>Nova is ready</h1>
              <p>Ask anything, attach files, use voice, and keep moving.</p>
            </div>
          </div>
        </div>
      </section>

      <footer class="composer-shell">
        <div id="attachmentBar" class="attachment-bar hidden"></div>

        <div class="composer-box">
          <div class="composer-controls-row">
            <button
              id="attachBtn"
              class="icon-btn"
              type="button"
              aria-label="Attach files"
              title="Attach files"
            >
              ＋
            </button>

            <button
              id="voiceBtn"
              class="icon-btn"
              type="button"
              aria-label="Voice input"
              title="Voice input"
            >
              🎤
            </button>

            <button
              id="regenerateBtn"
              class="icon-btn"
              type="button"
              aria-label="Regenerate"
              title="Regenerate"
            >
              ↻
            </button>
          </div>

          <label for="composerInput" class="sr-only">Message Nova</label>
          <textarea
            id="composerInput"
            class="composer-input"
            rows="1"
            placeholder="Message Nova..."
            autocomplete="off"
          ></textarea>

          <div class="composer-actions">
            <input id="fileInput" type="file" multiple hidden />

            <button
              id="sendBtn"
              class="send-btn"
              type="button"
              aria-label="Send message"
            >
              Send
            </button>
          </div>
        </div>
      </footer>
    </main>

    <aside id="memoryPanel" class="memory-panel">
      <div class="memory-inner">
        <div class="memory-top">
          <h2>Memory</h2>
        </div>

        <div class="memory-add-row">
          <input
            id="memoryInput"
            class="memory-input"
            type="text"
            placeholder="Add memory..."
            autocomplete="off"
          />
          <button id="memoryAddBtn" class="primary-btn" type="button">Add</button>
        </div>

        <div id="memoryList" class="memory-list"></div>
      </div>
    </aside>
  </div>

  <script>
    window.Nova = window.Nova || {};
    window.NovaConfig = {
      appName: "Nova",
      version: "loadorder1",
      apiBase: "",
    };
  </script>

  <!-- core first -->
  <script defer src="{{ url_for('static', filename='js/nova-ultimate.js') }}?v=loadorder1"></script>

  <!-- split modules after core -->
  <script defer src="{{ url_for('static', filename='js/nova-dom.js') }}?v=loadorder1"></script>
  <script defer src="{{ url_for('static', filename='js/nova-state.js') }}?v=loadorder1"></script>
  <script defer src="{{ url_for('static', filename='js/nova-api.js') }}?v=loadorder1"></script>
  <script defer src="{{ url_for('static', filename='js/nova-sessions.js') }}?v=loadorder1"></script>
  <script defer src="{{ url_for('static', filename='js/nova-memory.js') }}?v=loadorder1"></script>
  <script defer src="{{ url_for('static', filename='js/nova-chat.js') }}?v=loadorder1"></script>
  <script defer src="{{ url_for('static', filename='js/nova-panels.js') }}?v=loadorder1"></script>
  <script defer src="{{ url_for('static', filename='js/nova-render-sessions.js') }}?v=loadorder1"></script>
  <script defer src="{{ url_for('static', filename='js/nova-render-messages.js') }}?v=loadorder1"></script>
  <script defer src="{{ url_for('static', filename='js/nova-render-memory.js') }}?v=loadorder1"></script>
  <script defer src="{{ url_for('static', filename='js/nova-render.js') }}?v=loadorder1"></script>

  <!-- optional extras last so they never block boot -->
  <script defer src="{{ url_for('static', filename='js/nova-style-inject.js') }}?v=loadorder1"></script>
  <script defer src="{{ url_for('static', filename='js/nova-router-control.js') }}?v=loadorder1"></script>
  <script defer src="{{ url_for('static', filename='js/nova-sources-panel.js') }}?v=loadorder1"></script>
</body>
</html>
