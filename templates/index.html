<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <title>Nova</title>

  <link rel="stylesheet" href="/static/css/nova-base.css" />
  <link rel="stylesheet" href="/static/css/nova-main.css" />
  <link rel="stylesheet" href="/static/css/nova-sidebar.css" />
  <link rel="stylesheet" href="/static/css/nova-memory.css" />
  <link rel="stylesheet" href="/static/css/nova-composer.css" />
</head>
<body>
  <div
    id="novaApp"
    class="nova-app sidebar-open memory-open"
    data-nova-app="true"
  >
    <aside
      id="leftSidebar"
      class="sidebar is-open"
      data-sidebar="true"
      aria-hidden="false"
    >
      <div class="sidebar-inner">
        <div class="sidebar-top">
          <div class="sidebar-top-title">
            <h2 class="section-title">Sessions</h2>
          </div>

          <div class="sidebar-top-actions">
            <button
              id="closeSidebarBtn"
              class="icon-btn desktop-panel-close"
              type="button"
              aria-label="Close sidebar"
              title="Close sidebar"
              data-action="close-sidebar"
            >
              ✕
            </button>
          </div>
        </div>

        <div class="sidebar-section">
          <button
            id="newChatBtn"
            class="primary-btn"
            type="button"
          >
            New chat
          </button>
        </div>

        <div class="sidebar-section session-list-wrap">
          <div id="sessionList" class="session-list"></div>
        </div>
      </div>
    </aside>

    <main id="mainShell" class="main-shell">
      <header class="main-topbar">
        <div class="topbar-left">
          <div class="brand-wrap">
            <button
              id="toggleSidebarBtn"
              class="icon-btn"
              type="button"
              aria-label="Toggle sidebar"
              aria-expanded="true"
              title="Toggle sidebar"
              data-action="toggle-sidebar"
            >
              ☰
            </button>

            <div class="brand-block">
              <div class="brand-title">Nova</div>
            </div>

            <div id="routerBadge" class="router-badge">ready</div>
          </div>
        </div>

        <div class="topbar-right">
          <button
            id="themeToggleBtn"
            class="icon-btn"
            type="button"
            aria-label="Toggle theme"
            title="Toggle theme"
          >
            ☀
          </button>

          <select id="modelSelect" class="model-select" aria-label="Model">
            <option value="gpt-5.4">gpt-5.4</option>
            <option value="gpt-4.1-mini">gpt-4.1-mini</option>
            <option value="gpt-4.1">gpt-4.1</option>
            <option value="gpt-4o-mini">gpt-4o-mini</option>
          </select>

          <button
            id="toggleMemoryBtn"
            class="icon-btn"
            type="button"
            aria-label="Toggle memory panel"
            aria-expanded="true"
            title="Toggle memory panel"
            data-action="toggle-memory"
          >
            ⟫
          </button>
        </div>
      </header>

      <section class="chat-view">
        <div id="chatMessages" class="chat-messages">
          <div id="emptyState" class="empty-state">
            <div class="empty-state-card">
              <h1>Nova is ready</h1>
              <p>Ask anything, build something, or continue your latest session.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="composer-shell">
        <div id="attachmentBar" class="attachment-bar hidden"></div>

        <div class="composer-box">
          <div class="composer-controls-row">
            <button
              id="attachBtn"
              class="icon-btn"
              type="button"
              aria-label="Attach files"
              title="Attach files"
            >
              ＋
            </button>

            <button
              id="voiceBtn"
              class="icon-btn"
              type="button"
              aria-label="Voice input"
              title="Voice input"
            >
              🎤
            </button>
          </div>

          <label class="sr-only" for="composerInput">Message</label>
          <textarea
            id="composerInput"
            class="composer-input"
            placeholder="Message Nova..."
            rows="1"
            autocomplete="off"
            spellcheck="true"
          ></textarea>

          <div class="composer-actions">
            <button
              id="sendBtn"
              class="send-btn"
              type="button"
            >
              Send
            </button>
          </div>
        </div>

        <input id="fileInput" type="file" multiple class="hidden" />
      </section>
    </main>

    <aside
      id="memoryPanel"
      class="memory-panel is-open"
      data-memory-panel="true"
      aria-hidden="false"
    >
      <div class="memory-inner">
        <div class="memory-top">
          <div class="memory-top-title">
            <h2>Memory</h2>
          </div>

          <div class="memory-top-actions">
            <button
              id="closeMemoryBtn"
              class="icon-btn desktop-panel-close"
              type="button"
              aria-label="Close memory panel"
              title="Close memory panel"
              data-action="close-memory"
            >
              ✕
            </button>
          </div>
        </div>

        <div class="memory-add-row">
          <input
            id="memoryInput"
            class="memory-input"
            type="text"
            placeholder="Add memory..."
            autocomplete="off"
          />
          <button
            id="addMemoryBtn"
            class="primary-btn"
            type="button"
          >
            Add
          </button>
        </div>

        <div id="memoryList" class="memory-list"></div>
      </div>
    </aside>
  </div>

  <script src="/static/js/nova-dom.js"></script>
  <script src="/static/js/nova-state.js"></script>
  <script src="/static/js/nova-api.js"></script>
  <script src="/static/js/nova-panels.js"></script>
  <script src="/static/js/nova-render-sessions.js"></script>
  <script src="/static/js/nova-render-messages.js"></script>
  <script src="/static/js/nova-memory.js"></script>
  <script src="/static/js/nova-chat-stream.js"></script>
  <script src="/static/js/nova-render.js"></script>
</body>
</html>
