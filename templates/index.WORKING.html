<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Nova</title>

  <script>
    (() => {
      const key = "nova_theme";
      const root = document.documentElement;

      function normalize(value) {
        return String(value || "").trim().toLowerCase() === "light" ? "light" : "dark";
      }

      let theme = "dark";
      try {
        theme = normalize(localStorage.getItem(key));
      } catch (_) {
        theme = "dark";
      }

      root.setAttribute("data-theme", theme);
    })();
  </script>

  <style>
    :root {
      --bg: #0b1020;
      --bg-elev: #11182d;
      --panel: #141c33;
      --panel-2: #18223d;
      --panel-3: #223055;
      --text: #ecf2ff;
      --muted: #93a0bf;
      --accent: #79a8ff;
      --accent-strong: #5f95ff;
      --line: rgba(255,255,255,0.08);
      --line-strong: rgba(255,255,255,0.14);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius: 14px;
      --radius-lg: 20px;
      --sidebar-width: 300px;
      --memory-width: 340px;
      --topbar-height: 60px;
      --composer-min: 72px;
      --anim: 180ms ease;
      --anim-slow: 260ms ease;
      --message-max: 860px;
    }

    :root[data-theme="light"] {
      --bg: #f5f7fb;
      --bg-elev: #e9eefb;
      --panel: #ffffff;
      --panel-2: #eef2ff;
      --panel-3: #dde7ff;
      --text: #0b1020;
      --muted: #5b6b9a;
      --accent: #3b6cff;
      --accent-strong: #2758dd;
      --line: rgba(0,0,0,0.08);
      --line-strong: rgba(0,0,0,0.12);
      --shadow: 0 18px 40px rgba(27, 43, 88, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(121,168,255,0.10), transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      overflow: hidden;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 12px;
      transition:
        transform var(--anim),
        background var(--anim),
        border-color var(--anim),
        opacity var(--anim);
    }

    button:hover {
      background: var(--panel-3);
      border-color: var(--line-strong);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .ghost-btn {
      background: transparent;
    }

    .primary-btn {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    .primary-btn:hover {
      background: var(--accent-strong);
    }

    .icon-btn {
      min-width: 40px;
      height: 40px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .app-shell {
      width: 100%;
      height: 100%;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    #sidebarBackdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.34);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--anim-slow);
      z-index: 30;
    }

    body.sidebar-open #sidebarBackdrop {
      opacity: 1;
      pointer-events: auto;
    }

    #sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      height: 100%;
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 40;
      transition: transform var(--anim-slow);
    }

    .sidebar-top {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
    }

    .sidebar-brand {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .sidebar-actions {
      display: flex;
      gap: 8px;
    }

    #chatList {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-list-item,
    .sidebar-empty {
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
    }

    .sidebar-empty {
      color: var(--muted);
      background: transparent;
    }

    #main {
      flex: 1;
      min-width: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: transparent;
      position: relative;
      z-index: 10;
    }

    #topBar {
      min-height: var(--topbar-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      backdrop-filter: blur(12px);
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .topbar-meta {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #chatTitle {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #chatSubtitle {
      font-size: 12px;
      color: var(--muted);
    }

    .chat-count-wrap {
      font-size: 12px;
      color: var(--muted);
      padding: 0 10px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-2);
      white-space: nowrap;
    }

    .main-scroll {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    #chatMessages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages-empty {
      color: var(--muted);
      padding: 18px 8px;
      font-size: 14px;
    }

    .message-bubble {
      width: fit-content;
      max-width: min(100%, var(--message-max));
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      box-shadow: var(--shadow);
      animation: novaFadeIn 180ms ease;
    }

    .message-bubble.user {
      align-self: flex-end;
      background: rgba(121,168,255,0.14);
    }

    .message-bubble.assistant {
      align-self: flex-start;
      background: rgba(255,255,255,0.035);
    }

    .message-bubble.system {
      align-self: center;
      background: rgba(255,255,255,0.045);
    }

    .message-role {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .message-content {
      white-space: normal;
      word-break: break-word;
      line-height: 1.6;
    }

    .message-content p,
    .message-content ul,
    .message-content ol,
    .message-content pre,
    .message-content blockquote {
      margin: 0 0 10px;
    }

    .message-content > *:last-child {
      margin-bottom: 0;
    }

    .message-image {
      max-width: 100%;
      border-radius: 14px;
      display: block;
      border: 1px solid var(--line);
    }

    #composerWrap {
      padding: 0 16px 16px;
      background: transparent;
    }

    #composer {
      min-height: var(--composer-min);
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      box-shadow: var(--shadow);
    }

    #messageInput {
      flex: 1;
      min-height: 48px;
      max-height: 220px;
      resize: none;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 12px 14px;
      background: var(--panel-2);
      color: var(--text);
      outline: none;
      overflow-y: auto;
    }

    #messageInput:focus {
      border-color: var(--accent);
    }

    .composer-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #sendBtn,
    #stopBtn {
      min-width: 88px;
      height: 48px;
      padding: 0 16px;
      cursor: pointer;
    }

    #memoryPanel {
      position: absolute;
      right: 0;
      top: 0;
      width: var(--memory-width);
      max-width: min(92vw, var(--memory-width));
      height: 100%;
      background: var(--panel);
      border-left: 1px solid var(--line);
      transform: translateX(100%);
      transition: transform var(--anim-slow);
      z-index: 45;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
    }

    body.memory-open #memoryPanel,
    #memoryPanel.is-open {
      transform: translateX(0);
    }

    .memory-top {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .memory-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .memory-title {
      font-size: 16px;
      font-weight: 800;
    }

    .memory-toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #memoryList {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .memory-empty {
      color: var(--muted);
      padding: 10px 2px;
      font-size: 14px;
    }

    .memory-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: var(--panel-2);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .memory-card-top,
    .memory-card-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .memory-card-label,
    .memory-card-index,
    .memory-card-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .memory-card-text {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    body.is-thinking #sendBtn {
      opacity: 0.6;
    }

    @keyframes novaFadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 980px) {
      #sidebar {
        position: fixed;
        left: 0;
        top: 0;
        transform: translateX(-100%);
      }

      body.sidebar-open #sidebar {
        transform: translateX(0);
      }

      body.sidebar-closed #sidebar {
        transform: translateX(-100%);
      }

      .main-scroll {
        padding: 12px;
      }

      #composerWrap {
        padding: 0 12px 12px;
      }

      #memoryPanel {
        width: min(92vw, var(--memory-width));
      }
    }

    @media (min-width: 981px) {
      #sidebarBackdrop {
        display: none;
      }

      body.sidebar-closed #sidebar {
        transform: translateX(-100%);
        margin-left: calc(var(--sidebar-width) * -1);
      }

      body.sidebar-open #sidebar,
      body:not(.sidebar-closed) #sidebar {
        transform: translateX(0);
        margin-left: 0;
      }
    }
  </style>
</head>

<body>
  <div id="sidebarBackdrop" aria-hidden="true"></div>

  <div class="app-shell">
    <aside id="sidebar" aria-hidden="false">
      <div class="sidebar-top">
        <div class="sidebar-brand">Nova</div>
        <div class="sidebar-actions">
          <button id="btnNewChat" class="icon-btn primary-btn" type="button">New</button>
          <button id="btnCloseSidebar" class="icon-btn ghost-btn" type="button" aria-label="Close sidebar">×</button>
        </div>
      </div>

      <div id="chatList"></div>
    </aside>

    <main id="main">
      <div id="topBar">
        <div class="topbar-left">
          <button id="sidebarToggleBtn" class="icon-btn ghost-btn" type="button" aria-label="Toggle sidebar">☰</button>

          <div class="topbar-meta">
            <div id="chatTitle">New Chat</div>
            <div id="chatSubtitle">0 messages</div>
          </div>
        </div>

        <div class="topbar-right">
          <div class="chat-count-wrap">Chats: <span id="chatCountMeta" style="margin-left: 6px;">0</span></div>
          <button id="btnOpenMemory" class="icon-btn ghost-btn" type="button">Memory</button>
        </div>
      </div>

      <div class="main-scroll">
        <div id="chatMessages"></div>
      </div>

      <div id="composerWrap">
        <div id="composer">
          <textarea id="messageInput" rows="1" placeholder="Send a message..."></textarea>

          <div class="composer-actions">
            <button id="stopBtn" class="ghost-btn" type="button">Stop</button>
            <button id="sendBtn" class="primary-btn" type="button">Send</button>
          </div>
        </div>
      </div>
    </main>

    <aside id="memoryPanel" aria-hidden="true" inert>
      <div class="memory-top">
        <div class="memory-top-row">
          <div class="memory-title">Memory</div>
          <button id="closeMemoryBtn" class="icon-btn ghost-btn" type="button" aria-label="Close memory">×</button>
        </div>

        <div class="memory-toolbar">
          <button id="btnAddMemory" class="ghost-btn" type="button">Add</button>
          <button id="btnClearMemory" class="ghost-btn" type="button">Clear</button>
          <button id="btnExportMemory" class="ghost-btn" type="button">Export</button>
        </div>
      </div>

      <div id="memoryList"></div>
    </aside>
  </div>

  <script src="/static/js/markdown.js"></script>
  <script src="/static/js/app-render.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/memory-panel.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/composer.js"></script>

  <script>
    console.log("Nova FULL UI LOADED");
  </script>
</body>
</html>
