<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nova Admin - Change Password</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #11182d;
      --panel-2: #17203a;
      --text: #eef3ff;
      --muted: #9aa8c7;
      --accent: #79a8ff;
      --accent-2: #5f8df0;
      --danger: #ff7b7b;
      --success: #63d39b;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(121,168,255,0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(95,141,240,0.15), transparent 24%),
        var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 460px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      backdrop-filter: blur(12px);
    }

    .title {
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 22px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 6px;
      display: block;
    }

    input[type="password"] {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }

    input[type="password"]:focus {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .error,
    .success {
      min-height: 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .error { color: var(--danger); }
    .success { color: var(--success); }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }

    button,
    a.button-link {
      border: 0;
      border-radius: 16px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
      text-decoration: none;
      text-align: center;
      display: inline-block;
    }

    button:hover,
    a.button-link:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
    }

    .button-link.secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
    }

    .links {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .links a:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">Change Nova Password</div>
      <div class="subtitle">Update the password from inside the app without touching the JSON file.</div>

      <form method="post" action="/admin/change-password">
        <div>
          <label for="current_password">Current password</label>
          <input id="current_password" name="current_password" type="password" autocomplete="current-password" required>
        </div>

        <div>
          <label for="new_password">New password</label>
          <input id="new_password" name="new_password" type="password" autocomplete="new-password" required>
        </div>

        <div>
          <label for="confirm_password">Confirm new password</label>
          <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required>
        </div>

        <div class="error">{{ error }}</div>
        <div class="success">{{ success }}</div>

        <div class="actions">
          <button type="submit">Update Password</button>
          <a class="button-link secondary" href="/">Back to Nova</a>
        </div>
      </form>

      <div class="links">
        <a href="/admin/change-password">Refresh</a>
        <a href="/logout">Logout</a>
      </div>
    </div>
  </div>
</body>
</html>
