<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - Profile</title>
    <style>
        /* Similar styles as the login page */
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Update Your Profile</h1>
            <p>Change your details below.</p>
        </header>

        <!-- Profile Update Form -->
        <form method="POST" enctype="multipart/form-data">
            <label for="avatar">Upload Avatar:</label>
            {{ form.avatar() }}
            <button type="submit">Update</button>
        </form>
        <p>Current Avatar:</p>
        <img src="{{ url_for('static', filename='uploads/avatars/' + user.avatar) }}" alt="Avatar" width="100">

    </div>

</body>
</html>
