<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nova Desktop</title>
  <style>
    :root {
      --bg: #080812;
      --panel: rgba(255,255,255,.075);
      --panel-strong: rgba(255,255,255,.11);
      --line: rgba(255,255,255,.13);
      --text: rgba(255,255,255,.94);
      --muted: rgba(255,255,255,.62);
      --soft: rgba(255,255,255,.08);
      --brand: #8b5cf6;
      --brand-2: #a78bfa;
      --good: #22c55e;
      --danger: #ef4444;
      --shadow: 0 22px 80px rgba(0,0,0,.38);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(139,92,246,.28), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(59,130,246,.18), transparent 30rem),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      height: 100%;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 320px;
      gap: 14px;
      padding: 14px;
    }

    .panel {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .sidebar,
    .tools {
      display: flex;
      flex-direction: column;
    }

    .brand {
      padding: 22px;
      border-bottom: 1px solid var(--line);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand-title {
      margin: 0;
      font-size: 36px;
      line-height: .95;
      letter-spacing: -.075em;
    }

    .brand-copy {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,.055);
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--good);
      box-shadow: 0 0 16px rgba(34,197,94,.85);
    }

    .nav {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .nav a,
    .nav button,
    .quick button,
    .utility-button {
      width: 100%;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.065);
      color: var(--text);
      text-decoration: none;
      text-align: left;
    }

    .nav a:hover,
    .nav button:hover,
    .quick button:hover,
    .utility-button:hover {
      border-color: rgba(167,139,250,.7);
      background: rgba(255,255,255,.11);
    }

    .nav small,
    .quick small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .session-box {
      margin-top: auto;
      padding: 14px;
      border-top: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .session-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    #sid {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(0,0,0,.22);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
      font-size: 12px;
    }

    .chat-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .chat-top {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .chat-title {
      margin: 0;
      font-size: 18px;
      letter-spacing: -.025em;
    }

    #status,
    #meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    #chat {
      min-height: 0;
      overflow: auto;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: min(780px, 82%);
    }

    .msg:has(.role:nth-child(1)) {
      width: fit-content;
    }

    .role {
      color: var(--muted);
      font-size: 12px;
      padding: 0 4px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 800;
    }

    .bubble {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.075);
      color: var(--text);
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .msg.user {
      align-self: flex-end;
    }

    .msg.user .bubble {
      background: linear-gradient(135deg, rgba(139,92,246,.92), rgba(91,33,182,.92));
      border-color: rgba(255,255,255,.22);
    }

    .msg.assistant {
      align-self: flex-start;
    }

    .composer {
      padding: 16px;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    #input {
      width: 100%;
      min-height: 54px;
      max-height: 180px;
      resize: none;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 15px 16px;
      background: rgba(0,0,0,.24);
      color: var(--text);
      outline: none;
      line-height: 1.35;
    }

    #input:focus,
    #sid:focus {
      border-color: rgba(167,139,250,.85);
    }

    #sendBtn {
      height: 54px;
      min-width: 96px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 18px;
      background: linear-gradient(135deg, var(--brand), #5b21b6);
      color: white;
      font-weight: 900;
    }

    #sendBtn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .tools-section {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .tools-section h3 {
      margin: 0 0 12px;
      font-size: 15px;
      letter-spacing: -.015em;
    }

    .quick {
      display: grid;
      gap: 8px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 0;
      border-top: 1px solid rgba(255,255,255,.08);
    }

    .metric:first-of-type {
      border-top: 0;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
    }

    .metric strong {
      color: var(--brand-2);
    }


    /* NOVA_DESKTOP_WORKSPACE_PANEL_REORG_20260610 */
    .workspace-section {
      padding: 16px 14px;
      display: grid;
      gap: 14px;
    }

    .section-title-row h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -.025em;
    }

    .section-title-row p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .primary-side-button {
      width: 100%;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 16px;
      background: linear-gradient(135deg, var(--brand), #5b21b6);
      color: white;
      font-weight: 900;
    }

    .session-current-card,
    .session-list-shell {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.055);
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .session-placeholder,
    .execution-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      padding: 10px;
      border-radius: 14px;
      background: rgba(0,0,0,.16);
      border: 1px dashed rgba(255,255,255,.12);
    }

    .side-footer-links {
      margin-top: auto;
      padding: 14px;
      border-top: 1px solid var(--line);
      display: flex;
      gap: 10px;
      11:17 PM 2026-06-17align-items: center;
    }

    .side-footer-links a {
      flex: 1;
      text-align: center;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 10px;
      background: rgba(255,255,255,.045);
      font-size: 12px;
      font-weight: 800;
    }

    .side-footer-links a:hover {
      color: var(--text);
      border-color: rgba(167,139,250,.65);
    }

    .execution-card,
    .memory-card-shell {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.055);
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .compact-system {
      margin-top: auto;
      border-bottom: 0;
      border-top: 1px solid var(--line);
    }

    /* NOVA_DESKTOP_SESSIONS_LIST_20260610 */
    .desktop-session-list {
      display: grid;
      gap: 8px;
      max-height: 42vh;
      overflow: auto;
      padding-right: 2px;
    }

    .desktop-session-item {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.055);
      color: var(--text);
      padding: 10px;
      display: grid;
      gap: 4px;
      text-align: left;
    }

    .desktop-session-item:hover {
      border-color: rgba(167,139,250,.65);
      background: rgba(255,255,255,.10);
    }

    .desktop-session-item.is-active {
      border-color: rgba(167,139,250,.85);
      background: rgba(139,92,246,.18);
    }

    .desktop-session-title {
      font-size: 13px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .desktop-session-meta {
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* NOVA_DESKTOP_MEMORY_PANEL_20260610 */
    .desktop-memory-list {
      display: grid;
      gap: 8px;
      max-height: 24vh;
      overflow: auto;
      padding-right: 2px;
    }

    .desktop-memory-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(0,0,0,.16);
      padding: 10px;
      display: grid;
      gap: 5px;
    }

    .desktop-memory-text {
      color: var(--text);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .desktop-memory-meta {
      color: var(--muted);
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    /* NOVA_DESKTOP_ATTACH_UPLOAD_20260610 */
    .composer {
      grid-template-columns: auto minmax(0, 1fr) auto;
    }

    .attach-button {
      height: 54px;
      min-width: 88px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.075);
      color: var(--text);
      font-weight: 900;
    }

    .attach-button:hover {
      border-color: rgba(167,139,250,.7);
      background: rgba(255,255,255,.12);
    }

    .desktop-attachment-chip {
      margin: 0 16px 12px;
      border: 1px solid rgba(167,139,250,.45);
      border-radius: 16px;
      background: rgba(139,92,246,.12);
      color: var(--muted);
      padding: 10px 12px;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .desktop-attachment-chip strong {
      color: var(--text);
    }

.footer-mini-button {

<style>
/* NOVA_DESKTOP_SCROLL_OVERLAY_FIX_20260610 */

/* Let the page actually scroll instead of clipping the bottom. */
html,
body {
  height: auto !important;
  min-height: 100% !important;
  overflow-x: hidden !important;
  overflow-y: auto !important;
}

body {
  min-height: 100vh !important;
  padding-bottom: 180px !important;
  box-sizing: border-box !important;
}

/* Main desktop layout should not trap/hide lower content. */
.app-shell,
.desktop-shell,
.desktop-app,
.app-layout,
.layout,
main {
  min-height: 100vh !important;
  height: auto !important;
  max-height: none !important;
  overflow: visible !important;
}

/* Sidebar must scroll without crushing the sessions list. */
aside,
.sidebar,
.side-panel,
.desktop-sidebar,
.left-panel,
.left-rail {
  max-height: 100vh !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  padding-bottom: 80px !important;
  box-sizing: border-box !important;
}

.session-list-shell {
  min-height: 0 !important;
  overflow: hidden !important;
}

#desktopSessionList,
.desktop-session-list {
  height: auto !important;
  min-height: 120px !important;
  max-height: 45vh !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  padding-right: 6px !important;
  box-sizing: border-box !important;
  pointer-events: auto !important;
}

@media (max-height: 760px) {
  #desktopSessionList,
  .desktop-session-list {
    max-height: 180px !important;
  }
}

/* Keep the real buttons clickable above the session list. */
#newSessionBtn,
#openSessionsBtn,
#openMemoryBtn {
  position: relative !important;
  z-index: 100000 !important;
  pointer-events: auto !important;
  cursor: pointer !important;
}

/* The sessions shell should not become a full-page invisible click blocker. */
.session-list-shell,
.sessions-shell,
.sessions-panel,
#desktopSessionList {
  max-height: 56vh !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  box-sizing: border-box !important;
  pointer-events: auto !important;
}

/* When open, keep it usable but below the main buttons. */
.session-list-shell.is-open,
.session-list-shell.open,
.session-list-shell.active {
  display: block !important;
  max-height: 56vh !important;
  overflow-y: auto !important;
  z-index: 50000 !important;
}

/* Session rows remain clickable. */
.desktop-session-item,
.session-item {
  position: relative !important;
  z-index: 50001 !important;
  pointer-events: auto !important;
  cursor: pointer !important;
}

/* Chat/message area gets bottom breathing room. */
.chat-panel,
.chat-column,
.desktop-chat,
.chat-container,
#nova-desktop-rescue-messages {
  min-height: 280px !important;
  max-height: none !important;
  overflow-y: auto !important;
  padding-bottom: 180px !important;
  box-sizing: border-box !important;
}
</style>


<style>

<!-- NOVA_REGEN_BUTTON_REPAIR_V2_20260620 -->
<script>
(function () {
  "use strict";

  if (window.__NOVA_REGEN_BUTTON_REPAIR_V2_20260620__) return;
  window.__NOVA_REGEN_BUTTON_REPAIR_V2_20260620__ = true;

  function cleanMessageText(value) {
    return String(value || "")
      .replace(/\bCopy\b/g, "")
      .replace(/\bRegen\b/g, "")
      .replace(/^user\s*/i, "")
      .replace(/^assistant\s*/i, "")
      .trim();
  }

  function isRegenButton(btn) {
    const raw = String(btn && btn.textContent || "").trim().toLowerCase();
    return raw === "regen" || raw === "regenerate";
  }

  function isUserNode(node) {
    if (!node) return false;

    const role = String(node.getAttribute && node.getAttribute("data-role") || "").toLowerCase();
    const cls = String(node.className || "").toLowerCase();

    return (
      role === "user" ||
      cls.includes("user-bubble") ||
      cls.includes("user-message") ||
      cls.includes("message user") ||
      cls.includes("msg user") ||
      cls.includes("desktop-message user")
    );
  }

  function findPreviousUserText(fromButton) {
    let node =
      fromButton.closest(".message.assistant") ||
      fromButton.closest(".msg.assistant") ||
      fromButton.closest(".desktop-message.assistant") ||
      fromButton.closest("[data-role='assistant']") ||
      fromButton.closest(".assistant-bubble") ||
      fromButton.closest(".assistant-message");

    while (node && node.previousElementSibling) {
      node = node.previousElementSibling;

      if (isUserNode(node)) {
        return cleanMessageText(node.innerText || node.textContent || "");
      }

      const nested = node.querySelector &&
        node.querySelector(".user-bubble, .user-message, .message.user, .msg.user, .desktop-message.user, [data-role='user']");

      if (nested) {
        return cleanMessageText(nested.innerText || nested.textContent || "");
      }
    }

    const users = Array.from(document.querySelectorAll(
      ".user-bubble, .user-message, .message.user, .msg.user, .desktop-message.user, [data-role='user']"
    ));

    if (!users.length) return "";

    return cleanMessageText(users[users.length - 1].innerText || users[users.length - 1].textContent || "");
  }

  function runRegen(text) {
    const input = document.getElementById("input") || document.querySelector("textarea");
    const sendBtn = document.getElementById("sendBtn");

    if (!text) {
      console.warn("[Nova Regen V2] no previous user text found");
      return;
    }

    console.log("[Nova Regen V2] regenerating:", text);

    if (input) {
      input.value = text;
      input.dispatchEvent(new Event("input", { bubbles: true }));
    }

    if (typeof window.handleSendClick === "function") {
      window.handleSendClick(text);
      return;
    }

    if (typeof window.sendText === "function") {
      window.sendText(text);
      return;
    }

    if (sendBtn && typeof sendBtn.click === "function") {
      sendBtn.click();
      return;
    }

    console.warn("[Nova Regen V2] no send function or send button found");
  }

  document.addEventListener("click", function (event) {
    const btn = event.target.closest("button");
    if (!btn || !isRegenButton(btn)) return;

    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();

    runRegen(findPreviousUserText(btn));
  }, true);

  console.log("[Nova Regen Button Repair V2] ready");
})();
</script>
