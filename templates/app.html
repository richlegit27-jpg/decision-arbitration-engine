<!-- NOVA_DESKTOP_APP_UI_V1_20260610 -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nova Desktop</title>
  
<style>
/* NOVA_DESKTOP_SIMPLE_FIXED_CONTROLS_20260610 */
#nova-simple-controls {
  position: fixed !important;
  left: 24px !important;
  bottom: 24px !important;
  z-index: 2147483647 !important;
  display: flex !important;
  gap: 10px !important;
  flex-wrap: wrap !important;
  pointer-events: auto !important;
}

.nova-simple-button {
  border: 1px solid rgba(167,139,250,.7) !important;
  border-radius: 999px !important;
  background: rgba(28, 24, 42, .98) !important;
  color: #fff !important;
  padding: 12px 16px !important;
  font-weight: 800 !important;
  cursor: pointer !important;
  pointer-events: auto !important;
  box-shadow: 0 14px 36px rgba(0,0,0,.35) !important;
}

#nova-simple-panel {
  position: fixed !important;
  left: 24px !important;
  bottom: 84px !important;
  width: 360px !important;
  max-width: calc(100vw - 48px) !important;
  max-height: 70vh !important;
  overflow-y: auto !important;
  z-index: 2147483646 !important;
  display: none !important;
  padding: 14px !important;
  border: 1px solid rgba(167,139,250,.55) !important;
  border-radius: 18px !important;
  background: rgba(14, 12, 22, .98) !important;
  color: #fff !important;
  box-shadow: 0 24px 70px rgba(0,0,0,.50) !important;
}

#nova-simple-panel.is-open {
  display: block !important;
}

.nova-simple-row {
  width: 100% !important;
  display: block !important;
  margin: 8px 0 !important;
  padding: 12px !important;
  border: 1px solid rgba(255,255,255,.14) !important;
  border-radius: 14px !important;
  background: rgba(255,255,255,.07) !important;
  color: #fff !important;
  text-align: left !important;
  cursor: pointer !important;
}

#nova-simple-output {
  position: fixed !important;
  right: 24px !important;
  bottom: 24px !important;
  width: min(680px, calc(100vw - 48px)) !important;
  max-height: 75vh !important;
  overflow-y: auto !important;
  z-index: 2147483645 !important;
  display: none !important;
  white-space: pre-wrap !important;
  padding: 16px !important;
  border: 1px solid rgba(255,255,255,.15) !important;
  border-radius: 18px !important;
  background: rgba(10, 10, 16, .98) !important;
  color: #fff !important;
  box-shadow: 0 24px 70px rgba(0,0,0,.50) !important;
}

#nova-simple-output.is-open {
  display: block !important;
}
</style>

<script>
(function () {
  "use strict";

  // NOVA_DESKTOP_SIMPLE_FIXED_CONTROLS_20260610

  function ensureSimpleDesktopUi() {
    if (!document.getElementById("nova-simple-controls")) {
      var controls = document.createElement("div");
      controls.id = "nova-simple-controls";
      controls.innerHTML =
        '<button id="nova-simple-new" class="nova-simple-button" type="button">New Chat</button>' +
        '<button id="nova-simple-sessions" class="nova-simple-button" type="button">Sessions</button>' +
        '<button id="nova-simple-memory" class="nova-simple-button" type="button">Memory</button>';
      document.body.appendChild(controls);
    }

    if (!document.getElementById("nova-simple-panel")) {
      var panel = document.createElement("div");
      panel.id = "nova-simple-panel";
      document.body.appendChild(panel);
    }

    if (!document.getElementById("nova-simple-output")) {
      var output = document.createElement("div");
      output.id = "nova-simple-output";
      document.body.appendChild(output);
    }

    document.getElementById("nova-simple-new").onclick = function () {
      var sid = "desktop_" + Date.now().toString(16) + "_" + Math.random().toString(16).slice(2);
      localStorage.setItem("nova_desktop_session_id", sid);
      localStorage.setItem("nova_session_id", sid);
      localStorage.setItem("session_id", sid);

      var output = document.getElementById("nova-simple-output");
      output.classList.add("is-open");
      output.textContent = "New chat started.\n\nSession: " + sid;

      var input = document.getElementById("prompt") || document.querySelector("textarea") || document.querySelector("input[type='text']");
      if (input) input.value = "";

      console.log("[Nova Simple Desktop] new chat", sid);
    };

    document.getElementById("nova-simple-sessions").onclick = openSimpleSessions;
    document.getElementById("nova-simple-memory").onclick = openSimpleMemory;
  }

  function normalizeSessions(data) {
    if (!data) return [];
    if (Array.isArray(data)) return data;
    if (Array.isArray(data.sessions)) return data.sessions;
    if (data.data && Array.isArray(data.data.sessions)) return data.data.sessions;
    if (Array.isArray(data.items)) return data.items;
    return [];
  }

  function normalizeMessages(data) {
    if (!data) return [];
    if (Array.isArray(data)) return data;
    if (Array.isArray(data.messages)) return data.messages;
    if (data.data && Array.isArray(data.data.messages)) return data.data.messages;
    if (data.session && Array.isArray(data.session.messages)) return data.session.messages;
    return [];
  }

  function normalizeMemory(data) {
    if (!data) return [];
    if (Array.isArray(data)) return data;
    if (Array.isArray(data.memory)) return data.memory;
    if (Array.isArray(data.items)) return data.items;
    if (data.data && Array.isArray(data.data.memory)) return data.data.memory;
    if (data.data && Array.isArray(data.data.items)) return data.data.items;
    return [];
  }

  function getSessionId(session) {
    return session.id || session.session_id || session.key || "";
  }

  function getSessionTitle(session) {
    return session.title || session.name || session.label || session.preview || getSessionId(session) || "Session";
  }

  function messageText(msg) {
    if (typeof msg === "string") return msg;

    var role = msg.role || msg.sender || msg.type || "message";
    var body = msg.content || msg.text || msg.message || msg.body || "";

    if (Array.isArray(body)) {
      body = body.map(function (part) {
        return typeof part === "string" ? part : (part.text || part.content || JSON.stringify(part));
      }).join("\n");
    }

    if (!body && msg.attachments && msg.attachments.length) {
      body = "Attachment received.";
    }

    return "[" + role + "] " + (String(body || "").trim() || JSON.stringify(msg));
  }

  async function openSimpleSessions() {
    ensureSimpleDesktopUi();

    var panel = document.getElementById("nova-simple-panel");
    panel.classList.add("is-open");
    panel.textContent = "Loading sessions...";

    try {
      var res = await fetch("/api/sessions", { headers: { "Accept": "application/json" } });
      var data = await res.json();
      var sessions = normalizeSessions(data);

      panel.innerHTML = "<strong>Sessions</strong>";

      if (!sessions.length) {
        panel.innerHTML += "<div>No saved sessions found.</div>";
        return;
      }

      sessions.slice(0, 50).forEach(function (session) {
        var sid = getSessionId(session);
        var title = getSessionTitle(session);

        var row = document.createElement("button");
        row.type = "button";
        row.className = "nova-simple-row";
        row.textContent = title;

        row.onclick = function () {
          loadSimpleSession(sid, title);
        };

        panel.appendChild(row);
      });

      console.log("[Nova Simple Desktop] sessions opened", sessions.length);
    } catch (error) {
      panel.textContent = "Could not load sessions.";
      console.warn("[Nova Simple Desktop] sessions failed", error);
    }
  }

  async function loadSimpleSession(sid, title) {
    var output = document.getElementById("nova-simple-output");
    output.classList.add("is-open");
    output.textContent = "Loading session: " + title + "...";

    try {
      localStorage.setItem("nova_desktop_session_id", sid);
      localStorage.setItem("nova_session_id", sid);
      localStorage.setItem("session_id", sid);

      var res = await fetch("/api/chat/" + encodeURIComponent(sid), {
        headers: { "Accept": "application/json" }
      });
      var data = await res.json();
      var messages = normalizeMessages(data);

      output.textContent = title + "\n\n" + (messages.length ? messages.map(messageText).join("\n\n") : "No messages in this session yet.");
      console.log("[Nova Simple Desktop] session loaded", sid, title);
    } catch (error) {
      output.textContent = "Could not load session: " + title;
      console.warn("[Nova Simple Desktop] session failed", error);
    }
  }

  async function openSimpleMemory() {
    ensureSimpleDesktopUi();

    var panel = document.getElementById("nova-simple-panel");
    panel.classList.add("is-open");
    panel.textContent = "Loading memory...";

    try {
      var res = await fetch("/api/memory", { headers: { "Accept": "application/json" } });
      var data = await res.json();
      var items = normalizeMemory(data);

      panel.innerHTML = "<strong>Memory</strong>";

      if (!items.length) {
        panel.innerHTML += "<div>No memory found.</div>";
        return;
      }

      items.slice(0, 30).forEach(function (item) {
        var row = document.createElement("div");
        row.className = "nova-simple-row";
        row.textContent = typeof item === "string" ? item : (item.text || item.content || item.summary || JSON.stringify(item));
        panel.appendChild(row);
      });

      console.log("[Nova Simple Desktop] memory opened", items.length);
    } catch (error) {
      panel.textContent = "Could not load memory.";
      console.warn("[Nova Simple Desktop] memory failed", error);
    }
  }

  ensureSimpleDesktopUi();
  window.NovaSimpleDesktopOpenSessions = openSimpleSessions;
  window.NovaSimpleDesktopOpenMemory = openSimpleMemory;
  console.log("[Nova Simple Desktop] ready");
})();
</script>

</body>
</html>
