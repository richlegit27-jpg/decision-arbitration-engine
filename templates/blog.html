<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Nova Blog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
            --bg: #070712;
            --card: rgba(15, 23, 42, 0.84);
            --card2: rgba(30, 41, 59, 0.72);
            --text: #f8fafc;
            --muted: rgba(226, 232, 240, 0.68);
            --line: rgba(216, 180, 254, 0.22);
            --purple: #a855f7;
            --purple2: #7c3aed;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(168, 85, 247, 0.22), transparent 34%),
                radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.15), transparent 32%),
                var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        a {
            color: inherit;
        }

        .page {
            width: min(1120px, calc(100% - 28px));
            margin: 0 auto;
            padding: 22px 0 46px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .brand strong {
            font-size: 18px;
            letter-spacing: -0.04em;
        }

        .brand span {
            color: var(--muted);
            font-size: 12px;
            font-weight: 750;
        }

        .nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav a {
            text-decoration: none;
            font-size: 12px;
            font-weight: 900;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(168, 85, 247, 0.12);
        }

        .nav a.primary {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.38), rgba(124, 58, 237, 0.22));
        }

        .hero {
            padding: 30px;
            border: 1px solid var(--line);
            border-radius: 28px;
            background:
                linear-gradient(135deg, rgba(168, 85, 247, 0.22), rgba(15, 23, 42, 0.72)),
                var(--card);
            box-shadow: 0 24px 65px rgba(0, 0, 0, 0.34);
            margin-bottom: 18px;
        }

        .eyebrow {
            color: #d8b4fe;
            font-size: 12px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0;
            max-width: 760px;
            font-size: clamp(34px, 7vw, 68px);
            line-height: 0.94;
            letter-spacing: -0.07em;
        }

        .hero p {
            max-width: 660px;
            color: var(--muted);
            margin: 16px 0 0;
            font-size: 15px;
            line-height: 1.65;
            font-weight: 650;
        }

        .posts {
            display: grid;
            gap: 14px;
        }

        .post {
            display: block;
            text-decoration: none;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: var(--card);
            transition: transform 0.16s ease, border-color 0.16s ease;
        }

        .post:hover {
            transform: translateY(-2px);
            border-color: rgba(216, 180, 254, 0.36);
        }

        .post h2 {
            margin: 0 0 8px;
            font-size: 24px;
            line-height: 1.05;
            letter-spacing: -0.045em;
        }

        .post p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.55;
            font-weight: 600;
        }

        .meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .pill {
            padding: 6px 9px;
            border-radius: 999px;
            background: rgba(168, 85, 247, 0.13);
            border: 1px solid rgba(216, 180, 254, 0.18);
            color: #f8fafc;
            font-size: 11px;
            font-weight: 900;
        }

        .empty {
            padding: 22px;
            border: 1px dashed rgba(216, 180, 254, 0.30);
            border-radius: 22px;
            color: var(--muted);
            background: rgba(15, 23, 42, 0.48);
            font-weight: 700;
        }

        @media (max-width: 820px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .nav {
                justify-content: flex-start;
            }

            .hero {
                padding: 22px;
            }
        }
    </style>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="/static/site.webmanifest">
    <meta name="theme-color" content="#8b5cf6">
    <!-- NOVA_SOCIAL_META_20260709 -->
    <link rel="canonical" href="{{ request.url_root.rstrip('/') }}/blog">
    <meta property="og:site_name" content="Nova">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Nova Blog">
    <meta property="og:description" content="Nova product updates, build notes, and public launch progress.">
    <meta property="og:url" content="{{ request.url_root.rstrip('/') }}/blog">
    <meta property="og:image" content="{{ request.url_root.rstrip('/') }}/static/nova-og.svg">
    <meta property="og:image:type" content="image/svg+xml">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Nova Blog">
    <meta name="twitter:description" content="Nova product updates, build notes, and public launch progress.">
    <meta name="twitter:image" content="{{ request.url_root.rstrip('/') }}/static/nova-og.svg">
    <!-- /NOVA_SOCIAL_META_20260709 -->
</head>

<body>
    <main class="page">
        <header class="topbar">
            <div class="brand">
                <strong>Nova Blog</strong>
                <span>updates, notes, experiments</span>
            </div>

            <nav class="nav">
                <a href="/">Home</a>
                <a href="/mobile">Mobile</a>
                <a href="/blog">Blog</a>
                <a href="/contact">Contact</a>
                <a class="primary" href="/blog/write">Write</a>
            </nav>
        </header>

        <section class="hero">
            <div class="eyebrow">Nova Journal</div>
            <h1>Build notes, updates, and thoughts.</h1>
            <p>
                Write posts from the editor, save them locally to Nova, and read them here.
            </p>
        </section>

        <section class="posts" id="posts">
            <div class="empty">Loading posts...</div>
        </section>
    </main>

    <script>
        function escapeHtml(value) {
            return String(value || "").replace(/[&<>"']/g, function (char) {
                return {
                    "&": "&amp;",
                    "<": "&lt;",
                    ">": "&gt;",
                    '"': "&quot;",
                    "'": "&#039;"
                }[char];
            });
        }

        function formatDate(value) {
            if (!value) return "Draft";
            try {
                return new Date(value).toLocaleString();
            } catch (_) {
                return value;
            }
        }

        async function loadPosts() {
            const root = document.getElementById("posts");

            try {
                const data = await fetch("/api/blog/posts").then(function (res) {
                    return res.json();
                });

                const posts = Array.isArray(data.posts) ? data.posts : [];

                if (!posts.length) {
                    root.innerHTML = '<div class="empty">No posts yet. Click Write to make your first one.</div>';
                    return;
                }

                root.innerHTML = posts.map(function (post) {
                    const tags = Array.isArray(post.tags) ? post.tags : [];

                    return [
                        '<a class="post" href="/blog/' + encodeURIComponent(post.slug) + '">',
                            '<h2>' + escapeHtml(post.title) + '</h2>',
                            '<p>' + escapeHtml(post.excerpt || "") + '</p>',
                            '<div class="meta">',
                                '<span class="pill">' + escapeHtml(formatDate(post.created_at)) + '</span>',
                                tags.map(function (tag) {
                                    return '<span class="pill">' + escapeHtml(tag) + '</span>';
                                }).join(""),
                            '</div>',
                        '</a>'
                    ].join("");
                }).join("");
            } catch (error) {
                root.innerHTML = '<div class="empty">Could not load posts.</div>';
            }
        }

        loadPosts();
    </script>

        <footer class="nova-public-legal-strip" aria-label="Nova legal links">
            <a href="/privacy">Privacy</a>
            <a href="/terms">Terms</a>
        </footer>
</body>
</html>
