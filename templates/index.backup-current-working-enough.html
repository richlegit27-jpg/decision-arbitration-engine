<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nova</title>
  <link rel="stylesheet" href="/static/css/nova-main.css?v=artifact-upgrade-2026-04-03-007" />
</head>
<body>
  <div id="novaAppShell" class="nova-app-shell">
    <aside id="novaSidebar" class="nova-sidebar" data-collapsed="false">
      <div class="nova-sidebar-top">
        <button id="sidebarToggle" class="nova-icon-btn nova-sidebar-toggle" type="button" aria-label="Toggle sidebar">â˜°</button>

        <div class="nova-brand">
          <div class="nova-brand-mark">N</div>
          <div class="nova-brand-text">
            <div class="nova-brand-title">Nova</div>
            <div class="nova-brand-subtitle">Ultimate 2026</div>
          </div>
        </div>

        <button id="newChatBtn" class="nova-primary-btn nova-new-chat-btn" type="button">+ New chat</button>
      </div>

      <div class="nova-sidebar-body">
        <div id="sessionList" class="nova-session-list"></div>
      </div>
    </aside>

    <main class="nova-main">
      <header class="nova-topbar">
        <div class="nova-topbar-left">
          <div class="nova-topbar-title-wrap">
            <div id="sessionTitle" class="nova-topbar-title">Nova</div>
            <div id="sessionSubtitle" class="nova-topbar-subtitle">Fast local AI workspace</div>
          </div>
        </div>

        <div class="nova-topbar-right">
          <div id="composerStatus" class="nova-status-pill">
            <span class="nova-status-dot"></span>
            <span id="composerStatusText">Ready</span>
          </div>
          <div id="modelChip" class="nova-model-chip">gpt-5.4</div>
        </div>
      </header>

      <section id="chatScroll" class="nova-chat-scroll">
        <div id="chatMessages" class="nova-chat-messages">
          <div class="nova-empty-chat">
            <div class="nova-empty-chat-title">Nova is live</div>
            <div class="nova-empty-chat-copy">Chat is working. Uploads stage before send. Artifacts rail stays available.</div>
          </div>
        </div>
      </section>

      <footer class="nova-composer-shell">
        <div id="pendingUploads" class="nova-pending-uploads"></div>

        <div class="nova-composer">
          <div class="nova-composer-actions-left">
            <label for="fileInput" class="nova-attach-btn">ï¼‹ Attach</label>
            <input id="fileInput" type="file" multiple hidden />
            <button id="voiceBtn" class="nova-icon-btn" type="button" aria-label="Voice">ðŸŽ¤</button>
            <button id="clearChatBtn" class="nova-icon-btn" type="button" aria-label="Clear input">âœ•</button>
          </div>

          <div class="nova-composer-input-wrap">
            <textarea id="chatInput" rows="1" placeholder="Message Nova"></textarea>
            <div class="nova-composer-hint">Enter to send Â· Shift+Enter for newline</div>
          </div>

          <div class="nova-composer-actions-right">
            <button id="sendBtn" class="nova-send-btn" type="button" aria-label="Send">Send</button>
          </div>
        </div>
      </footer>
    </main>

    <aside id="rightRail" class="nova-right-rail">
      <div class="nova-right-rail-top">
        <div class="nova-panel-tabs">
          <button id="memoryTabBtn" class="nova-panel-tab" type="button" data-panel="memory">Memory</button>
          <button id="artifactsTabBtn" class="nova-panel-tab is-active" type="button" data-panel="artifacts">Artifacts</button>
          <button id="webTabBtn" class="nova-panel-tab" type="button" data-panel="web">Web</button>
        </div>
      </div>

      <div class="nova-right-rail-body">
        <section id="memoryPanel" class="nova-panel" data-panel="memory" hidden>
          <div id="memoryList" class="nova-memory-list"></div>
        </section>

        <section id="artifactsPanel" class="nova-panel is-active" data-panel="artifacts">
          <div class="nova-artifacts-layout">
            <div id="artifactsList" class="nova-artifacts-list"></div>
            <div id="artifactViewer" class="nova-artifact-viewer"></div>
          </div>
        </section>

        <section id="webPanel" class="nova-panel" data-panel="web" hidden>
          <div id="webList" class="nova-web-list"></div>
        </section>
      </div>
    </aside>
  </div>

  <script src="/static/js/nova-artifacts.js?v=artifact-upgrade-2026-04-03-007"></script>
  <script src="/static/js/nova-composer-bundle.js?v=artifact-upgrade-2026-04-03-007"></script>
</body>
</html>
