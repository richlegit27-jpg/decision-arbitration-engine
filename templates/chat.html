{% extends "base.html" %}
{% block title %}Chat • Nova{% endblock %}

{% block content %}
<div class="h-[calc(100vh-170px)] grid grid-cols-1 md:grid-cols-[320px_1fr] gap-4">

  <!-- SIDEBAR -->
  <aside class="rounded-2xl border border-zinc-800 bg-zinc-900/30 overflow-hidden flex flex-col">
    <div class="p-3 border-b border-zinc-800 bg-zinc-950/30 space-y-2">
      <button id="new-chat"
        class="w-full rounded-xl bg-white text-zinc-900 font-semibold px-3 py-2 hover:bg-zinc-200 transition">
        + New chat
      </button>

      <input id="search"
        class="w-full rounded-xl bg-zinc-950 border border-zinc-800 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-zinc-700"
        placeholder="Search chats… (Ctrl+K)" />

      <div id="sidebar-msg" class="text-xs text-red-400 hidden"></div>
    </div>

    <div class="p-2 overflow-y-auto flex-1" id="session-list"></div>

    <div class="p-3 border-t border-zinc-800 bg-zinc-950/30 flex items-center justify-between gap-2">
      <div class="text-xs text-zinc-400 truncate">
        <span class="font-semibold text-zinc-200">Auth:</span>
        <span id="auth-state">checking…</span>
      </div>
      <button id="logout"
        class="text-xs px-3 py-1.5 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-white">
        Logout
      </button>
    </div>
  </aside>

  <!-- CHAT -->
  <section class="rounded-2xl border border-zinc-800 bg-zinc-900/30 overflow-hidden flex flex-col">
    <div class="p-3 border-b border-zinc-800 bg-zinc-950/30 flex items-center justify-between gap-3">
      <div class="min-w-0">
        <div class="text-sm text-zinc-400">Conversation</div>
        <div id="chat-title" class="font-semibold truncate">—</div>
      </div>

      <div class="flex items-center gap-2">
        <button id="regenerate"
          class="text-sm px-3 py-1.5 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-white disabled:opacity-50 disabled:cursor-not-allowed">
          Regenerate
        </button>
        <button id="clear-view"
          class="text-sm px-3 py-1.5 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-white">
          Clear view
        </button>
      </div>
    </div>

    <div id="auth-banner" class="hidden p-4 border-b border-zinc-800 bg-zinc-950/30">
      <div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-4 flex items-start justify-between gap-4">
        <div>
          <div class="font-semibold">You’re not logged in</div>
          <div class="text-sm text-zinc-400 mt-1">Login to use chats and load history.</div>
        </div>
        <a href="/login"
          class="px-3 py-1.5 rounded-lg bg-white text-zinc-900 font-semibold hover:bg-zinc-200">
          Go to Login
        </a>
      </div>
    </div>

    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

    <div class="p-3 border-t border-zinc-800 bg-zinc-950/30">
      <!-- action prevents real POST if JS ever fails -->
      <form id="chat-form" class="flex gap-2 items-end" action="javascript:void(0);">
        <textarea id="chat-input" rows="1"
          class="flex-1 resize-none rounded-xl bg-zinc-950 border border-zinc-800 px-3 py-2 outline-none focus:ring-2 focus:ring-zinc-700"
          placeholder="Type a message… (Enter to send, Shift+Enter newline)"></textarea>

        <button id="send-btn" type="submit"
          class="rounded-xl bg-white text-zinc-900 font-semibold px-4 py-2 hover:bg-zinc-200 transition disabled:opacity-50 disabled:cursor-not-allowed">
          Send
        </button>

        <button id="stop-btn" type="button"
          class="hidden rounded-xl bg-zinc-800 text-white font-semibold px-4 py-2 hover:bg-zinc-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
          Stop
        </button>
      </form>

      <div class="flex items-center justify-between mt-2">
        <div id="chat-msg" class="text-sm text-red-400 hidden"></div>
        <div class="text-xs text-zinc-500">
          Ctrl+N new • Ctrl+K search • Esc blur • Shift+Enter newline
        </div>
      </div>
    </div>
  </section>

</div>

<script src="/static/js/chat.js"></script>
{% endblock %}
