<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Chat</title>
</head>
<body>
    <div id="chat-box"></div>
    <textarea id="user-input" placeholder="Type your message here..." rows="3" cols="50"></textarea>
    <button onclick="sendMessage()">Send</button>

    <script>
        function sendMessage() {
            // Get the user input message
            const message = document.getElementById('user-input').value;

            // Log the original message before cleaning
            console.log("Original message before cleaning:", message);

            // Clean the message to remove any [MODE:...] prefix
            const cleanedMessage = message.replace(/\[MODE:[^\]]*\]/g, "").trim();
            
            // Log the cleaned message before sending
            console.log("Cleaned message before sending:", cleanedMessage);

            // Send the cleaned message to the server using fetch (POST request)
            fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text: cleanedMessage }) // Send only the cleaned message
            })
            .then(response => response.json())
            .then(data => {
                // Display the response from Flask
                console.log("Response from server:", data);
                displayMessage(data.message);
            })
            .catch(error => console.error("Error:", error));
        }

        // Function to display the message in the chatbox
        function displayMessage(message) {
            const chatBox = document.getElementById('chat-box');
            const messageDiv = document.createElement('div');
            messageDiv.textContent = message;
            chatBox.appendChild(messageDiv);
        }
    </script>
</body>
</html>
