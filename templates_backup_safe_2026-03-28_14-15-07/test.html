<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nova Test Chat</title>
</head>
<body>
<h2>Test Chat</h2>

<div id="chatMessages" style="border:1px solid #444; padding:10px; height:300px; overflow-y:auto;"></div>
<textarea id="messageInput" placeholder="Type a message..." style="width:70%;"></textarea>
<button id="sendBtn">Send</button>

<script>
const input = document.getElementById("messageInput");
const btn = document.getElementById("sendBtn");
const chat = document.getElementById("chatMessages");

btn.addEventListener("click", async () => {
    const text = input.value.trim();
    if (!text) return;
    input.value = "";

    try {
        const resp = await fetch("http://127.0.0.1:8743/api/chat/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chat_id: "main", message: text })
        });
        const reply = await resp.text();
        const div = document.createElement("div");
        div.textContent = reply;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    } catch (err) {
        const div = document.createElement("div");
        div.textContent = "Error contacting server.";
        chat.appendChild(div);
        console.error(err);
    }
});
</script>

</body>
</html>
